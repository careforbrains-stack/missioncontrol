// === VOLUNTEER CRM ===
function VolunteerCRM({hubData,team,me}){
  const[search,setSearch]=useState('');
  const[statusFilter,setStatusFilter]=useState('all');
  const[programFilter,setProgramFilter]=useState('all');
  const[expanded,setExpanded]=useState(null);
  const[sortBy,setSortBy]=useState('name');
  const sheetData=hubData.sheetData||{};

  // Sheet-to-program mapping
  const sheetMeta={
    vol_responses:{program:'Volunteer',type:'signup',nameCol:null,emailCol:null},
    vol_done:{program:'Volunteer',type:'done',nameCol:null,emailCol:null},
    intern_signup:{program:'Internship',type:'signup',nameCol:null,emailCol:null},
    intern_done:{program:'Internship',type:'done',nameCol:null,emailCol:null},
    ecard_responses:{program:'E-Card',type:'signup',nameCol:null,emailCol:null},
    stem_intern_responses:{program:'STEM',type:'signup',nameCol:null,emailCol:null},
    stem_final_responses:{program:'STEM',type:'done',nameCol:null,emailCol:null},
    chapter_apps:{program:'Chapter',type:'signup',nameCol:null,emailCol:null}
  };

  // Build volunteer profiles from sheet data
  const volunteers=React.useMemo(()=>{
    const map={};
    Object.entries(sheetMeta).forEach(([sid,meta])=>{
      const rows=sheetData[sid];
      if(!rows||!Array.isArray(rows)||rows.length<2)return;
      const headers=rows[0]||[];
      // Find email col
      let ei=-1;
      for(let i=0;i<headers.length;i++){const l=(headers[i]||'').toLowerCase();if(l.includes('email')&&!l.includes('school')){ei=i;break}}
      if(ei<0)return;
      // Find name col
      let ni=-1;
      for(let i=0;i<headers.length;i++){const l=(headers[i]||'').toLowerCase();if(l.includes('full name')||l==='name'||l.includes('name (first')||l.includes('name:')){ni=i;break}}
      if(ni<0)for(let i=0;i<headers.length;i++){const l=(headers[i]||'').toLowerCase();if(l.includes('name')&&!l.includes('school')&&!l.includes('user')){ni=i;break}}
      // Find timestamp col
      let ti=headers.findIndex(h=>(h||'').toLowerCase().includes('timestamp'));
      // Find status col (for done sheets)
      const statusWords=['reached','respond','responded','contacted','reply','finished','pvsa'];
      let si=-1;let sMax=0;
      for(let ci=0;ci<headers.length;ci++){if(statusWords.some(w=>(headers[ci]||'').toLowerCase().includes(w))){const filled=rows.slice(1).filter(r=>r&&r[ci]&&(r[ci]||'').trim()).length;if(filled>sMax){sMax=filled;si=ci}}}

      rows.slice(1).forEach(row=>{
        if(!row||ei>=row.length||!row[ei])return;
        const email=(row[ei]||'').trim().toLowerCase();
        if(!email||!email.includes('@'))return;
        const name=(ni>=0&&ni<row.length)?row[ni]?.trim()||'':'';
        const ts=(ti>=0&&ti<row.length)?row[ti]||'':'';
        const statusVal=(si>=0&&si<row.length)?(row[si]||'').trim().toLowerCase():'';
        const responded=statusVal&&['yes','y','ye','si','ok','done','true','completed','approved','accepted','yas','ues'].some(w=>statusVal.startsWith(w));

        if(!map[email]){
          map[email]={email,name:'',programs:[],signups:[],completions:[],firstSeen:'',lastSeen:'',responded:false};
        }
        const v=map[email];
        if(name&&(!v.name||name.length>v.name.length))v.name=name;
        if(ts){const tp=new Date(ts).getTime();const fp=new Date(v.firstSeen||'9999').getTime();const lp=new Date(v.lastSeen||'0').getTime();if(!v.firstSeen||tp<fp)v.firstSeen=ts;if(!v.lastSeen||tp>lp)v.lastSeen=ts}
        if(!v.programs.includes(meta.program))v.programs.push(meta.program);
        if(meta.type==='signup')v.signups.push({program:meta.program,date:ts,sheet:sid});
        if(meta.type==='done')v.completions.push({program:meta.program,date:ts,sheet:sid});
        if(responded)v.responded=true;
      });
    });

    return Object.values(map).map(v=>{
      // Determine lifecycle status
      let status='applied';
      if(v.completions.length>0)status='completed';
      else if(v.responded)status='active';
      else if(v.programs.includes('Chapter'))status='chapter_leader';
      v.status=status;
      v.programCount=v.programs.length;
      return v;
    });
  },[JSON.stringify(sheetData)]);

  const statusLabels={applied:'Applied',active:'Active',completed:'Completed',chapter_leader:'Chapter Leader'};
  const statusColors={applied:'#F59E0B',active:'#3B82F6',completed:'#10B981',chapter_leader:'#8B5CF6'};
  const programs=[...new Set(volunteers.flatMap(v=>v.programs))].sort();

  // Filter and search
  const filtered=volunteers.filter(v=>{
    if(statusFilter!=='all'&&v.status!==statusFilter)return false;
    if(programFilter!=='all'&&!v.programs.includes(programFilter))return false;
    if(search){const s=search.toLowerCase();return v.name.toLowerCase().includes(s)||v.email.includes(s)||v.programs.some(p=>p.toLowerCase().includes(s))}
    return true;
  }).sort((a,b)=>{
    if(sortBy==='name')return(a.name||a.email).localeCompare(b.name||b.email);
    if(sortBy==='programs')return b.programCount-a.programCount;
    if(sortBy==='recent')return(b.lastSeen||'').localeCompare(a.lastSeen||'');
    return 0;
  });

  const counts={all:volunteers.length,...Object.keys(statusLabels).reduce((a,k)=>{a[k]=volunteers.filter(v=>v.status===k).length;return a},{})};

  const fmtDate=d=>{if(!d)return'--';try{const p=new Date(d);return isNaN(p)?d.split(' ')[0]:p.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}catch{return d.split(' ')[0]||'--'}};

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",flexWrap:"wrap",gap:12}}>
      <div>
        <div style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",color:C.sc}}>{'\uD83D\uDC65'} Volunteer CRM</div>
        <h1 style={{fontFamily:F.sf,fontSize:28,fontWeight:400,marginTop:4}}>Volunteer Directory</h1>
      </div>
      <div style={{fontSize:13,color:C.mt}}>{volunteers.length} total volunteers across {programs.length} programs</div>
    </div>
    <hr style={{border:"none",borderTop:"1px solid "+C.rl,margin:"12px 0 22px"}}/>

    {/* Pipeline cards */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:20}}>
      {[['all','All Volunteers',volunteers.length,'#1490B0'],...Object.entries(statusLabels).map(([k,l])=>[k,l,counts[k]||0,statusColors[k]])].map(([k,l,n,col])=>
        <button key={k} onClick={()=>setStatusFilter(k)} style={{padding:"14px 12px",borderRadius:10,border:"1px solid "+(statusFilter===k?col:C.rl),background:statusFilter===k?col+"10":"#fff",cursor:"pointer",fontFamily:"inherit",textAlign:"center",transition:"all .2s"}}>
          <div style={{fontSize:28,fontWeight:800,color:statusFilter===k?col:C.fg}}>{n}</div>
          <div style={{fontSize:11,fontWeight:600,color:statusFilter===k?col:C.mt,marginTop:2}}>{l}</div>
        </button>
      )}
    </div>

    {/* Search + filters */}
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, email, or program..." style={{flex:1,minWidth:200,padding:"10px 14px",border:"1px solid "+C.rl,borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
      <Sel value={programFilter} onChange={e=>setProgramFilter(e.target.value)} style={{minWidth:140}}>
        <option value="all">All Programs</option>
        {programs.map(p=><option key={p} value={p}>{p}</option>)}
      </Sel>
      <Sel value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{minWidth:130}}>
        <option value="name">Sort: Name</option>
        <option value="programs">Sort: Most Programs</option>
        <option value="recent">Sort: Most Recent</option>
      </Sel>
      <span style={{fontSize:12,color:C.mt}}>{filtered.length} result{filtered.length!==1?'s':''}</span>
    </div>

    {/* Volunteer table */}
    <Card style={{overflow:"hidden"}}>
      <div style={{overflowX:"auto",maxHeight:"65vh",overflowY:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
          <thead>
            <tr style={{background:"#F5F6F8"}}>
              {['Name','Email','Programs','Status','First Seen','Last Seen'].map((h,i)=>
                <th key={i} style={{padding:"10px 14px",textAlign:"left",borderBottom:"2px solid "+C.rl,fontSize:11,fontWeight:700,letterSpacing:"0.02em",color:"#323338",position:"sticky",top:0,zIndex:2,background:"#F5F6F8"}}>{h}</th>
              )}
            </tr>
          </thead>
          <tbody>
            {filtered.length===0?<tr><td colSpan={6} style={{padding:"40px",textAlign:"center",color:C.mt}}>No volunteers matching filters</td></tr>:
            filtered.slice(0,500).map(v=>{
              const sc=statusColors[v.status]||C.mt;
              const open=expanded===v.email;
              return<React.Fragment key={v.email}>
                <tr onClick={()=>setExpanded(open?null:v.email)} style={{cursor:"pointer",background:open?"#F0F7FF":"#fff",borderBottom:"1px solid "+C.bgA,transition:"background .15s"}}>
                  <td style={{padding:"10px 14px",fontSize:14,fontWeight:600}}>{v.name||<span style={{color:C.mt,fontStyle:"italic"}}>No name</span>}</td>
                  <td style={{padding:"10px 14px",fontSize:13,color:C.sc,fontFamily:"monospace"}}>{v.email}</td>
                  <td style={{padding:"10px 14px"}}><div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {v.programs.map(p=><span key={p} style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:600,background:p==='Volunteer'?"#DBEAFE":p==='STEM'?"#FEE2E2":p==='Internship'?"#FEF3C7":p==='E-Card'?"#D1FAE5":p==='Chapter'?"#EDE9FE":"#F3F4F6",color:p==='Volunteer'?"#1E40AF":p==='STEM'?"#991B1B":p==='Internship'?"#92400E":p==='E-Card'?"#065F46":p==='Chapter'?"#5B21B6":"#374151"}}>{p}</span>)}
                  </div></td>
                  <td style={{padding:"10px 14px"}}><span style={{padding:"3px 10px",borderRadius:999,fontSize:10,fontWeight:700,background:sc+"15",color:sc,border:"1px solid "+sc+"33"}}>{statusLabels[v.status]}</span></td>
                  <td style={{padding:"10px 14px",fontSize:12,color:C.mt}}>{fmtDate(v.firstSeen)}</td>
                  <td style={{padding:"10px 14px",fontSize:12,color:C.mt}}>{fmtDate(v.lastSeen)}</td>
                </tr>
                {open&&<tr><td colSpan={6} style={{padding:0,borderBottom:"2px solid "+sc}}>
                  <div style={{padding:"16px 18px",background:"#FAFBFC"}}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12}}>
                      <div style={{padding:"12px 14px",background:"#fff",borderRadius:8,border:"1px solid "+C.rl}}>
                        <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Contact</div>
                        <div style={{fontSize:14,fontWeight:600}}>{v.name||'Unknown'}</div>
                        <a href={"mailto:"+v.email} style={{fontSize:12,color:"#1490B0"}}>{v.email}</a>
                      </div>
                      <div style={{padding:"12px 14px",background:"#fff",borderRadius:8,border:"1px solid "+C.rl}}>
                        <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Programs ({v.programs.length})</div>
                        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>
                          {v.programs.map(p=><span key={p} style={{padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:600,background:p==='Volunteer'?"#DBEAFE":p==='STEM'?"#FEE2E2":p==='Internship'?"#FEF3C7":p==='E-Card'?"#D1FAE5":"#EDE9FE",color:p==='Volunteer'?"#1E40AF":p==='STEM'?"#991B1B":p==='Internship'?"#92400E":p==='E-Card'?"#065F46":"#5B21B6"}}>{p}</span>)}
                        </div>
                      </div>
                      <div style={{padding:"12px 14px",background:"#fff",borderRadius:8,border:"1px solid "+C.rl}}>
                        <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Status</div>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                          <span style={{width:8,height:8,borderRadius:4,background:sc}}/>
                          <span style={{fontSize:14,fontWeight:600,color:sc}}>{statusLabels[v.status]}</span>
                        </div>
                      </div>
                      <div style={{padding:"12px 14px",background:"#fff",borderRadius:8,border:"1px solid "+C.rl}}>
                        <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Timeline</div>
                        <div style={{fontSize:12}}>First: {fmtDate(v.firstSeen)}</div>
                        <div style={{fontSize:12}}>Last: {fmtDate(v.lastSeen)}</div>
                      </div>
                    </div>
                    {v.signups.length>0&&<div style={{marginTop:12}}>
                      <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:C.mt,marginBottom:6}}>Signup History</div>
                      {v.signups.map((s,i)=><div key={i} style={{padding:"6px 10px",background:"#fff",borderRadius:6,border:"1px solid "+C.rl,marginBottom:4,fontSize:12,display:"flex",justifyContent:"space-between"}}>
                        <span style={{fontWeight:600}}>{s.program}</span>
                        <span style={{color:C.mt}}>{fmtDate(s.date)}</span>
                      </div>)}
                    </div>}
                    {v.completions.length>0&&<div style={{marginTop:12}}>
                      <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:C.mt,marginBottom:6}}>Completions</div>
                      {v.completions.map((s,i)=><div key={i} style={{padding:"6px 10px",background:"#D1FAE5",borderRadius:6,border:"1px solid #A7F3D0",marginBottom:4,fontSize:12,display:"flex",justifyContent:"space-between"}}>
                        <span style={{fontWeight:600,color:"#065F46"}}>{'\u2705'} {s.program}</span>
                        <span style={{color:"#065F46"}}>{fmtDate(s.date)}</span>
                      </div>)}
                    </div>}
                  </div>
                </td></tr>}
              </React.Fragment>
            })}
          </tbody>
        </table>
      </div>
      {filtered.length>500&&<div style={{padding:"10px",textAlign:"center",fontSize:12,color:C.mt,borderTop:"1px solid "+C.rl}}>Showing 500 of {filtered.length} volunteers. Use search to narrow results.</div>}
    </Card>
  </div>);
}

// === ROADMAP ===
function Roadmap({db,hubData,team,me}){
  const plans=fbToArr(hubData.roadmap||{}).sort((a,b)=>(a.order||99)-(b.order||99));
  const[adding,setAdding]=useState(false);
  const[form,setForm]=useState({title:'',description:'',status:'idea',priority:'medium',lead:'',target:'',tags:''});
  const[expanded,setExpanded]=useState(null);
  const[noteDrafts,setNoteDrafts]=useState({});
  const getNoteText=id=>noteDrafts[id]||'';
  const setNoteText=(id,v)=>setNoteDrafts(d=>({...d,[id]:v}));
  const[viewFilter,setViewFilter]=useState('all');
  const statusLabels={idea:'Idea',planned:'Planned',in_progress:'In Progress',done:'Done',shelved:'Shelved'};
  const statusColors={idea:'#8B5CF6',planned:'#3B82F6',in_progress:'#F59E0B',done:'#10B981',shelved:'#6B7280'};
  const statusIcons={idea:'\uD83D\uDCA1',planned:'\uD83D\uDCCB',in_progress:'\u26A1',done:'\u2705',shelved:'\uD83D\uDCE6'};
  const priColors={high:'#EF4444',medium:'#F59E0B',low:'#3B82F6'};
  const getName=id=>{const m=team.find(t=>t.id===id);return m?fn(m.name):id||'?'};

  const save=()=>{
    if(!form.title.trim())return;
    const ref=db.ref('hub/roadmap').push();
    const tags=form.tags.split(',').map(t=>t.trim()).filter(Boolean);
    ref.set({id:ref.key,title:form.title.trim(),description:form.description.trim(),status:form.status,priority:form.priority,lead:form.lead||me,target:form.target,tags,updates:[],addedBy:me,created:new Date().toISOString(),order:plans.length});
    setForm({title:'',description:'',status:'idea',priority:'medium',lead:'',target:'',tags:''});setAdding(false);
  };
  const updateStatus=(p,s)=>db.ref('hub/roadmap/'+p._fbKey+'/status').set(s);
  const updatePriority=(p,pr)=>db.ref('hub/roadmap/'+p._fbKey+'/priority').set(pr);
  const addUpdate=(p)=>{
    const nt=getNoteText(p._fbKey);if(!nt.trim())return;
    const updates=[...(p.updates||[]),{text:nt.trim(),by:me,date:new Date().toISOString()}];
    db.ref('hub/roadmap/'+p._fbKey+'/updates').set(updates);
    setNoteText(p._fbKey,'');
  };
  const del=p=>{if(confirm('Delete "'+p.title+'"?'))db.ref('hub/roadmap/'+p._fbKey).remove()};
  const filtered=viewFilter==='all'?plans:plans.filter(p=>p.status===viewFilter);
  const counts=Object.keys(statusLabels).reduce((a,k)=>{a[k]=plans.filter(p=>p.status===k).length;return a},{});

  return(<div>
    <SectionHeader variant="strategy" kicker="Strategy" title="Future Plans" meta={[`${plans.length} initiatives`,`${counts.in_progress||0} in progress`,`${counts.done||0} completed`]} actions={<Btn primary onClick={()=>setAdding(!adding)}>{adding?'Cancel':'+ New Initiative'}</Btn>}/>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(90px,1fr))",gap:8,marginBottom:18}}>
      {[['all','All',plans.length,'#1490B0'],...Object.entries(statusLabels).map(([k,l])=>[k,l,counts[k]||0,statusColors[k]])].map(([k,l,n,col])=>
        <button key={k} onClick={()=>setViewFilter(k)} style={{padding:"10px 6px",borderRadius:8,border:"1px solid "+(viewFilter===k?col:C.rl),background:viewFilter===k?col+"12":"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,color:viewFilter===k?col:C.sc,textAlign:"center"}}>
          <div style={{fontSize:18,marginBottom:2}}>{k==='all'?'\uD83D\uDCCA':statusIcons[k]}</div>
          <div style={{fontSize:18,fontWeight:700,color:viewFilter===k?col:C.fg}}>{n}</div>{l}
        </button>
      )}
    </div>

    {adding&&<Card style={{marginBottom:18}}>
      <div style={{padding:18}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>New Initiative</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{gridColumn:"1/-1"}}><Lbl>Title *</Lbl><Inp value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="e.g. CareForBrains Podcast, Summer Program 2026"/></div>
          <div style={{gridColumn:"1/-1"}}><Lbl>Description</Lbl><textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="What is this initiative about? Goals, vision, timeline ideas..." style={{width:"100%",padding:"9px 12px",border:"1px solid "+C.rl,borderRadius:7,fontSize:13,fontFamily:"inherit",outline:"none",minHeight:60,resize:"vertical"}}/></div>
          <div><Lbl>Status</Lbl><Sel value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{Object.entries(statusLabels).map(([k,v])=><option key={k} value={k}>{v}</option>)}</Sel></div>
          <div><Lbl>Priority</Lbl><Sel value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})}><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></Sel></div>
          <div><Lbl>Lead</Lbl><Sel value={form.lead} onChange={e=>setForm({...form,lead:e.target.value})}><option value="">Select lead...</option>{team.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</Sel></div>
          <div><Lbl>Target Date</Lbl><input type="date" value={form.target} onChange={e=>setForm({...form,target:e.target.value})} style={{width:"100%",padding:"9px 12px",border:"1px solid "+C.rl,borderRadius:7,fontSize:13,fontFamily:"inherit"}}/></div>
          <div style={{gridColumn:"1/-1"}}><Lbl>Tags (comma separated)</Lbl><Inp value={form.tags} onChange={e=>setForm({...form,tags:e.target.value})} placeholder="e.g. podcast, content, outreach"/></div>
        </div>
        <div style={{marginTop:12,display:"flex",justifyContent:"flex-end"}}><Btn primary onClick={save}>Save Initiative</Btn></div>
      </div>
    </Card>}

    {filtered.length===0?<Card><div className="empty-state-card" style={{margin:18}}><div className="empty-state-ill">✦</div><div className="empty-state-title">No initiatives {viewFilter!=='all'?'in "'+statusLabels[viewFilter]+'"':''} yet</div><div className="empty-state-copy">Start with one clear initiative and let the updates thread carry the momentum instead of burying it in notes.</div></div></Card>:
    filtered.map(p=>{
      const open=expanded===p._fbKey;
      const sc=statusColors[p.status]||C.mt;
      const pc=priColors[p.priority]||C.mt;
      const updates=Array.isArray(p.updates)?p.updates:[];
      const tags=Array.isArray(p.tags)?p.tags:[];
      const daysUntil=p.target?(()=>{const[y,m,d]=p.target.split('-').map(Number);const t=new Date(y,m-1,d);const n=new Date();n.setHours(0,0,0,0);return Math.ceil((t-n)/(1000*60*60*24))})():null;
      return<Card key={p._fbKey} style={{marginBottom:10,borderLeft:"3px solid "+sc}}>
        <div onClick={()=>setExpanded(open?null:p._fbKey)} style={{padding:"14px 18px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:16}}>{statusIcons[p.status]||''}</span>
              <span style={{fontSize:15,fontWeight:700}}>{p.title}</span>
              <span style={{padding:"3px 10px",borderRadius:999,fontSize:10,fontWeight:700,background:sc+"18",color:sc,border:"1px solid "+sc+"33"}}>{statusLabels[p.status]||p.status}</span>
              <span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:pc+"15",color:pc}}>{(p.priority||'').toUpperCase()}</span>
              {tags.map((t,i)=><span key={i} style={{padding:"2px 6px",borderRadius:4,fontSize:9,fontWeight:600,background:"#E5E7EB",color:"#374151"}}>#{t}</span>)}
              {updates.length>0&&<span style={{fontSize:10,color:C.mt}}>{updates.length} update{updates.length>1?'s':''}</span>}
            </div>
            <div style={{fontSize:12,color:C.mt,marginTop:4}}>
              {p.lead&&<span>Lead: {getName(p.lead)} {'\u00B7'} </span>}
              {p.target&&<span>Target: {(()=>{const[y,m,d]=p.target.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString()})()} {daysUntil!==null&&<span style={{color:daysUntil<0?'#EF4444':daysUntil<14?'#F59E0B':'#10B981'}}>({daysUntil<0?Math.abs(daysUntil)+'d overdue':daysUntil+'d left'})</span>} {'\u00B7'} </span>}
              {p.description&&<span style={{color:C.sc}}>{p.description.slice(0,80)}{p.description.length>80?'...':''}</span>}
            </div>
          </div>
          <span style={{fontSize:12,color:C.mt,transform:open?"rotate(180deg)":"",transition:"transform .2s"}}>{'\u25BC'}</span>
        </div>

        {open&&<div style={{padding:"0 18px 18px",borderTop:"1px solid "+C.rl}}>
          {p.description&&<div style={{padding:"12px 14px",background:C.bgA,borderRadius:8,marginTop:14,fontSize:13,lineHeight:1.6}}>{p.description}</div>}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginTop:14}}>
            <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Lead</div><div style={{fontSize:13}}>{p.lead?getName(p.lead):'Unassigned'}</div></div>
            <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Target Date</div><div style={{fontSize:13}}>{p.target?(()=>{const[y,m,d]=p.target.split('-').map(Number);return new Date(y,m-1,d).toLocaleDateString()})():'Not set'}</div></div>
            <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Added</div><div style={{fontSize:13}}>{getName(p.addedBy)} {'\u00B7'} {new Date(p.created).toLocaleDateString()}</div></div>
          </div>

          <div style={{marginTop:14}}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Status</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {Object.entries(statusLabels).map(([k,v])=><button key={k} onClick={()=>updateStatus(p,k)} style={{padding:"5px 12px",borderRadius:6,border:"1px solid "+(p.status===k?statusColors[k]:C.rl),background:p.status===k?statusColors[k]+"15":"#fff",color:p.status===k?statusColors[k]:C.sc,cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600}}>{statusIcons[k]} {v}</button>)}

            {updates.map((u,i)=><div key={i} style={{padding:"10px 12px",background:C.bgA,borderRadius:8,marginBottom:6,borderLeft:"3px solid "+sc}}>
              <div style={{fontSize:13}}>{u.text}</div>
              <div style={{fontSize:10,color:C.mt,marginTop:4}}>{getName(u.by)} {'\u00B7'} {new Date(u.date).toLocaleDateString()} {new Date(u.date).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</div>
            </div>)}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input value={getNoteText(p._fbKey)} onChange={e=>setNoteText(p._fbKey,e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&getNoteText(p._fbKey).trim())addUpdate(p)}} placeholder="Post an update, progress note, or idea..." style={{flex:1,padding:"9px 12px",border:"1px solid "+C.rl,borderRadius:7,fontSize:13,fontFamily:"inherit",outline:"none"}}/>

          </div>
        </div>}
      </Card>
    })}
  </div>);
}

// === PARTNERSHIPS ===
function Partnerships({db,hubData,team,me}){
  const partners=fbToArr(hubData.partnerships||{}).sort((a,b)=>(b.created||'').localeCompare(a.created||''));
  const[adding,setAdding]=useState(false);
  const[form,setForm]=useState({name:'',contact:'',email:'',website:'',type:'',status:'reaching_out',notes:''});

  const[noteDrafts,setNoteDrafts]=useState({});
  const getNoteText=id=>noteDrafts[id]||'';
  const setNoteText=(id,v)=>setNoteDrafts(d=>({...d,[id]:v}));
  const[filter,setFilter]=useState('all');
  const statusLabels={reaching_out:'Reaching Out',in_contact:'In Contact',confirmed:'Confirmed',declined:'Declined',paused:'Paused'};
  const statusColors={reaching_out:'#F59E0B',in_contact:'#3B82F6',confirmed:'#10B981',declined:'#EF4444',paused:'#6B7280'};
  const typeLabels=['Nonprofit','Corporate','School/University','Government','Media','Healthcare','Tech','Other'];
  const getName=id=>{const m=team.find(t=>t.id===id);return m?fn(m.name):id||'?'};
  const save=()=>{
    if(!form.name.trim())return;
    const ref=db.ref('hub/partnerships').push();
    ref.set({id:ref.key,name:form.name.trim(),contact:form.contact.trim(),email:form.email.trim(),website:form.website.trim(),type:form.type,status:form.status,notes:[],addedBy:me,created:new Date().toISOString()});
    setForm({name:'',contact:'',email:'',website:'',type:'',status:'reaching_out',notes:''});setAdding(false);
  };
  const updateStatus=(p,s)=>db.ref('hub/partnerships/'+p._fbKey+'/status').set(s);
  const addNote=(p)=>{
    const nt=getNoteText(p._fbKey);if(!nt.trim())return;
    const notes=[...(p.notes||[]),{text:nt.trim(),by:me,date:new Date().toISOString()}];
    db.ref('hub/partnerships/'+p._fbKey+'/notes').set(notes);
    setNoteText(p._fbKey,'');
  };
  const del=p=>{if(confirm('Delete partnership "'+p.name+'"?'))db.ref('hub/partnerships/'+p._fbKey).remove()};
  const filtered=filter==='all'?partners:partners.filter(p=>p.status===filter);
  const counts=Object.keys(statusLabels).reduce((a,k)=>{a[k]=partners.filter(p=>p.status===k).length;return a},{});

  return(<div>
    <SectionHeader variant="strategy" kicker="Strategy" title="Partnerships" meta={[`${partners.length} organizations`,`${counts.in_contact||0} in contact`,`${counts.confirmed||0} confirmed`]} actions={<Btn primary onClick={()=>setAdding(!adding)}>{adding?'Cancel':'+ Add Partnership'}</Btn>}/>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:8,marginBottom:18}}>
      {[['all','All',partners.length,'#1490B0'],...Object.entries(statusLabels).map(([k,l])=>[k,l,counts[k]||0,statusColors[k]])].map(([k,l,n,col])=>
        <button key={k} onClick={()=>setFilter(k)} style={{padding:"10px 8px",borderRadius:8,border:"1px solid "+(filter===k?col:C.rl),background:filter===k?col+"12":"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,color:filter===k?col:C.sc,textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:700,color:filter===k?col:C.fg}}>{n}</div>{l}
        </button>
      )}
    </div>

    {adding&&<Card style={{marginBottom:18}}>
      <div style={{padding:18}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:12}}>New Partnership</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><Lbl>Organization Name *</Lbl><Inp value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="e.g. Mental Health America"/></div>
          <div><Lbl>Contact Person</Lbl><Inp value={form.contact} onChange={e=>setForm({...form,contact:e.target.value})} placeholder="e.g. Jane Smith"/></div>
          <div><Lbl>Email</Lbl><Inp value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="jane@mha.org"/></div>
          <div><Lbl>Website</Lbl><Inp value={form.website} onChange={e=>setForm({...form,website:e.target.value})} placeholder="https://..."/></div>
          <div><Lbl>Type</Lbl><Sel value={form.type} onChange={e=>setForm({...form,type:e.target.value})}><option value="">Select type...</option>{typeLabels.map(t=><option key={t} value={t}>{t}</option>)}</Sel></div>
          <div><Lbl>Status</Lbl><Sel value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{Object.entries(statusLabels).map(([k,v])=><option key={k} value={k}>{v}</option>)}</Sel></div>
        </div>
        <div style={{marginTop:12,display:"flex",justifyContent:"flex-end"}}><Btn primary onClick={save}>Save Partnership</Btn></div>
      </div>
    </Card>}

    {filtered.length===0?<Card><div className="empty-state-card" style={{margin:18}}><div className="empty-state-ill">❤</div><div className="empty-state-title">No partnerships {filter!=='all'?'in "'+statusLabels[filter]+'"':''} yet</div><div className="empty-state-copy">Track outreach here so the team can see who is warm, who is stalled, and who needs the next touchpoint.</div></div></Card>:
    filtered.map(p=>{
      const open=expanded===p._fbKey;
      const sc=statusColors[p.status]||C.mt;
      const notes=Array.isArray(p.notes)?p.notes:[];
      return<Card key={p._fbKey} style={{marginBottom:10,borderLeft:"3px solid "+sc}}>
        <div onClick={()=>setExpanded(open?null:p._fbKey)} style={{padding:"14px 18px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span style={{fontSize:15,fontWeight:700}}>{p.name}</span>
              {p.type&&<span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:600,background:C.bgA,color:C.sc}}>{p.type}</span>}
              <span style={{padding:"3px 10px",borderRadius:999,fontSize:10,fontWeight:700,background:sc+"18",color:sc,border:"1px solid "+sc+"33"}}>{statusLabels[p.status]||p.status}</span>
              {notes.length>0&&<span style={{fontSize:10,color:C.mt}}>{notes.length} note{notes.length>1?'s':''}</span>}
            </div>
            <div style={{fontSize:12,color:C.mt,marginTop:4}}>
              {p.contact&&<span>{p.contact} · </span>}
              {p.email&&<span>{p.email} · </span>}

            </div>
          </div>
          <span style={{fontSize:12,color:C.mt,transform:open?"rotate(180deg)":"",transition:"transform .2s"}}>&#9660;</span>
        </div>

        {open&&<div style={{padding:"0 18px 18px",borderTop:"1px solid "+C.rl}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginTop:14}}>
            <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Contact</div><div style={{fontSize:13}}>{p.contact||'Not set'}</div></div>
            <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Email</div>{p.email?<a href={"mailto:"+p.email} style={{fontSize:13,color:"#1490B0"}}>{p.email}</a>:<span style={{fontSize:13,color:C.mt}}>Not set</span>}</div>
            <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Website</div>{p.website?<a href={/^https?:\/\//.test(p.website)?p.website:'https://'+p.website} target="_blank" rel="noreferrer" style={{fontSize:13,color:"#1490B0"}}>{p.website.replace(/^https?:\/\//,'').slice(0,30)}</a>:<span style={{fontSize:13,color:C.mt}}>Not set</span>}</div>
          </div>

          <div style={{marginTop:14}}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",color:C.mt,marginBottom:4}}>Status</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {Object.entries(statusLabels).map(([k,v])=><button key={k} onClick={()=>updateStatus(p,k)} style={{padding:"5px 12px",borderRadius:6,border:"1px solid "+(p.status===k?statusColors[k]:C.rl),background:p.status===k?statusColors[k]+"15":"#fff",color:p.status===k?statusColors[k]:C.sc,cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600}}>{v}</button>)}
            </div>
          </div>

          <div style={{marginTop:16}}>
            <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",color:C.mt,marginBottom:8}}>Notes & Follow-ups ({notes.length})</div>
            {notes.map((n,i)=><div key={i} style={{padding:"10px 12px",background:C.bgA,borderRadius:8,marginBottom:6,borderLeft:"3px solid #1490B0"}}>
              <div style={{fontSize:13}}>{n.text}</div>
              <div style={{fontSize:10,color:C.mt,marginTop:4}}>{getName(n.by)} · {new Date(n.date).toLocaleDateString()} {new Date(n.date).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</div>
            </div>)}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input value={getNoteText(p._fbKey)} onChange={e=>setNoteText(p._fbKey,e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&getNoteText(p._fbKey).trim())addNote(p)}} placeholder="Add a note or follow-up..." style={{flex:1,padding:"9px 12px",border:"1px solid "+C.rl,borderRadius:7,fontSize:13,fontFamily:"inherit",outline:"none"}}/>
              <Btn primary onClick={()=>addNote(p)}>Add</Btn>
            </div>
          </div>

          <div style={{marginTop:14,display:"flex",justifyContent:"flex-end"}}>
            <button onClick={()=>del(p)} style={{padding:"5px 12px",borderRadius:6,border:"1px solid #EF4444",background:"rgba(239,68,68,.06)",color:"#EF4444",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600}}>Delete Partnership</button>
          </div>
        </div>}
      </Card>
    })}
  </div>);
}

// === LOGS ===
function Logs({hubData,team,db}){
  const S={bg:"#0B0F19",card:"#111827",card2:"#0F172A",line:"#1F2937",text:"#E5E7EB",muted:"#6B7280",green:"#10B981",red:"#EF4444",blue:"#3B82F6",amber:"#F59E0B"};
  const logs=fbToArr(hubData.logs||{}).sort((a,b)=>(b.ts||0)-(a.ts||0));
  const[filter,setFilter]=useState('all');
  const[expanded,setExpanded]=useState(null);
  const[hovered,setHovered]=useState(null);
  const[search,setSearch]=useState('');
  const[now,setNow]=useState(Date.now());
  useEffect(()=>{const id=setInterval(()=>setNow(Date.now()),30000);return()=>clearInterval(id)},[]);
  const meta={login:{label:'LOGIN',color:S.green,bg:'rgba(16,185,129,.12)'},logout:{label:'LOGOUT',color:S.muted,bg:'rgba(107,114,128,.14)'},page_view:{label:'PAGE VIEW',color:S.blue,bg:'rgba(59,130,246,.12)'},tab_away:{label:'TAB AWAY',color:S.amber,bg:'rgba(245,158,11,.12)'},tab_return:{label:'TAB RETURN',color:S.blue,bg:'rgba(59,130,246,.10)'},sheet_edit:{label:'SHEET EDIT',color:'#8B5CF6',bg:'rgba(139,92,246,.12)'},task_assign:{label:'TASK ASSIGN',color:'#EC4899',bg:'rgba(236,72,153,.12)'},email_sent:{label:'EMAIL SENT',color:'#06B6D4',bg:'rgba(6,182,212,.12)'},message_sent:{label:'MESSAGE SENT',color:S.amber,bg:'rgba(245,158,11,.12)'}};
  const getName=id=>{const m=team.find(t=>t.id===id);return m?fn(m.name):id||'Unknown'};
  const tsOf=l=>{const t=l.ts||Date.parse(l.time||'');return Number.isFinite(t)?t:0};
  const fmtTime=t=>{if(!t)return'--';try{return new Date(t).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit',second:'2-digit'})}catch{return'--'}};
  const fmtShort=t=>{if(!t)return'--';try{return new Date(t).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}catch{return'--'}};
  const safeIso=t=>{try{return t?new Date(t).toISOString():'N/A'}catch{return'Invalid'}};
  const ago=t=>{const s=Math.max(0,Math.floor((now-t)/1000));if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'};
  const isThreat=l=>l.isProxy==='Yes'||l.isHosting==='Yes';
  const matches=(filter==='all'?logs:logs.filter(l=>l.type===filter)).filter(l=>!search||JSON.stringify(l).toLowerCase().includes(search.toLowerCase()));
  const deleteLog=key=>{if(db)db.ref('hub/logs/'+key).remove()};
  const clearAll=()=>{if(!confirm('PURGE ALL '+matches.length+' RECORDS?'))return;matches.forEach(l=>{if(l._fbKey&&db)db.ref('hub/logs/'+l._fbKey).remove()})};
  const dayStart=new Date();dayStart.setHours(0,0,0,0);
  const last24=now-86400000;
  const todayLogs=logs.filter(l=>tsOf(l)>=dayStart.getTime());
  const loginToday=todayLogs.filter(l=>l.type==='login');
  const activeUsersToday=[...new Set(loginToday.map(l=>l.user).filter(Boolean))];
  const uniqueIPs24=[...new Set(logs.filter(l=>tsOf(l)>=last24).map(l=>l.ip).filter(Boolean))].length;
  const threatCount24=logs.filter(l=>tsOf(l)>=last24&&isThreat(l)).length;
  const userCounts=todayLogs.reduce((a,l)=>{const k=l.user||'?';a[k]=(a[k]||0)+1;return a},{});
  const mostActiveEntry=Object.keys(userCounts).sort((a,b)=>userCounts[b]-userCounts[a])[0];
  const lastLogin=logs.find(l=>l.type==='login');
  const series=pred=>Array.from({length:7},(_,i)=>{const start=new Date(dayStart);start.setDate(start.getDate()-(6-i));const end=new Date(start);end.setDate(end.getDate()+1);return logs.filter(l=>pred(l)&&tsOf(l)>=start.getTime()&&tsOf(l)<end.getTime()).length});
  const spark=(pts,color)=>{const max=Math.max(1,...pts);return<div style={{display:'flex',gap:4,alignItems:'flex-end',height:28,marginTop:12}}>{pts.map((n,i)=><span key={i} style={{flex:1,height:Math.max(5,Math.round((n/max)*28)),borderRadius:999,background:n?color+'CC':S.line,opacity:n?1:.55}}/>)}</div>};
  const cards=[
    {k:'AU',label:'Active Sessions Today',value:String(activeUsersToday.length),sub:activeUsersToday.length?'Users with login events today':'No logins today',color:S.green,series:series(l=>l.type==='login')},
    {k:'IP',label:'Unique IPs (24h)',value:String(uniqueIPs24),sub:'Distinct addresses seen in last 24h',color:S.blue,series:series(l=>!!l.ip)},
    {k:'TH',label:'Threats Detected',value:String(threatCount24),sub:threatCount24?'Proxy or datacenter signals in last 24h':'No threat signals in last 24h',color:threatCount24?S.red:S.muted,series:series(l=>isThreat(l))},
    {k:'MU',label:'Most Active User Today',value:mostActiveEntry?getName(mostActiveEntry):'--',sub:mostActiveEntry?(userCounts[mostActiveEntry]+' events today'):'No activity today',color:S.amber,series:series(l=>l.user===mostActiveEntry)},
    {k:'LL',label:'Last Login',value:lastLogin?fmtShort(lastLogin.time||lastLogin.ts):'--',sub:lastLogin?(lastLogin.city||lastLogin.ip||'Unknown source'):'No recent login found',color:S.blue,series:series(l=>l.type==='login')}
  ];
  const summary=l=>{
    if(l.type==='login')return isThreat(l)?'Login from flagged network':'User signed in';
    if(l.type==='logout')return'User signed out';
    if(l.type==='page_view')return(l.from||'?')+' \u2192 '+(l.page||'?');
    if(l.type==='tab_away')return'User moved away from Mission Control';
    if(l.type==='tab_return')return'User returned to Mission Control';
    if(l.type==='sheet_edit')return(l.sheet||'Sheet')+' ['+(l.cell||'?')+'] '+((l.oldValue||'').slice(0,18)||'empty')+' \u2192 '+((l.newValue||'').slice(0,18)||'empty');
    if(l.type==='task_assign')return'"'+((l.task||'').slice(0,54)||'Task')+'" \u2192 '+getName(l.assignee);
    if(l.type==='email_sent')return(l.subject||'Email sent').slice(0,72);
    if(l.type==='message_sent')return'To '+(l.toName||'?')+': "'+((l.message||'').slice(0,48))+'"';
    return'Activity recorded';
  };
  const location=l=>[l.city,l.region,l.country].filter(Boolean).join(', ')||l.ip||'--';
  const detailSection=(title,items,color)=><div style={{background:S.card2,border:'1px solid '+S.line,borderRadius:14,padding:14}}>
    <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:color||S.muted,marginBottom:12}}>{title}</div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
      {items.map(([label,val],i)=><div key={i} style={{padding:'10px 12px',borderRadius:10,background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.04)'}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:S.muted,marginBottom:4}}>{label}</div>
        <div style={{fontSize:13,fontFamily:"'Courier New',monospace",color:S.text,wordBreak:'break-word'}}>{val||'N/A'}</div>
      </div>)}
    </div>
  </div>;
  const types=['all',...Object.keys(meta).filter(k=>logs.some(l=>l.type===k))];

  return(<div style={{margin:'-28px -36px -40px',padding:'24px 28px 32px',minHeight:'calc(100vh - 60px)',background:S.bg,color:S.text,fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16,marginBottom:20,flexWrap:'wrap'}}>
      <div>
        <div style={{fontSize:28,fontWeight:700,letterSpacing:'-0.02em'}}>Security Operations</div>
        <div style={{marginTop:6,fontSize:13,color:S.muted}}>{logs.length} total records  |  Last updated {new Date(now).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'})}</div>
      </div>
      <div style={{display:'inline-flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:999,background:S.card,border:'1px solid '+S.line}}>

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12,flexWrap:'wrap',padding:'14px 16px',background:S.card,border:'1px solid '+S.line,borderRadius:16,marginBottom:16}}>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        {types.map(t=>{const count=t==='all'?logs.length:logs.filter(l=>l.type===t).length;const m=meta[t]||{label:'ALL',color:S.text,bg:'rgba(255,255,255,.04)'};const active=filter===t;return<button key={t} onClick={()=>setFilter(t)} style={{padding:'9px 14px',borderRadius:999,border:'1px solid '+(active?m.color:S.line),background:active?m.bg:'transparent',color:active?m.color:S.text,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:700,letterSpacing:'0.02em'}}>{t==='all'?'All Events':m.label} <span style={{color:active?m.color:S.muted}}>{count}</span></button>})}

      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginLeft:'auto'}}>

        <button onClick={clearAll} style={{padding:'10px 12px',borderRadius:12,border:'1px solid '+S.red+'66',background:'rgba(239,68,68,.10)',color:S.red,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:700}}>Purge {matches.length}</button>

    </div>

    <div style={{background:S.card,border:'1px solid '+S.line,borderRadius:18,overflow:'hidden',boxShadow:'0 16px 40px rgba(0,0,0,.22)'}}>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',minWidth:980}}>
          <thead>
            <tr style={{background:S.card2}}>
              {['Time','Type','User','Summary','Location'].map((h,i)=><th key={i} style={{position:'sticky',top:0,zIndex:2,padding:'14px 16px',borderBottom:'1px solid '+S.line,textAlign:'left',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.12em',color:S.muted}}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {matches.length===0?<tr><td colSpan={5} style={{padding:'48px 20px',textAlign:'center',color:S.muted,fontSize:14}}>No matching activity records.</td></tr>:matches.slice(0,300).map((l,i)=>{
              const m=meta[l.type]||{label:(l.type||'EVENT').toUpperCase(),color:S.text,bg:'rgba(255,255,255,.06)'};
              const quiet=l.type==='page_view'||l.type==='tab_return';
              const accent=isThreat(l)?S.red:l.type==='tab_away'?S.amber:l.type==='login'?S.green:'transparent';
              const open=expanded===l._fbKey;
              const rowBg=open?S.card2:(hovered===l._fbKey?'rgba(255,255,255,.02)':i%2?S.card:'#0E1626');
              return<React.Fragment key={l._fbKey}>
                <tr onClick={()=>setExpanded(open?null:l._fbKey)} onMouseEnter={()=>setHovered(l._fbKey)} onMouseLeave={()=>setHovered(null)} style={{cursor:'pointer',background:rowBg,boxShadow:accent!=='transparent'?'inset 3px 0 0 '+accent:'none',opacity:quiet?0.82:1,transition:'background .16s ease'}}>
                  <td style={{padding:'14px 16px',borderBottom:'1px solid '+S.line,fontSize:13,color:S.text,fontFamily:"'Courier New',monospace",whiteSpace:'nowrap'}}>{fmtTime(l.time||l.ts)}<div style={{fontSize:11,color:S.muted,marginTop:4}}>{ago(tsOf(l))}</div></td>
                  <td style={{padding:'14px 16px',borderBottom:'1px solid '+S.line}}><span style={{display:'inline-flex',padding:'6px 10px',borderRadius:999,border:'1px solid '+m.color+'33',background:m.bg,color:m.color,fontSize:11,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase'}}>{m.label}</span></td>
                  <td style={{padding:'14px 16px',borderBottom:'1px solid '+S.line,fontSize:14,fontWeight:600,color:S.text}}>{getName(l.user)}</td>
                  <td style={{padding:'14px 16px',borderBottom:'1px solid '+S.line,fontSize:14,color:quiet?S.muted:S.text}}>
                    {summary(l)}
                    {isThreat(l)&&<span style={{marginLeft:8,padding:'3px 8px',borderRadius:999,background:'rgba(239,68,68,.10)',color:S.red,fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em'}}>Flagged Network</span>}
                  </td>
                  <td style={{padding:'14px 16px',borderBottom:'1px solid '+S.line,fontSize:13,color:S.muted}}>{location(l)}</td>
                </tr>
                {open&&<tr>
                  <td colSpan={5} style={{padding:0,borderBottom:'1px solid '+S.line}}>
                    <div style={{padding:'18px 18px 20px',background:'#0D1422'}}>
                      {isThreat(l)&&<div style={{marginBottom:14,padding:'12px 14px',borderRadius:12,background:'rgba(239,68,68,.10)',border:'1px solid rgba(239,68,68,.28)',color:'#FCA5A5',fontSize:13,fontWeight:700}}>Threat detected: {l.isProxy==='Yes'?'proxy/VPN signal':'datacenter IP signal'}.</div>}
                      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:12}}>
                        {detailSection('Location',[['Timestamp',safeIso(l.time)],['IP',l.ip],['City',l.city],['Region',l.region],['Country',l.country],['ISP',l.isp],['Organization',l.org],['ASN',l.asn],['Geo Source',l.geoSource],['GPS Accuracy',l.gpsAccuracy],['Map',l.lat&&l.lon?<a href={'https://www.google.com/maps?q='+l.lat+','+l.lon} target="_blank" rel="noreferrer" style={{color:S.blue,textDecoration:'none'}}>Open map ↗</a>:'N/A']],S.blue)}
                        {detailSection('Device',[['Browser',l.browser],['OS',l.os],['Device',l.device],['Platform',l.platform],['Screen',l.screen],['Window',l.window],['GPU',l.gpu],['Touch',l.touch]],S.green)}
                        {detailSection('Fingerprint',[['Canvas Hash',l.canvasFP],['Fonts',l.fontsDetected],['Plugins',l.plugins],['Ad Blocker',l.adBlock],['Cookies',l.cookiesEnabled],['DNT',l.doNotTrack]],'#A78BFA')}
                        {detailSection('Network',[['Connection',l.network],['Bandwidth',l.downlink],['Battery',l.battery],['Mobile',l.isMobile],['Proxy/VPN',l.isProxy],['Datacenter',l.isHosting]],S.amber)}
                        {detailSection('Session',[['Referrer',l.referrer],['Session Start',l.sessionStart],['Timezone',l.tz],['Languages',l.languages||l.lang],['Record ID',l._fbKey?.slice(-12)],['User',getName(l.user)]],S.muted)}
                      </div>
                      {(l.type==='sheet_edit'||l.type==='task_assign'||l.type==='email_sent'||l.type==='message_sent')&&<div style={{marginTop:12,padding:'14px',borderRadius:14,background:S.card2,border:'1px solid '+S.line}}>
                        <div style={{fontSize:11,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:S.muted,marginBottom:12}}>Event Context</div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:10}}>
                          {l.type==='sheet_edit'&&[['Sheet',l.sheet],['Cell',l.cell],['Before',l.oldValue||'empty'],['After',l.newValue||'empty']].map(([k,v])=><div key={k} style={{fontSize:13,color:S.text}}><div style={{fontSize:10,color:S.muted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{k}</div><div style={{fontFamily:"'Courier New',monospace"}}>{v}</div></div>)}
                          {l.type==='task_assign'&&[['Task',l.task],['Assignee',getName(l.assignee)],['Priority',l.priority]].map(([k,v])=><div key={k} style={{fontSize:13,color:S.text}}><div style={{fontSize:10,color:S.muted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{k}</div><div style={{fontFamily:"'Courier New',monospace"}}>{v}</div></div>)}
                          {l.type==='email_sent'&&[['Template',l.template],['Recipient',l.to],['Subject',l.subject]].map(([k,v])=><div key={k} style={{fontSize:13,color:S.text}}><div style={{fontSize:10,color:S.muted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{k}</div><div style={{fontFamily:"'Courier New',monospace"}}>{v}</div></div>)}
                          {l.type==='message_sent'&&[['Recipient',l.toName],['SMS Status',l.smsStatus],['Email Sent',l.emailSent],['Message',l.message]].map(([k,v])=><div key={k} style={{fontSize:13,color:S.text}}><div style={{fontSize:10,color:S.muted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:4}}>{k}</div><div style={{fontFamily:"'Courier New',monospace"}}>{v||'N/A'}</div></div>)}
                        </div>
                      </div>}
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:14,gap:12,flexWrap:'wrap'}}>
                        <div style={{fontSize:11,color:S.muted,fontFamily:"'Courier New',monospace"}}>{l._fbKey}</div>
                        <button onClick={e=>{e.stopPropagation();if(confirm('PERMANENTLY DESTROY THIS RECORD?')){deleteLog(l._fbKey);setExpanded(null)}}} style={{padding:'10px 12px',borderRadius:12,border:'1px solid '+S.red+'66',background:'rgba(239,68,68,.10)',color:S.red,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:700}}>Delete Record</button>
                      </div>
                    </div>
                  </td>
                </tr>}
              </React.Fragment>
            })}
          </tbody>
        </table>
      </div>
      {matches.length>300&&<div style={{padding:'12px 16px',borderTop:'1px solid '+S.line,fontSize:12,color:S.muted,textAlign:'center'}}>Showing 300 of {matches.length} matching records. Use search or filters to narrow results.</div>}
    </div>
  </div>);
}

// === MAIN APP ===
function App(){
  const fbCfg=FIREBASE_CONFIG;
  const[hubData,setHubData]=useState(null);
  const[user,setUser]=useState(()=>gL());
  const[tab,setTab]=useState('my');
  const dbRef=useRef(null);
  const[time,setTime]=useState(new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}));

  useEffect(()=>{
    if(!fbCfg)return;
    try{
      if(!firebase.apps.length)firebase.initializeApp(fbCfg);
      const db=firebase.database();
      dbRef.current=db;
      db.ref('hub').on('value',snap=>{
        const val=snap.val();
        if(val)setHubData(val);
        else{setHubData(SEED)}
      });
    }catch(e){console.error(e);localStorage.removeItem(LK);window.location.reload()}
    return()=>{if(dbRef.current)dbRef.current.ref('hub').off()};
  },[fbCfg]);

  // Smart auto-sync: runs every 30s, only writes to Firebase when data actually changed
  const syncHashRef=useRef({});
  useEffect(()=>{
    if(!dbRef.current||!hubData?.sheets)return;
    const db=dbRef.current;
    const syncAll=async()=>{
      const sheets=Object.keys(hubData.sheets).filter(k=>k!=='_seed').map(k=>normSheetEntry(hubData.sheets[k]));
      for(const s of sheets){
        const sid=getSheetId(s.url);if(!sid)continue;
        if(_lastSheetEdit[s.id]&&Date.now()-_lastSheetEdit[s.id]<45000)continue;
        try{
          const r=await fetch('https://docs.google.com/spreadsheets/d/'+sid+'/export?format=csv');
          if(!r.ok)continue;
          const text=await r.text();
          if(text.trim().startsWith('<!'))continue;
          const hash=text.length+'-'+Array.from(text).reduce((h,c)=>(((h<<5)-h)+c.charCodeAt(0))|0,0);
          if(syncHashRef.current[s.id]===hash){_lastBgSync=Date.now();continue}
          syncHashRef.current[s.id]=hash;
          const rows=parseCSV(text);
          db.ref('hub/sheetData/'+s.id).set(rows.length>0?rows:[]);
          _lastBgSync=Date.now();
        }catch(e){console.warn('Sync failed for',s.name,e)}
      }
    };
    syncAll();
    const iv=setInterval(syncAll,30000);
    return()=>clearInterval(iv);
  },[JSON.stringify(Object.keys(hubData?.sheets||{}))]);

  const logout=()=>{
    if(dbRef.current&&user)logEvent(dbRef.current,'logout',{user:user.id});
    localStorage.removeItem(LK);setUser(null);setTab('my');
  };

  // Track tab switches (page views)
  const prevTab=useRef(tab);
  useEffect(()=>{
    if(!dbRef.current||!user)return;
    if(tab!==prevTab.current){
      logEvent(dbRef.current,'page_view',{user:user.id,page:tab,from:prevTab.current});
      prevTab.current=tab;
    }
  },[tab]);

  // Track when user leaves/returns to Mission Control tab
  useEffect(()=>{
    if(!dbRef.current||!user)return;
    const h=()=>{
      if(document.hidden)logEvent(dbRef.current,'tab_away',{user:user.id,page:tab});
      else logEvent(dbRef.current,'tab_return',{user:user.id,page:tab});
    };
    document.addEventListener('visibilitychange',h);
    return()=>document.removeEventListener('visibilitychange',h);
  },[user,tab]);

  
  if(!hubData)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F.sn}}><div style={{textAlign:"center"}}><img src={LOGO} alt="" style={{width:40,height:40,borderRadius:10,marginBottom:10,opacity:0.5}}/><div style={{fontSize:13,color:C.mt}}>Connecting...</div></div></div>);

  const team=hubData.team||TEAM;
  const tasks=fbToArr(hubData.tasks);
  const events=fbToArr(hubData.events);
  const announcements=fbToArr(hubData.announcements);
  const passwords=hubData.passwords||{};
  const db=dbRef.current;

  if(!user)return<Login onLogin={id=>setUser({id})} passwords={passwords} team={team}/>;

  const me=user.id;const isA=team.find(t=>t.id===me)?.admin;const canEmail=canUseEmails(me);
  const safeTab=(tab==='assign'&&!isA)||(tab==='settings'&&!isA)||(tab==='logs'&&me!=='tanmay')||(tab==='emails'&&!canEmail)?'my':tab;
  const titles={my:'Dashboard',emails:'Comms',team:'Team Board',assign:'Assign Work',calendar:'Calendar',contacts:'Contacts',sheets:'Sheets',board:'Announcements',settings:'Settings',logs:'Activity Log',roadmap:'Future Plans',partners:'Partnerships'};
  const V=()=>{switch(safeTab){
    case 'my':return<MyWork db={db} tasks={tasks} events={events} team={team} me={me} hubData={hubData}/>;
    case 'team':return<TeamBoard db={db} tasks={tasks} team={team} me={me}/>;
    case 'assign':return isA?<Assign db={db} tasks={tasks} team={team} me={me} hubData={hubData}/>:<MyWork db={db} tasks={tasks} events={events} team={team} me={me} hubData={hubData}/>;
    case 'calendar':return<Cal db={db} events={events} tasks={tasks} team={team} me={me}/>;
    case 'contacts':return<Contacts db={db} team={team} me={me}/>;
    case 'sheets':return<Sheets db={db} hubData={hubData} team={team} me={me}/>;
    case 'emails':return canEmail?<Emails db={db} hubData={hubData} team={team} me={me}/>:<MyWork db={db} tasks={tasks} events={events} team={team} me={me} hubData={hubData}/>;
    case 'board':return<Board db={db} announcements={announcements} team={team} me={me}/>;
    case 'settings':return isA?<Settings db={db} passwords={passwords} team={team} hubData={hubData}/>:<MyWork db={db} tasks={tasks} events={events} team={team} me={me} hubData={hubData}/>;
    case 'roadmap':return<Roadmap db={db} hubData={hubData} team={team} me={me}/>;
    case 'partners':return<Partnerships db={db} hubData={hubData} team={team} me={me}/>;
    case 'logs':return me==='tanmay'?<Logs hubData={hubData} team={team} db={db}/>:<MyWork db={db} tasks={tasks} events={events} team={team} me={me} hubData={hubData}/>;
    default:return<MyWork db={db} tasks={tasks} events={events} team={team} me={me} hubData={hubData}/>}};

  const mobileTabs=[['my','Home'],['team','Team'],['sheets','Sheets'],['emails','Comms'],['calendar','Cal'],['roadmap','Plans'],['partners','CRM'],['board','Posts'],['contacts','Dir']];
  const[mobileMore,setMobileMore]=useState(false);
  return(<div style={{display:"flex",minHeight:"100vh",fontFamily:F.sn,color:C.fg,background:"#F8FAFC"}}>
    <div className="mobile-nav" style={{flexWrap:'wrap',height:'auto',minHeight:56,paddingTop:4,paddingBottom:4}}>{mobileTabs.map(([id,label])=><button key={id} className={safeTab===id?'mnav-active':''} onClick={()=>setTab(id)} style={{fontSize:10,padding:'6px 8px',minWidth:40}}>{label}</button>)}</div>    <Sidebar tab={safeTab} setTab={setTab} me={me} team={team} logout={logout}/>
    <div className="main-bg" className="main-bg main-content" style={{marginLeft:240,flex:1,minHeight:"100vh"}}>
      <div className="topbar-shell" style={{position:"sticky",top:0,padding:"12px 36px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:50}}>
        <span className="topbar-title" style={{fontFamily:F.sf,fontSize:19,fontWeight:400}}>{titles[safeTab]}</span>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span className="live-pill" style={{fontSize:10,color:"#1490B0",fontWeight:700}}><span className="live-pill-dot"></span>LIVE</span>
          <span style={{fontSize:11,color:C.mt,fontFamily:"monospace"}}>{time}</span></div></div>
      <div style={{padding:"28px 36px 40px",width:"100%",maxWidth:"none",overflow:"hidden"}}><div key={safeTab} className="page-enter section-shell"><V/></div></div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
