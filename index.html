<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareForBrains — Mission Control</title>
<link rel="icon" href="https://raw.githubusercontent.com/careforbrains-stack/careforbrains-website/main/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:#F8FAFC;color:#0B1A26}#root{min-height:100vh}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const IMG="https://raw.githubusercontent.com/careforbrains-stack/careforbrains-website/main/images/";
const LOGO="https://raw.githubusercontent.com/careforbrains-stack/careforbrains-website/main/logo.png";
const TEAM=[
  {id:"tanmay",name:"Tanmay Vasudeva",role:"Founder & CEO",img:IMG+"tanmay.webp",color:"#1490B0",phone:"",email:"",admin:true},
  {id:"ezra",name:"Ezra Weng",role:"Co-Founder & COO",img:IMG+"ezra.png",color:"#0C6B8E",phone:"",email:"",admin:true},
  {id:"eric",name:"Eric Zang",role:"Director of Chapter Outreach",img:IMG+"eric.avif",color:"#1468B0",phone:"",email:"",admin:false},
  {id:"raheesh",name:"Raheesh Basaria",role:"Director of Online Marketing",img:IMG+"raheesh.avif",color:"#3A5068",phone:"",email:"",admin:false},
  {id:"zavier",name:"Zavier Hayat",role:"Director of STEM Exploration",img:IMG+"zavier.jpeg",color:"#38C0D4",phone:"",email:"",admin:false},
];
const SEED={team:TEAM,tasks:{_seed:true},events:{_seed:true},sheets:{s1:{id:"s1",name:"Volunteer Signups",desc:"Applications",url:""},s2:{id:"s2",name:"Event Planning",desc:"Logistics",url:""},s3:{id:"s3",name:"PVSA Hours",desc:"Hours",url:""}},announcements:{a1:{id:"a1",author:"Tanmay",date:"2026-03-03",text:"Mission Control is live. Check your assignments.",ts:1}},passwords:{tanmay:"cfb2026",ezra:"cfb2026",eric:"cfb2026",raheesh:"cfb2026",zavier:"cfb2026"},sheetsApiKey:"",sheetData:{_seed:true}};
const LK="cfb_mc_login",FK="cfb_mc_fb";
const gL=()=>{try{return JSON.parse(localStorage.getItem(LK))}catch{return null}};
const sL=d=>localStorage.setItem(LK,JSON.stringify(d));
const gF=()=>{try{return JSON.parse(localStorage.getItem(FK))}catch{return null}};
const sF=d=>localStorage.setItem(FK,JSON.stringify(d));
const fn=n=>n?.split(' ')[0]||'';

const C={bg:"#F8FAFC",bgA:"#EDF2F8",dk:"#091A26",fg:"#0B1A26",sc:"#3A5068",mt:"#7A8FA4",tl:"#1490B0",td:"#0C6B8E",tg:"rgba(20,144,176,0.12)",rl:"#CDDAE6",cd:"#FFF",cb:"#C8D8E6",rd:"#EF4444",gn:"#10B981"};
const F={sf:"'Playfair Display',Georgia,serif",sn:"'Plus Jakarta Sans',-apple-system,sans-serif"};

function Av({m,s=38}){const[e,setE]=useState(false);if(m?.img&&!e)return React.createElement('img',{src:m.img,alt:'',style:{width:s,height:s,borderRadius:8,objectFit:'cover',flexShrink:0,background:m.color},onError:()=>setE(true)});return<div style={{width:s,height:s,borderRadius:8,background:m?.color||C.tl,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:s*.38,flexShrink:0}}>{m?.name?.[0]||"?"}</div>}
function Tag({t}){const m={high:{b:"#FEE2E2",c:C.rd},medium:{b:"#FEF3C7",c:"#D97706"},low:{b:"#DBEAFE",c:"#2563EB"},done:{b:"#D1FAE5",c:C.gn}};const v=m[t]||m.medium;return<span style={{display:"inline-flex",padding:"2px 8px",borderRadius:4,fontSize:9.5,fontWeight:700,background:v.b,color:v.c,textTransform:"uppercase",letterSpacing:"0.04em",fontFamily:"monospace"}}>{t}</span>}
function Btn({primary,children,onClick,style:sx,...p}){return<button onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"7px 16px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",border:primary?"1px solid "+C.dk:"1px solid "+C.rl,background:primary?C.dk:C.cd,color:primary?"#F8FAFC":C.fg,fontFamily:"inherit",...sx}} {...p}>{children}</button>}
function Inp(p){return<input style={{width:"100%",padding:"9px 12px",background:C.cd,border:"1px solid "+C.rl,borderRadius:7,color:C.fg,fontSize:13,fontFamily:"inherit",outline:"none",...(p.style||{})}} {...p}/>}
function Sel({style:sx,...p}){return<select style={{width:"100%",padding:"9px 12px",background:C.cd,border:"1px solid "+C.rl,borderRadius:7,color:C.fg,fontSize:13,fontFamily:"inherit",...(sx||{})}} {...p}/>}
function Lbl({children}){return<label style={{display:"block",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt,marginBottom:5}}>{children}</label>}
function Card({children,style:sx}){return<div style={{background:C.cd,border:"1px solid "+C.cb,borderRadius:10,overflow:"hidden",marginBottom:14,...(sx||{})}}>{children}</div>}
function CardH({children,right}){return<div style={{padding:"12px 18px",borderBottom:"1px solid "+C.bgA,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:10.5,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:C.sc}}>{children}</span>{right}</div>}

// === FIREBASE HELPERS ===
// Convert Firebase objects (with keys) to arrays, filtering _seed markers
function fbToArr(obj){if(!obj)return[];return Object.keys(obj).filter(k=>k!=='_seed').map(k=>({...obj[k],_fbKey:k}))}

// === FIREBASE SETUP ===
function FirebaseSetup(){
  const[raw,setRaw]=useState('');
  const[mode,setMode]=useState('paste');
  const[cfg,setCfg]=useState({apiKey:'',databaseURL:'',authDomain:'',projectId:''});

  const parseAndSave=()=>{
    try{
      let c=raw;
      const match=c.match(/\{[\s\S]*apiKey[\s\S]*\}/);
      if(match)c=match[0];
      c=c.replace(/(\w+)\s*:/g,'"$1":').replace(/'/g,'"').replace(/,\s*\}/g,'}').replace(/\/\/.*/g,'');
      const p=JSON.parse(c);
      if(p.apiKey&&p.databaseURL){sF(p);window.location.reload()}
      else alert('Missing apiKey or databaseURL')
    }catch{alert('Could not parse. Copy the full firebaseConfig object.')}
  };
  const saveManual=()=>{if(!cfg.apiKey||!cfg.databaseURL){alert('API Key and Database URL required');return}sF(cfg);window.location.reload()};

  return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F.sn}}>
    <div style={{width:560,maxWidth:"92vw"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <img src={LOGO} alt="" style={{width:48,height:48,borderRadius:12,marginBottom:10}}/>
        <h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400}}>Mission Control Setup</h1>
        <p style={{fontSize:13,color:C.mt,marginTop:6,lineHeight:1.6}}>Connect Firebase so the whole team shares one database in real time.</p>
      </div>
      <div style={{background:C.cd,border:"1px solid "+C.cb,borderRadius:12,padding:28}}>
        <div style={{background:C.bgA,borderRadius:8,padding:16,marginBottom:20,fontSize:12.5,color:C.sc,lineHeight:1.7}}>
          <strong>One-time setup (3 min):</strong><br/>
          1. Go to <a href="https://console.firebase.google.com" target="_blank" style={{color:C.tl}}>console.firebase.google.com</a><br/>
          2. "Add project" &#8594; name it <code style={{background:"#fff",padding:"1px 5px",borderRadius:3}}>careforbrains-hub</code><br/>
          3. Disable Analytics &#8594; Create<br/>
          4. Build &#8594; Realtime Database &#8594; Create Database &#8594; <strong>test mode</strong><br/>
          5. Project Settings (gear) &#8594; scroll &#8594; Web app (&lt;/&gt;)<br/>
          6. Register app, copy the <code>firebaseConfig</code> object<br/>
          7. Paste below
        </div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          {['paste','manual'].map(m=><button key={m} onClick={()=>setMode(m)} style={{padding:"6px 14px",borderRadius:6,fontSize:12,fontWeight:600,border:"1px solid "+C.rl,background:mode===m?C.dk:C.cd,color:mode===m?"#fff":C.fg,cursor:"pointer",fontFamily:"inherit"}}>{m==='paste'?'Paste Config':'Manual'}</button>)}
        </div>
        {mode==='paste'?<div>
          <Lbl>Paste firebaseConfig</Lbl>
          <textarea style={{width:"100%",padding:12,background:C.cd,border:"1px solid "+C.rl,borderRadius:7,color:C.fg,fontSize:12,fontFamily:"monospace",outline:"none",minHeight:140,resize:"vertical"}} value={raw} onChange={e=>setRaw(e.target.value)} placeholder='const firebaseConfig = {\n  apiKey: "AIza...",\n  databaseURL: "https://...",\n  ...\n};'/>
          <Btn primary onClick={parseAndSave} style={{width:"100%",justifyContent:"center",marginTop:14,padding:12}}>Connect</Btn>
        </div>:<div>
          {[['API Key *','apiKey','AIzaSy...'],['Database URL *','databaseURL','https://xxx-default-rtdb.firebaseio.com'],['Auth Domain','authDomain','xxx.firebaseapp.com'],['Project ID','projectId','careforbrains-hub']].map(([l,k,ph])=><div key={k} style={{marginBottom:10}}><Lbl>{l}</Lbl><Inp value={cfg[k]} onChange={e=>setCfg({...cfg,[k]:e.target.value})} placeholder={ph}/></div>)}
          <Btn primary onClick={saveManual} style={{width:"100%",justifyContent:"center",marginTop:8,padding:12}}>Connect</Btn>
        </div>}
      </div>
      <div style={{textAlign:"center",marginTop:16,fontSize:10.5,color:C.mt}}>Each team member does this once on their device. Same config for everyone.</div>
    </div>
  </div>);
}

// === LOGIN ===
function Login({onLogin,passwords,team}){
  const[sel,setSel]=useState(null);const[pass,setPass]=useState('');const[err,setErr]=useState('');
  const go=()=>{if(passwords?.[sel]&&pass!==passwords[sel]){setErr('Wrong password');setTimeout(()=>setErr(''),2e3);return}sL({id:sel});onLogin(sel)};
  return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F.sn}}>
    <div style={{width:440,maxWidth:"90vw"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <img src={LOGO} alt="" style={{width:48,height:48,borderRadius:12,marginBottom:10}}/>
        <h1 style={{fontFamily:F.sf,fontSize:28,fontWeight:400}}>Mission Control</h1>
        <div style={{marginTop:8,display:"inline-flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:20,background:"#D1FAE5",fontSize:11,fontWeight:600,color:C.gn}}><span style={{width:6,height:6,borderRadius:3,background:C.gn,display:"inline-block"}}></span> Synced in real time</div>
      </div>
      <div style={{background:C.cd,border:"1px solid "+C.cb,borderRadius:12,padding:28}}>
        {!sel?<div>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.12em",color:C.mt,marginBottom:14}}>Sign in as</div>
          {team.map(m=><button key={m.id} onClick={()=>setSel(m.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"12px 14px",border:"1px solid "+C.rl,borderRadius:8,background:C.cd,cursor:"pointer",marginBottom:8,fontFamily:"inherit",textAlign:"left"}}>
            <Av m={m} s={36}/><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{m.name}</div><div style={{fontSize:10.5,color:C.mt}}>{m.role}</div></div>
            {m.admin&&<span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:C.tg,color:C.tl,fontFamily:"monospace"}}>ADMIN</span>}
          </button>)}
        </div>:<div>
          <button onClick={()=>{setSel(null);setPass('');setErr('')}} style={{fontSize:12,color:C.tl,background:"none",border:"none",cursor:"pointer",marginBottom:16,fontFamily:"inherit",fontWeight:600}}>&#8592; Back</button>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}><Av m={team.find(t=>t.id===sel)} s={44}/><div style={{fontWeight:700,fontSize:16}}>{team.find(t=>t.id===sel)?.name}</div></div>
          <div style={{marginBottom:14}}><Lbl>Password</Lbl><input type="password" style={{width:"100%",padding:"11px 14px",background:C.cd,border:"1px solid "+C.rl,borderRadius:8,color:C.fg,fontSize:14,fontFamily:"inherit",outline:"none"}} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} autoFocus/></div>
          {err&&<div style={{color:C.rd,fontSize:12,fontWeight:600,marginBottom:10}}>{err}</div>}
          <button onClick={go} style={{width:"100%",padding:"12px",borderRadius:8,background:C.dk,color:"#F8FAFC",fontWeight:700,fontSize:13,border:"none",cursor:"pointer",fontFamily:"inherit"}}>Sign In</button>
        </div>}
      </div>
    </div>
  </div>);
}

// === SIDEBAR ===
function Sidebar({tab,setTab,me,team,logout}){
  const meD=team.find(t=>t.id===me);const isA=meD?.admin;
  const items=[{id:'my',label:'My Work',n:'01',show:true},{id:'team',label:'Team Board',n:'02',show:true},{id:'assign',label:'Assign Work',n:'\u26A1',show:isA},{id:'calendar',label:'Calendar',n:'03',show:true},{id:'contacts',label:'Contacts',n:'04',show:true},{id:'sheets',label:'Sheets',n:'05',show:true},{id:'board',label:'Announcements',n:'06',show:true},{id:'settings',label:'Settings',n:'\u2014',show:isA}];
  return(<div style={{width:240,background:C.cd,borderRight:"1px solid "+C.rl,position:"fixed",top:0,left:0,bottom:0,display:"flex",flexDirection:"column",zIndex:100}}>
    <div style={{padding:18,borderBottom:"1px solid "+C.rl,display:"flex",alignItems:"center",gap:10}}>
      <img src={LOGO} alt="" style={{width:30,height:30,borderRadius:8}}/><div><span style={{fontWeight:700,fontSize:13.5,display:"block"}}>Mission Control</span><span style={{fontSize:9.5,color:C.mt}}>CareForBrains</span></div>
    </div>
    <div style={{padding:"14px 18px 8px",borderBottom:"1px solid "+C.rl,display:"flex",alignItems:"center",gap:10}}>
      <Av m={meD} s={32}/><div><div style={{fontWeight:700,fontSize:12.5}}>{fn(meD?.name)}</div><div style={{fontSize:9.5,color:C.tl,fontWeight:600,fontFamily:"monospace"}}>{isA?'ADMIN':'MEMBER'}</div></div>
    </div>
    <div style={{fontSize:9.5,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.12em",color:C.mt,padding:"14px 18px 4px"}}>Workspace</div>
    <nav style={{flex:1,overflowY:"auto",padding:"4px 0"}}>
      {items.filter(i=>i.show).map(i=><button key={i.id} onClick={()=>setTab(i.id)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 18px",cursor:"pointer",fontSize:13,fontWeight:tab===i.id?700:500,color:tab===i.id?C.tl:C.sc,background:tab===i.id?C.tg:"transparent",borderLeft:tab===i.id?"2.5px solid "+C.tl:"2.5px solid transparent",border:"none",width:"100%",textAlign:"left",fontFamily:"inherit"}}><span style={{fontSize:10,color:C.mt,minWidth:18,fontFamily:"monospace"}}>{i.n}</span>{i.label}</button>)}
    </nav>
    <div style={{padding:"10px 18px",borderTop:"1px solid "+C.rl}}><button onClick={logout} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:C.mt,fontFamily:"inherit"}}>Sign out &#8594;</button></div>
  </div>);
}

// === MY WORK ===
function MyWork({db,tasks,events,team,me}){
  const meD=team.find(t=>t.id===me);const my=tasks.filter(t=>t.assignee===me);
  const pending=my.filter(t=>!t.done).sort((a,b)=>{const p={high:0,medium:1,low:2};return(p[a.priority]||1)-(p[b.priority]||1)});
  const done=my.filter(t=>t.done);const myEv=events.filter(e=>e.assignee===me&&new Date(e.date)>=new Date());
  const toggle=t=>{db.ref('hub/tasks/'+t._fbKey+'/done').set(!t.done);if(!t.done)db.ref('hub/tasks/'+t._fbKey+'/doneDate').set(new Date().toISOString().split('T')[0])};
  const hr=new Date().getHours();
  return(<div>
    <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>01 &#8212; My Work</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Good {hr<12?"morning":hr<18?"afternoon":"evening"}, {fn(meD?.name)}</h1></div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 22px"}}/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:22}}>
      {[[pending.length,"Open Tasks"],[done.length,"Completed"],[myEv.length,"Upcoming"]].map(([n,l],i)=><div key={i} style={{border:"1px solid "+C.cb,borderRadius:10,padding:22,background:C.cd}}><div style={{fontFamily:F.sf,fontSize:34,fontWeight:400,lineHeight:1}}>{n}</div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt,marginTop:6}}>{l}</div></div>)}
    </div>
    <Card>
      <CardH right={<span style={{fontFamily:"monospace",fontSize:11,color:C.mt}}>{pending.length} open</span>}>Your Assignments</CardH>
      <div style={{padding:"14px 18px"}}>
        {pending.length===0&&done.length===0&&<div style={{textAlign:"center",padding:36,color:C.mt,fontFamily:F.sf,fontStyle:"italic"}}>No assignments yet</div>}
        {pending.map(t=>{const by=team.find(m=>m.id===t.assignedBy);return(
          <div key={t._fbKey} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 0",borderBottom:"1px solid "+C.bgA}}>
            <div onClick={()=>toggle(t)} style={{width:18,height:18,borderRadius:4,border:"1.5px solid "+C.rl,cursor:"pointer",flexShrink:0,marginTop:2}}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14}}>{t.text}</div>
              {t.notes&&<div style={{fontSize:12.5,color:C.sc,marginTop:3}}>{t.notes}</div>}
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6,flexWrap:"wrap"}}>
                <Tag t={t.priority}/>{t.due&&<span style={{fontSize:10,fontFamily:"monospace",color:new Date(t.due)<new Date()?C.rd:C.mt}}>Due {t.due}</span>}{by&&<span style={{fontSize:10,color:C.mt}}>from {fn(by.name)}</span>}
              </div></div></div>)})}
        {done.length>0&&<><div style={{fontFamily:"monospace",fontSize:10,color:C.mt,marginTop:14,marginBottom:6}}>COMPLETED ({done.length})</div>
          {done.slice(0,5).map(t=><div key={t._fbKey} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",opacity:0.4}}>
            <div onClick={()=>toggle(t)} style={{width:18,height:18,borderRadius:4,background:C.gn,border:"1.5px solid "+C.gn,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10}}>&#10003;</div>
            <span style={{flex:1,textDecoration:"line-through",color:C.mt,fontSize:13}}>{t.text}</span></div>)}</>}
      </div>
    </Card>
  </div>);
}

// === TEAM BOARD ===
function TeamBoard({db,tasks,team,me}){
  const[view,setView]=useState(null);const isA=team.find(t=>t.id===me)?.admin;
  const toggle=t=>{db.ref('hub/tasks/'+t._fbKey+'/done').set(!t.done);if(!t.done)db.ref('hub/tasks/'+t._fbKey+'/doneDate').set(new Date().toISOString().split('T')[0])};
  const del=t=>{if(isA)db.ref('hub/tasks/'+t._fbKey).remove()};
  return(<div>
    <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>02 &#8212; Team Board</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Everyone's Work</h1></div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 22px"}}/>
    <div style={{display:"grid",gridTemplateColumns:"repeat("+Math.min(team.length,3)+",1fr)",gap:14,marginBottom:22}}>
      {team.map(m=>{const ts=tasks.filter(t=>t.assignee===m.id);const op=ts.filter(t=>!t.done).length;const dn=ts.filter(t=>t.done).length;const od=ts.filter(t=>!t.done&&t.due&&new Date(t.due)<new Date()).length;
        return(<div key={m.id} onClick={()=>setView(view===m.id?null:m.id)} style={{background:C.cd,border:m.id===me?"2px solid "+C.tl:view===m.id?"2px solid "+C.td:"1px solid "+C.cb,borderRadius:10,cursor:"pointer",padding:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><Av m={m} s={34}/><div><div style={{fontWeight:700,fontSize:13}}>{fn(m.name)}</div><div style={{fontSize:9.5,color:C.mt,fontFamily:"monospace"}}>{m.admin?'ADMIN':fn(m.role.split('of ')[1]||m.role)}</div></div></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:22,fontWeight:700,fontFamily:F.sf,color:op>0?C.fg:C.mt}}>{op}</span><span style={{fontSize:10,color:C.mt}}>open</span><span style={{color:C.mt}}>&#183;</span><span style={{fontSize:14,fontWeight:600,color:C.gn}}>{dn}</span><span style={{fontSize:10,color:C.mt}}>done</span>
            {od>0&&<><span style={{color:C.mt}}>&#183;</span><span style={{fontSize:12,fontWeight:700,color:C.rd}}>{od} overdue</span></>}</div></div>)})}
    </div>
    {view&&(()=>{const m=team.find(t=>t.id===view);const ts=tasks.filter(t=>t.assignee===view).sort((a,b)=>(a.done?1:0)-(b.done?1:0));return(
      <Card style={{border:"2px solid "+C.tl}}>
        <div style={{padding:"12px 18px",borderBottom:"1px solid "+C.bgA,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}><Av m={m} s={28}/><span style={{fontWeight:700,fontSize:14}}>{m.name}</span><span style={{fontSize:10,color:C.mt}}>&#8212; {m.role}</span></div>
          <button onClick={()=>setView(null)} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:C.sc,fontFamily:"inherit"}}>Close</button></div>
        <div style={{padding:"14px 18px"}}>
          {ts.length===0?<div style={{textAlign:"center",padding:36,color:C.mt,fontFamily:F.sf,fontStyle:"italic"}}>No assignments</div>:
          ts.map(t=><div key={t._fbKey} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid "+C.bgA,opacity:t.done?0.4:1}}>
            <div onClick={()=>toggle(t)} style={{width:18,height:18,borderRadius:4,border:"1.5px solid "+(t.done?C.gn:C.rl),background:t.done?C.gn:"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10}}>{t.done?"\u2713":""}</div>
            <div style={{flex:1}}><span style={{fontWeight:600,fontSize:13.5,textDecoration:t.done?"line-through":"none",color:t.done?C.mt:C.fg}}>{t.text}</span>{t.notes&&<div style={{fontSize:12,color:C.sc,marginTop:2}}>{t.notes}</div>}</div>
            <Tag t={t.done?'done':t.priority}/>{t.due&&<span style={{fontSize:10,fontFamily:"monospace",color:C.mt}}>{t.due}</span>}{isA&&<button onClick={()=>del(t)} style={{background:"none",border:"none",cursor:"pointer",color:C.rd,fontSize:14}}>&#215;</button>}
          </div>)}</div></Card>)})()}
  </div>);
}

// === ASSIGN WORK ===
function Assign({db,tasks,team,me}){
  const[form,setForm]=useState({assignee:'eric',text:'',notes:'',priority:'medium',due:''});
  const[bulk,setBulk]=useState(false);
  const assign=()=>{if(!form.text.trim())return;const targets=bulk?team.filter(t=>!t.admin).map(t=>t.id):[form.assignee];targets.forEach(a=>{const ref=db.ref('hub/tasks').push();ref.set({id:ref.key,assignee:a,text:form.text.trim(),notes:form.notes.trim(),priority:form.priority,due:form.due,done:false,assignedBy:me,created:new Date().toISOString().split('T')[0]})});setForm({assignee:'eric',text:'',notes:'',priority:'medium',due:''})};
  return(<div>
    <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>&#9889; Assign Work</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Delegate Tasks</h1></div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 22px"}}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Card><CardH>New Assignment</CardH>
        <div style={{padding:"14px 18px"}}>
          <div style={{marginBottom:12}}><Lbl>Assign to</Lbl><label style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:C.sc,cursor:"pointer",marginBottom:8}}><input type="checkbox" checked={bulk} onChange={e=>setBulk(e.target.checked)}/> Everyone</label>
          {!bulk&&<Sel value={form.assignee} onChange={e=>setForm({...form,assignee:e.target.value})}>{team.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</Sel>}</div>
          <div style={{marginBottom:12}}><Lbl>Task</Lbl><Inp value={form.text} onChange={e=>setForm({...form,text:e.target.value})} placeholder="What needs to be done?" onKeyDown={e=>e.key==='Enter'&&assign()}/></div>
          <div style={{marginBottom:12}}><Lbl>Notes</Lbl><textarea style={{width:"100%",padding:"9px 12px",background:C.cd,border:"1px solid "+C.rl,borderRadius:7,color:C.fg,fontSize:13,fontFamily:"inherit",outline:"none",minHeight:60,resize:"vertical"}} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Links, context..."/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <div><Lbl>Priority</Lbl><Sel value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})}><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></Sel></div>
            <div><Lbl>Due Date</Lbl><input type="date" style={{width:"100%",padding:"9px 12px",background:C.cd,border:"1px solid "+C.rl,borderRadius:7,fontSize:13,fontFamily:"inherit"}} value={form.due} onChange={e=>setForm({...form,due:e.target.value})}/></div></div>
          <Btn primary onClick={assign} style={{width:"100%",justifyContent:"center",padding:11}}>{bulk?"Assign to all":"Assign to "+fn(team.find(t=>t.id===form.assignee)?.name)}</Btn>
        </div></Card>
      <Card><CardH>Workload</CardH>
        <div style={{padding:"14px 18px"}}>{team.map(m=>{const ts=tasks.filter(t=>t.assignee===m.id);const op=ts.filter(t=>!t.done).length;const od=ts.filter(t=>!t.done&&t.due&&new Date(t.due)<new Date()).length;return(
          <div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid "+C.bgA}}>
            <Av m={m} s={32}/><div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{fn(m.name)}</div></div>
            <div style={{textAlign:"right"}}><span style={{fontSize:16,fontWeight:700,fontFamily:F.sf}}>{op}</span><span style={{fontSize:10,color:C.mt,marginLeft:4}}>open</span>{od>0&&<div style={{fontSize:10,color:C.rd,fontWeight:600}}>{od} overdue</div>}</div>
          </div>)})}</div></Card>
    </div>
  </div>);
}

// === CALENDAR ===
function Cal({db,events,team,me}){
  const isA=team.find(t=>t.id===me)?.admin;const[cur,setCur]=useState(new Date());const[modal,setModal]=useState(false);const[form,setForm]=useState({title:'',date:'',assignee:me,notes:''});const[sel,setSel]=useState(null);
  const y=cur.getFullYear(),mo=cur.getMonth(),f=new Date(y,mo,1).getDay(),dim=new Date(y,mo+1,0).getDate(),pd=new Date(y,mo,0).getDate();const today=new Date();const mos=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const cells=[];for(let i=f-1;i>=0;i--)cells.push({d:pd-i,c:false});for(let i=1;i<=dim;i++)cells.push({d:i,c:true});while(cells.length<42)cells.push({d:cells.length-f-dim+1,c:false});
  const ds=d=>`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const evOn=s=>events.filter(e=>e.date===s);const isTd=(d,c)=>c&&d===today.getDate()&&mo===today.getMonth()&&y===today.getFullYear();
  const add=()=>{if(!form.title||!form.date)return;const ref=db.ref('hub/events').push();ref.set({...form,id:ref.key});setForm({title:'',date:'',assignee:me,notes:''});setModal(false)};
  const del=e=>db.ref('hub/events/'+e._fbKey).remove();
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}><div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>03 &#8212; Calendar</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Calendar</h1></div>{isA&&<Btn primary onClick={()=>setModal(true)}>+ Event</Btn>}</div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 22px"}}/>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <button onClick={()=>setCur(new Date(y,mo-1))} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:14,color:C.sc}}>&#8592;</button>
      <span style={{fontFamily:F.sf,fontSize:19}}>{mos[mo]} {y}</span>
      <button onClick={()=>setCur(new Date(y,mo+1))} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:14,color:C.sc}}>&#8594;</button></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:C.rl,border:"1px solid "+C.rl,borderRadius:8,overflow:"hidden",marginBottom:22}}>
      {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} style={{background:C.bgA,padding:8,textAlign:"center",fontFamily:"monospace",fontSize:10,color:C.mt}}>{d}</div>)}
      {cells.map((c,i)=>{const s=c.c?ds(c.d):'';const ev=evOn(s);return(<div key={i} onClick={()=>c.c&&setSel(s)} style={{background:isTd(c.d,c.c)?C.bgA:C.cd,minHeight:58,padding:"5px 6px",cursor:"pointer",fontSize:12,color:!c.c?C.mt:C.fg}}>
        <div style={{fontFamily:"monospace",fontSize:11,fontWeight:isTd(c.d,c.c)?800:"inherit"}}>{c.d}</div>
        {ev.slice(0,2).map(e=><div key={e._fbKey} style={{padding:"1px 3px",fontSize:8.5,fontWeight:600,borderRadius:3,background:C.tg,color:C.td,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</div>)}
      </div>)})}
    </div>
    {sel&&<Card><div style={{padding:"12px 18px",borderBottom:"1px solid "+C.bgA,display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:700,color:C.sc}}>{sel}</span><button onClick={()=>setSel(null)} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:C.sc,fontFamily:"inherit"}}>Close</button></div>
      <div style={{padding:"14px 18px"}}>{evOn(sel).length===0?<div style={{textAlign:"center",padding:20,color:C.mt}}>No events</div>:evOn(sel).map(e=><div key={e._fbKey} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.bgA}}>
        <div><div style={{fontWeight:700}}>{e.title}</div><div style={{fontSize:10,color:C.mt}}>{team.find(t=>t.id===e.assignee)?.name}</div></div>
        {isA&&<button onClick={()=>del(e)} style={{background:"none",border:"none",cursor:"pointer",color:C.rd,fontSize:12,fontFamily:"inherit"}}>Remove</button>}</div>)}</div></Card>}
    {modal&&<div style={{position:"fixed",inset:0,background:"rgba(9,26,38,0.45)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={e=>e.target===e.currentTarget&&setModal(false)}>
      <div style={{background:C.cd,borderRadius:12,width:460,maxWidth:"92vw",border:"1px solid "+C.cb}}>
        <div style={{padding:"18px 24px",borderBottom:"1px solid "+C.rl}}><h2 style={{fontFamily:F.sf,fontSize:19,fontWeight:400}}>New Event</h2></div>
        <div style={{padding:"18px 24px"}}><div style={{marginBottom:10}}><Lbl>Title</Lbl><Inp value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></div><div style={{marginBottom:10}}><Lbl>Date</Lbl><input type="date" style={{width:"100%",padding:"9px 12px",border:"1px solid "+C.rl,borderRadius:7,fontSize:13,fontFamily:"inherit"}} value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div><div style={{marginBottom:10}}><Lbl>For</Lbl><Sel value={form.assignee} onChange={e=>setForm({...form,assignee:e.target.value})}>{team.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</Sel></div></div>
        <div style={{padding:"14px 24px",borderTop:"1px solid "+C.rl,display:"flex",justifyContent:"flex-end",gap:8}}><Btn onClick={()=>setModal(false)}>Cancel</Btn><Btn primary onClick={add}>Add</Btn></div></div></div>}
  </div>);
}

// === CONTACTS ===
function Contacts({db,team,me}){
  const isA=team.find(t=>t.id===me)?.admin;const[ed,setEd]=useState(null);const[form,setForm]=useState({});
  const startEdit=m=>{setEd(m.id);setForm({phone:m.phone||'',email:m.email||''})};
  const saveEdit=(id,idx)=>{db.ref('hub/team/'+idx+'/phone').set(form.phone||'');db.ref('hub/team/'+idx+'/email').set(form.email||'');setEd(null)};
  return(<div>
    <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>04 &#8212; Contacts</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Team Directory</h1></div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 22px"}}/>
    <Card><div style={{padding:"14px 18px"}}>{team.map((m,idx)=><div key={m.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 0",borderBottom:"1px solid "+C.bgA}}>
      <Av m={m}/><div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontWeight:700,fontSize:14}}>{m.name}</span>{m.admin&&<span style={{fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:3,background:C.tg,color:C.tl,fontFamily:"monospace"}}>ADMIN</span>}</div>
        <div style={{fontSize:10.5,color:C.mt,fontFamily:"monospace"}}>{m.role}</div>
        {ed===m.id?<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:6,maxWidth:300}}>
          <Inp placeholder="Phone" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/>
          <Inp placeholder="Email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
          <div style={{display:"flex",gap:6}}><Btn primary onClick={()=>saveEdit(m.id,idx)}>Save</Btn><Btn onClick={()=>setEd(null)}>Cancel</Btn></div>
        </div>:<div style={{display:"flex",gap:14,marginTop:4,fontSize:12,color:C.sc}}>
          {m.phone&&<span>&#9742; {m.phone}</span>}{m.email&&<span>&#9993; {m.email}</span>}
          {!m.phone&&!m.email&&<span style={{color:C.mt,fontStyle:"italic"}}>No contact info</span>}</div>}
      </div>
      {(isA||m.id===me)&&ed!==m.id&&<button onClick={()=>startEdit(m)} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:C.sc,fontFamily:"inherit"}}>Edit</button>}
    </div>)}</div></Card>
  </div>);
}

// === ANNOUNCEMENTS ===
function Board({db,announcements,team,me}){
  const isA=team.find(t=>t.id===me)?.admin;const meD=team.find(t=>t.id===me);const[text,setText]=useState('');
  const post=()=>{if(!text.trim())return;const ref=db.ref('hub/announcements').push();ref.set({id:ref.key,author:fn(meD?.name),date:new Date().toISOString().split('T')[0],text:text.trim(),ts:Date.now()});setText('')};
  const del=a=>db.ref('hub/announcements/'+a._fbKey).remove();
  const sorted=[...announcements].sort((a,b)=>(b.ts||0)-(a.ts||0));
  return(<div>
    <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>06 &#8212; Announcements</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Board</h1></div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 22px"}}/>
    <Card style={{marginBottom:18}}><div style={{padding:"14px 18px",display:"flex",gap:8}}>
      <textarea style={{width:"100%",padding:"9px 12px",background:C.cd,border:"1px solid "+C.rl,borderRadius:7,color:C.fg,fontSize:13,fontFamily:"inherit",outline:"none",minHeight:44,resize:"vertical"}} placeholder="Post an update..." value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();post()}}}/>
      <Btn primary onClick={post} style={{alignSelf:"flex-end"}}>Post</Btn></div></Card>
    <Card><div style={{padding:"14px 18px"}}>{sorted.length===0?<div style={{textAlign:"center",padding:36,color:C.mt,fontFamily:F.sf,fontStyle:"italic"}}>No announcements</div>:sorted.map(a=><div key={a._fbKey} style={{padding:"12px 0",borderBottom:"1px solid "+C.bgA,position:"relative"}}>
      <div style={{fontFamily:"monospace",fontSize:10,color:C.mt}}>{a.date}</div><div style={{fontWeight:700,fontSize:13}}>{a.author}</div><div style={{fontSize:14,lineHeight:1.6,marginTop:3,color:C.sc}}>{a.text}</div>
      {isA&&<button onClick={()=>del(a)} style={{position:"absolute",top:12,right:0,background:"none",border:"none",cursor:"pointer",color:C.mt,fontSize:14}}>&#215;</button>}
    </div>)}</div></Card>
  </div>);
}

// === SETTINGS ===
function Settings({db,passwords,team}){
  const[pu,setPu]=useState('tanmay');const[np,setNp]=useState('');
  const chPw=()=>{if(!np)return;db.ref('hub/passwords/'+pu).set(np);setNp('');alert('Updated')};
  const resetFb=()=>{if(!confirm('Disconnect Firebase from this device?'))return;localStorage.removeItem(FK);localStorage.removeItem(LK);window.location.reload()};
  return(<div>
    <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>Settings</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Configuration</h1></div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 22px"}}/>
    <Card><CardH>Passwords</CardH><div style={{padding:"14px 18px"}}><div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
      <div><Lbl>Member</Lbl><Sel style={{width:160}} value={pu} onChange={e=>setPu(e.target.value)}>{team.map(m=><option key={m.id} value={m.id}>{fn(m.name)}</option>)}</Sel></div>
      <div style={{flex:1}}><Lbl>New Password</Lbl><Inp type="password" value={np} onChange={e=>setNp(e.target.value)}/></div>
      <Btn primary onClick={chPw}>Update</Btn></div></div></Card>
    <Card><div style={{padding:"14px 18px"}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:3,color:C.rd}}>Disconnect Firebase</div>
      <div style={{fontSize:12,color:C.mt,marginBottom:8}}>Removes config from this device only. Cloud data stays.</div>
      <Btn onClick={resetFb} style={{borderColor:C.rd,color:C.rd}}>Disconnect</Btn>
    </div></Card>
  </div>);
}

// === MAIN APP ===
function App(){
  const[fbCfg]=useState(()=>gF());
  const[hubData,setHubData]=useState(null);
  const[user,setUser]=useState(()=>gL());
  const[tab,setTab]=useState('my');
  const dbRef=useRef(null);
  const[time,setTime]=useState(new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}));

  useEffect(()=>{
    if(!fbCfg)return;
    try{
      if(!firebase.apps.length)firebase.initializeApp(fbCfg);
      const db=firebase.database();
      dbRef.current=db;
      db.ref('hub').on('value',snap=>{
        const val=snap.val();
        if(val)setHubData(val);
        else{db.ref('hub').set(SEED);setHubData(SEED)}
      });
    }catch(e){console.error(e);localStorage.removeItem(FK);window.location.reload()}
    return()=>{if(dbRef.current)dbRef.current.ref('hub').off()};
  },[fbCfg]);

  const logout=()=>{localStorage.removeItem(LK);setUser(null);setTab('my')};

  if(!fbCfg)return<FirebaseSetup/>;
  if(!hubData)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F.sn}}><div style={{textAlign:"center"}}><img src={LOGO} alt="" style={{width:40,height:40,borderRadius:10,marginBottom:10,opacity:0.5}}/><div style={{fontSize:13,color:C.mt}}>Connecting...</div></div></div>);

  const team=hubData.team||TEAM;
  const tasks=fbToArr(hubData.tasks);
  const events=fbToArr(hubData.events);
  const announcements=fbToArr(hubData.announcements);
  const passwords=hubData.passwords||{};
  const db=dbRef.current;

  if(!user)return<Login onLogin={id=>setUser({id})} passwords={passwords} team={team}/>;

  const me=user.id;const isA=team.find(t=>t.id===me)?.admin;
  const titles={my:'My Work',team:'Team Board',assign:'Assign Work',calendar:'Calendar',contacts:'Contacts',sheets:'Sheets',board:'Announcements',settings:'Settings'};
  const V=()=>{switch(tab){
    case 'my':return<MyWork db={db} tasks={tasks} events={events} team={team} me={me}/>;
    case 'team':return<TeamBoard db={db} tasks={tasks} team={team} me={me}/>;
    case 'assign':return isA?<Assign db={db} tasks={tasks} team={team} me={me}/>:<MyWork db={db} tasks={tasks} events={events} team={team} me={me}/>;
    case 'calendar':return<Cal db={db} events={events} team={team} me={me}/>;
    case 'contacts':return<Contacts db={db} team={team} me={me}/>;
    case 'board':return<Board db={db} announcements={announcements} team={team} me={me}/>;
    case 'settings':return isA?<Settings db={db} passwords={passwords} team={team}/>:<MyWork db={db} tasks={tasks} events={events} team={team} me={me}/>;
    default:return<MyWork db={db} tasks={tasks} events={events} team={team} me={me}/>}};

  return(<div style={{display:"flex",minHeight:"100vh",fontFamily:F.sn,background:C.bg,color:C.fg}}>
    <Sidebar tab={tab} setTab={setTab} me={me} team={team} logout={logout}/>
    <div style={{marginLeft:240,flex:1,minHeight:"100vh"}}>
      <div style={{position:"sticky",top:0,background:"rgba(248,250,252,0.88)",backdropFilter:"blur(16px)",borderBottom:"1px solid "+C.rl,padding:"12px 36px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:50}}>
        <span style={{fontFamily:F.sf,fontSize:19,fontWeight:400}}>{titles[tab]}</span>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:10,color:C.gn,fontWeight:600}}><span style={{width:5,height:5,borderRadius:3,background:C.gn,display:"inline-block"}}></span>LIVE</span>
          <span style={{fontSize:11,color:C.mt,fontFamily:"monospace"}}>{time}</span></div></div>
      <div style={{padding:"28px 36px",maxWidth:1100}}><V/></div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
