const{useState,useEffect,useRef,useCallback}=React;

// Scroll reveal hook - triggers CSS animation when element enters viewport
function useReveal(){
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('visible');obs.disconnect()}},{threshold:0.1});
    obs.observe(el);
    return()=>obs.disconnect();
  },[]);
  return ref;
}
function Reveal({children,delay=0,scale=false,style={}}){
  const ref=useReveal();
  return<div ref={ref} className={scale?'reveal-scale':'reveal'} style={{transitionDelay:delay+'ms',...style}}>{children}</div>;
}

function parseCSV(text){
  const rows=[];let row=[];let cell='';let inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'&&text[i+1]==='"'){cell+='"';i++}
      else if(ch==='"'){inQ=false}
      else{cell+=ch}
    }else{
      if(ch==='"'){inQ=true}
      else if(ch===','){row.push(cell.trim());cell=''}
      else if(ch==='\n'||(ch==='\r'&&text[i+1]==='\n')){
        if(ch==='\r')i++;
        row.push(cell.trim());
        if(row.some(c=>c))rows.push(row);
        row=[];cell='';
      }else{cell+=ch}
    }
  }
  row.push(cell.trim());
  if(row.some(c=>c))rows.push(row);
  return rows;
}

// Convert SVG certificate to PDF base64
async function svgToPdfBase64(svgString){
  const {jsPDF}=window.jspdf;
  await document.fonts.ready;
  // Extract text content from SVG and render as HTML for proper font rendering
  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-9999px;top:-9999px;width:1100px;height:780px;overflow:hidden';
  // Render SVG as background for borders/ornaments, overlay HTML for text
  const svgNoText=svgString.replace(/<text[^>]*>[\s\S]*?<\/text>/g,'');
  // Parse text elements
  const texts=[];
  const re=/<text\s+x="([^"]+)"\s+y="([^"]+)"\s+text-anchor="([^"]+)"\s+font-family="([^"]+)"\s+font-size="([^"]+)"([^>]*)>([\s\S]*?)<\/text>/g;
  let m;
  while((m=re.exec(svgString))!==null){
    const attrs=m[6];const fw=(attrs.match(/font-weight="([^"]+)"/)||[])[1]||'400';
    const fill=(attrs.match(/fill="([^"]+)"/)||[])[1]||'#1B2838';
    const ls=(attrs.match(/letter-spacing="([^"]+)"/)||[])[1]||'0';
    const fs=(attrs.match(/font-style="([^"]+)"/)||[])[1]||'normal';
    let inner=m[7].replace(/<tspan[^>]*>/g,'<span style="').replace(/<\/tspan>/g,'</span>');
    inner=inner.replace(/font-weight="([^"]+)"/g,'font-weight:$1;').replace(/fill="([^"]+)"/g,'color:$1;').replace(/font-size="([^"]+)"/g,'font-size:$1px;');
    texts.push({x:m[1],y:m[2],anchor:m[3],family:m[4],size:m[5],weight:fw,fill,ls,fs,html:inner});
  }
  const html=`<div style="position:relative;width:1100px;height:780px;background:#fff">
    <div style="position:absolute;inset:0">${svgNoText}</div>
    ${texts.map(t=>{
      const left=t.anchor==='middle'?'left:'+t.x+'px;transform:translateX(-50%)':t.anchor==='end'?'right:'+(1100-parseFloat(t.x))+'px':'left:'+t.x+'px';
      return`<div style="position:absolute;top:${parseFloat(t.y)-parseFloat(t.size)*0.85}px;${left};font-family:${t.family};font-size:${t.size}px;font-weight:${t.weight};color:${t.fill};letter-spacing:${t.ls}px;font-style:${t.fs};white-space:nowrap">${t.html}</div>`;
    }).join('')}
  </div>`;
  wrap.innerHTML=html;
  document.body.appendChild(wrap);
  await new Promise(r=>setTimeout(r,500));
  const canvas=await html2canvas(wrap,{scale:2,useCORS:true,backgroundColor:'#ffffff',width:1100,height:780});
  try{document.body.removeChild(wrap)}catch(e){}
  const imgData=canvas.toDataURL('image/jpeg',0.95);
  const pdf=new jsPDF({orientation:'landscape',unit:'px',format:[1100,780]});
  pdf.addImage(imgData,'JPEG',0,0,1100,780);
  return pdf.output('datauristring').split(',')[1];
}

// Send email via Gmail API directly — no third party, no branding
async function sendGmail(token, to, subject, htmlBody, fromName='CareForBrains', replyTo='careforbrains@gmail.com', pdfAttachment=null){
  let raw;
  if(pdfAttachment){
    const boundary='cfb_'+Date.now();
    const htmlB64=btoa(unescape(encodeURIComponent(htmlBody)));
    raw=[
      'MIME-Version: 1.0',
      'Content-Type: multipart/mixed; boundary='+boundary,
      'From: '+fromName+' <'+replyTo+'>',
      'To: '+to,
      'Reply-To: '+replyTo,
      'Subject: =?UTF-8?B?'+btoa(unescape(encodeURIComponent(subject)))+'?=',
      '',
      '--'+boundary,
      'Content-Type: text/html; charset=utf-8',
      'Content-Transfer-Encoding: base64',
      '',
      htmlB64,
      '--'+boundary,
      'Content-Type: application/pdf; name="'+pdfAttachment.name+'"',
      'Content-Disposition: attachment; filename="'+pdfAttachment.name+'"',
      'Content-Transfer-Encoding: base64',
      '',
      pdfAttachment.data,
      '--'+boundary+'--'
    ].join('\r\n');
  }else{
    raw=[
      'MIME-Version: 1.0',
      'Content-Type: text/html; charset=utf-8',
      'From: '+fromName+' <'+replyTo+'>',
      'To: '+to,
      'Reply-To: '+replyTo,
      'Subject: =?UTF-8?B?'+btoa(unescape(encodeURIComponent(subject)))+'?=',
      '',
      htmlBody
    ].join('\r\n');
  }
  const b64=btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const r=await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages/send',{
    method:'POST',
    headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({raw:b64})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||'Gmail send failed: '+r.status)}
  return await r.json();
}

(async()=>{

  ];

      if(g.ip){_geoInfo={...g,isMobile:'No',isProxy:'No',isHosting:'No',geoSource:'IP'};break}

  // Try browser GPS for precise coords (overwrites IP lat/lon if allowed)

      _geoInfo.lat=pos.coords.latitude;_geoInfo.lon=pos.coords.longitude;_geoInfo.gpsAccuracy=Math.round(pos.coords.accuracy)+'m';_geoInfo.geoSource='GPS';

// Convert Firebase objects (with keys) to arrays, filtering _seed markers
function fbToArr(obj){if(!obj)return[];return Object.keys(obj).filter(k=>k!=='_seed').map(k=>({...obj[k],_fbKey:k}))}

// === MY WORK ===
function MyWork({db,tasks,events,team,me,hubData}){
  const meD=team.find(t=>t.id===me);const isA=meD?.admin;
  const my=tasks.filter(t=>t.assignee===me);
  const pending=my.filter(t=>!t.done).sort((a,b)=>{const p={high:0,medium:1,low:2};return(p[a.priority]||1)-(p[b.priority]||1)});
  const done=my.filter(t=>t.done);
  const myEv=events.filter(e=>e.assignee===me&&new Date(e.date)>=new Date()).sort((a,b)=>a.date.localeCompare(b.date));
  const[celebrate,setCelebrate]=useState('');
  const celebrateTimer=useRef(null);
  useEffect(()=>()=>clearTimeout(celebrateTimer.current),[]);
  const pulseDone=t=>{clearTimeout(celebrateTimer.current);setCelebrate(t.text);celebrateTimer.current=setTimeout(()=>setCelebrate(''),2200)};
  const toggle=t=>{db.ref('hub/tasks/'+t._fbKey+'/done').set(!t.done);if(!t.done){db.ref('hub/tasks/'+t._fbKey+'/doneDate').set(new Date().toISOString().split('T')[0]);pulseDone(t)}};
  const hr=new Date().getHours();

  // Dashboard data
  const allOpen=tasks.filter(t=>!t.done);
  const allOverdue=allOpen.filter(t=>t.due&&new Date(t.due)<new Date());
  const partnerships=fbToArr(hubData?.partnerships||{});
  const roadmap=fbToArr(hubData?.roadmap||{});
  const announcements=fbToArr(hubData?.announcements||{}).sort((a,b)=>(b.ts||0)-(a.ts||0));
  const logs=fbToArr(hubData?.logs||{}).sort((a,b)=>(b.ts||0)-(a.ts||0));
  const sheets=hubData?.sheets?Object.keys(hubData.sheets).filter(k=>k!=='_seed').map(k=>normSheetEntry(hubData.sheets[k])):[];

  // Compute KPIs
  const totalVolunteers=(()=>{const emails=new Set();Object.values(hubData?.sheetData||{}).forEach(d=>{if(!Array.isArray(d)||d.length<2)return;const h=d[0]||[];let ei=-1;for(let i=0;i<h.length;i++){if((h[i]||'').toLowerCase().includes('email')&&!(h[i]||'').toLowerCase().includes('school')){ei=i;break}}if(ei<0)return;d.slice(1).forEach(r=>{const e=(r?.[ei]||'').trim().toLowerCase();if(e&&e.includes('@'))emails.add(e)})});return emails.size})();
  const activePartnerships=partnerships.filter(p=>p.status==='in_contact'||p.status==='confirmed').length;
  const stalePtnrs=partnerships.filter(p=>{if(p.status==='confirmed'||p.status==='declined')return false;const notes=Array.isArray(p.notes)?p.notes:[];if(!notes.length)return true;const last=notes[notes.length-1];return last?.date&&(Date.now()-new Date(last.date).getTime())>7*86400000});
  const inProgressPlans=roadmap.filter(r=>r.status==='in_progress').length;
  const todayLogs=logs.filter(l=>{const t=l.ts||0;const ds=new Date();ds.setHours(0,0,0,0);return t>=ds.getTime()});

  // Team workload
  const workload=team.map(m=>({...m,open:tasks.filter(t=>t.assignee===m.id&&!t.done).length,done:tasks.filter(t=>t.assignee===m.id&&t.done).length}));
  const maxLoad=Math.max(1,...workload.map(w=>w.open+w.done));

  // Upcoming deadlines (next 7 days, all team)
  const soon=new Date();soon.setDate(soon.getDate()+7);
  const upcoming=[...allOpen.filter(t=>t.due&&new Date(t.due)<=soon).map(t=>({type:'task',date:t.due,text:t.text,who:t.assignee,priority:t.priority,overdue:new Date(t.due)<new Date()})),...events.filter(e=>new Date(e.date)>=new Date()&&new Date(e.date)<=soon).map(e=>({type:'event',date:e.date,text:e.title,who:e.assignee}))].sort((a,b)=>a.date.localeCompare(b.date));

  const getName=id=>{const m=team.find(t=>t.id===id);return m?fn(m.name):id||'?'};
  const priC={high:'#EF4444',medium:'#F59E0B',low:'#3B82F6'};
  const greeting=hr<12?"morning":hr<18?"afternoon":"evening";
  const topTask=pending[0]||null;
  const nextItem=upcoming[0]||myEv[0]||null;
  const latestPost=announcements[0]||null;
  const weekStart=new Date();weekStart.setHours(0,0,0,0);weekStart.setDate(weekStart.getDate()-6);
  const weekDone=done.filter(t=>{if(!t.doneDate)return false;const d=new Date(t.doneDate);return !isNaN(d)&&d>=weekStart}).length;
  const weeklyGoal=Math.max(4,weekDone+pending.length);
  const alertLine=topTask?`Lead with ${topTask.text}. ${allOverdue.length>0?allOverdue.length+' overdue item'+(allOverdue.length>1?'s':'')+' still need attention.':nextItem?'Next up is '+nextItem.text+'.':'You have room to wrap more than one thing today.'}`:`You're in a clear pocket right now. Use it to close a lingering task, follow up on a partner, or get ahead on what lands next.`;

  return(<div>
    {celebrate&&<div className="celebration-toast">
      <div className="celebration-badge">✓</div>
      <div>
        <div style={{fontSize:12,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(248,251,252,.68)"}}>Wrapped up</div>
        <div style={{fontSize:14,fontWeight:700,color:"#FFFFFF",marginTop:2}}>Nice work, {fn(meD?.name)}.</div>
        <div style={{fontSize:12,color:"rgba(232,247,249,.8)",marginTop:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:280}}>{celebrate}</div>
      </div>
    </div>}

    <div className="morning-brief">
      <div className="brief-grid">
        <div style={{position:"relative",zIndex:1}}>
          <div className="hero-kicker">Morning brief</div>
          <div className="hero-title">Good {greeting}, {fn(meD?.name)}.</div>
          <div className="hero-sub">{alertLine}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:14}}>
            <span className="meta-chip">{pending.length} open tasks</span>
            <span className={`meta-chip ${allOverdue.length?'warm':''}`}>{allOverdue.length} overdue</span>
            <span className="meta-chip">{todayLogs.length} activity events today</span>
          </div>
          <div style={{marginTop:18}} className="brief-panel">
            <div className="brief-kicker">Today's focus</div>
            {topTask?<>
              <div className="brief-highlight">{topTask.text}</div>
              {topTask.notes&&<div className="brief-copy">{topTask.notes}</div>}
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginTop:12}}>
                <Tag t={topTask.priority}/>
                {topTask.due&&<span className={`meta-chip ${new Date(topTask.due)<new Date()?'warm':''}`}>Due {topTask.due}</span>}
                {topTask.assignedBy&&<span className="meta-chip">From {getName(topTask.assignedBy)}</span>}
              </div>
            </>:<div className="empty-state-card" style={{padding:"24px 20px",marginTop:4}}>
              <div className="empty-state-ill">✦</div>
              <div className="empty-state-title">All clear</div>
              <div className="empty-state-copy">No open assignments with your name on them right now. That's rare. Use the breathing room well.</div>
            </div>}
          </div>
        </div>
        <div className="brief-stack">
          <div className="brief-mini">
            <div className="brief-kicker">Coming up next</div>
            <div style={{fontFamily:F.sf,fontSize:24,lineHeight:1.12,color:C.fg}}>{nextItem?nextItem.text:'Nothing urgent this week'}</div>
            <div style={{marginTop:8,fontSize:13,lineHeight:1.6,color:C.mt}}>
              {nextItem?`${nextItem.type==='event'?'Event':'Task'} for ${getName(nextItem.who)} on ${nextItem.date}${nextItem.overdue?' - overdue':''}.`:'You have no deadlines or assigned events in the next seven days.'}
            </div>
          </div>
          <ProgressRing value={weekDone} total={weeklyGoal} label="Weekly follow-through" subLabel={`${weekDone} of ${weeklyGoal} task finishes logged in the last 7 days.`} color={C.tl}/>
        </div>
      </div>
    </div>

    {/* TWO COLUMN LAYOUT */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:18}}>

      {/* LEFT: My Tasks */}
      <Card>
        <CardH right={<span style={{fontFamily:"monospace",fontSize:11,color:C.mt}}>{pending.length} open</span>}>Your Assignments</CardH>
        <div style={{padding:"14px 18px",maxHeight:340,overflowY:"auto"}}>
          {pending.length===0&&done.length===0&&<div style={{textAlign:"center",padding:24,color:C.mt,fontStyle:"italic"}}>No assignments yet</div>}
          {pending.map(t=>{const by=team.find(m=>m.id===t.assignedBy);return(
            <div key={t._fbKey} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 0",borderBottom:"1px solid "+C.bgA}}>
              <div onClick={()=>toggle(t)} className="check-box" style={{width:18,height:18,borderRadius:4,border:"1.5px solid "+C.rl,cursor:"pointer",flexShrink:0,marginTop:2}}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14}}>{t.text}</div>
                {t.notes&&<div style={{fontSize:12,color:C.sc,marginTop:2}}>{t.notes.slice(0,60)}</div>}
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4,flexWrap:"wrap"}}>
                  <Tag t={t.priority}/>{t.due&&<span style={{fontSize:10,fontFamily:"monospace",color:new Date(t.due)<new Date()?C.rd:C.mt}}>Due {t.due}</span>}
                </div></div></div>)})}
          {done.length>0&&<div style={{marginTop:10}}><div style={{fontSize:10,fontFamily:"monospace",color:C.mt,marginBottom:4}}>COMPLETED ({done.length})</div>
            {done.slice(0,3).map(t=><div key={t._fbKey} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",opacity:0.35}}>
              <div onClick={()=>toggle(t)} style={{width:16,height:16,borderRadius:3,background:C.gn,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:9}}>&#10003;</div>
              <span style={{textDecoration:"line-through",color:C.mt,fontSize:12}}>{t.text}</span></div>)}</div>}
        </div>
      </Card>

      {/* RIGHT: Upcoming Deadlines */}
      <Card>
        <CardH right={<span style={{fontFamily:"monospace",fontSize:11,color:C.mt}}>next 7 days</span>}>Upcoming Deadlines</CardH>
        <div style={{padding:"14px 18px",maxHeight:340,overflowY:"auto"}}>
          {upcoming.length===0?<div style={{textAlign:"center",padding:24,color:C.mt,fontStyle:"italic"}}>Nothing due this week</div>:
          upcoming.slice(0,10).map((u,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid "+C.bgA}}>
            <div style={{width:6,height:6,borderRadius:3,background:u.overdue?'#EF4444':u.type==='event'?'#1490B0':'#F59E0B',flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.text}</div>
              <div style={{fontSize:10,color:C.mt}}>{getName(u.who)} · {u.date}{u.overdue&&<span style={{color:'#EF4444',fontWeight:700}}> OVERDUE</span>}</div>
            </div>
            {u.priority&&<span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:3,background:priC[u.priority]+"15",color:priC[u.priority]}}>{u.priority.toUpperCase()}</span>}
          </div>)}
        </div>
      </Card>
    </div>

    {/* TEAM WORKLOAD */}
    <Card style={{marginBottom:18}}>
      <CardH>Team Workload</CardH>
      <div style={{padding:"14px 18px"}}>
        {workload.map(w=><div key={w.id} style={{display:"flex",alignItems:"center",gap:12,padding:"6px 0"}}>
          <div style={{width:70,fontSize:12,fontWeight:600}}>{fn(w.name)}</div>
          <div style={{flex:1,height:20,background:C.bgA,borderRadius:4,overflow:"hidden",display:"flex"}}>

          </div>
          <div style={{fontSize:10,color:C.mt,width:60,textAlign:"right"}}>{w.open} open · {w.done}</div>
        </div>)}
        <div style={{display:"flex",gap:16,marginTop:8,fontSize:10,color:C.mt}}>
          <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#10B981",marginRight:4}}/>Done</span>
          <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#1490B0",marginRight:4}}/>Open</span>
        </div>
      </div>

    {/* BOTTOM ROW: Partnerships + Recent Activity */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>

      {/* Partnerships needing attention */}
      <Card>
        <CardH right={stalePtnrs.length>0?<span style={{fontSize:10,fontWeight:700,color:"#F59E0B"}}>{stalePtnrs.length} need follow-up</span>:null}>Partnerships</CardH>

// === CALENDAR ===
function Cal({db,events,tasks,team,me}){
  const isA=team.find(t=>t.id===me)?.admin;const[cur,setCur]=useState(new Date());const[modal,setModal]=useState(false);const[form,setForm]=useState({title:'',date:'',assignee:me,notes:''});const[sel,setSel]=useState(null);
  const y=cur.getFullYear(),mo=cur.getMonth(),f=new Date(y,mo,1).getDay(),dim=new Date(y,mo+1,0).getDate(),pd=new Date(y,mo,0).getDate();const today=new Date();const mos=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const cells=[];
  const prevDates=[];for(let i=f-1;i>=0;i--)prevDates.push({d:pd-i,c:false,mo:mo-1,y:mo===0?y-1:y});
  const curDates=[];for(let i=1;i<=dim;i++)curDates.push({d:i,c:true,mo,y});
  const nextDates=[];let nd=1;while(prevDates.length+curDates.length+nextDates.length<42)nextDates.push({d:nd++,c:false,mo:mo+1,y:mo===11?y+1:y});
  cells.push(...prevDates,...curDates,...nextDates);
  const cellDate=c=>{const m=c.mo<0?11:c.mo>11?0:c.mo;const yr=c.mo<0?c.y-1:c.mo>11?c.y+1:c.y;return`${yr}-${String(m+1).padStart(2,'0')}-${String(c.d).padStart(2,'0')}`};
  const tasksOn=s=>tasks.filter(t=>t.due===s);
  const itemsOn=s=>{
    const eventItems=events.filter(e=>e.date===s).map(e=>({...e,kind:'event'}));
    const taskItems=tasksOn(s).map(t=>({...t,kind:'task'}));
    return[...taskItems,...eventItems];
  };
  const isTd=(d,c)=>c&&d===today.getDate()&&mo===today.getMonth()&&y===today.getFullYear();
  const add=()=>{if(!form.title?.trim()||!form.date)return;const ref=db.ref('hub/events').push();ref.set({...form,id:ref.key});setForm({title:'',date:'',assignee:me,notes:''});setModal(false)};
  const delEvent=e=>{if(confirm('Remove this event?'))db.ref('hub/events/'+e._fbKey).remove()};
  const delTask=t=>{if(confirm('Delete task "'+t.text+'"?'))db.ref('hub/tasks/'+t._fbKey).remove()};
  const toggleTask=t=>{db.ref('hub/tasks/'+t._fbKey+'/done').set(!t.done);if(!t.done)db.ref('hub/tasks/'+t._fbKey+'/doneDate').set(new Date().toISOString().split('T')[0])};
  const editTaskDue=(t,newDue)=>{db.ref('hub/tasks/'+t._fbKey+'/due').set(newDue)};
  const taskTone=t=>t.done?{b:"#D1FAE5",c:C.gn}:t.priority==='high'?{b:"#FEE2E2",c:C.rd}:t.priority==='low'?{b:"#DBEAFE",c:"#2563EB"}:{b:"#FEF3C7",c:"#D97706"};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}><div><div style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",color:C.sc}}>03 &#8212; Calendar</div><h1 style={{fontFamily:F.sf,fontSize:28,fontWeight:400,marginTop:4}}>Calendar</h1></div>{isA&&<Btn primary onClick={()=>setModal(true)}>+ Event</Btn>}</div>
    <hr style={{border:"none",borderTop:"1px solid "+C.rl,margin:"12px 0 22px"}}/>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <button onClick={()=>setCur(new Date(y,mo-1))} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:14,color:C.sc}}>&#8592;</button>
      <span style={{fontFamily:F.sf,fontSize:19}}>{mos[mo]} {y}</span>
      <button onClick={()=>setCur(new Date(y,mo+1))} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:14,color:C.sc}}>&#8594;</button></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,background:C.rl,border:"1px solid "+C.rl,borderRadius:12,overflow:"hidden",marginBottom:22}}>
      {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} style={{background:C.bgA,padding:"10px 8px",textAlign:"center",fontSize:11,fontWeight:600,color:C.sc}}>{d}</div>)}
      {cells.map((c,i)=>{const s=cellDate(c);const items=itemsOn(s);return(<div key={i} onClick={()=>setSel(s)} className="cal-day" style={{background:sel===s?"#E6F7F9":isTd(c.d,c.c)?C.bgA:C.cd,minHeight:82,padding:"6px 7px",cursor:"pointer",fontSize:12,color:!c.c?C.mt:C.fg,borderLeft:sel===s?"2px solid #1490B0":"2px solid transparent"}}>
        <div style={{fontSize:13,fontWeight:isTd(c.d,c.c)?800:500,marginBottom:3}}>{c.d}</div>
        {items.slice(0,3).map(item=>item.kind==='task'
          ?<div key={`t-${item._fbKey}`} style={{padding:"3px 6px",fontSize:11,fontWeight:600,borderRadius:5,background:taskTone(item).b,color:taskTone(item).c,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fn(team.find(t=>t.id===item.assignee)?.name)}: {item.text}</div>
          :<div key={`e-${item._fbKey}`} style={{padding:"3px 6px",fontSize:11,fontWeight:600,borderRadius:5,background:C.tg,color:C.td,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</div>
        )}
        {items.length>3&&<div style={{marginTop:2,fontSize:10,color:C.mt}}>+{items.length-3} more</div>}
      </div>)})}
    </div>
    {sel&&<Card style={{borderLeft:"3px solid #1490B0"}}><div style={{padding:"14px 18px",borderBottom:"1px solid "+C.bgA,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:700,fontSize:14,color:C.fg}}>{sel}</span><button onClick={()=>setSel(null)} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:C.sc,fontFamily:"inherit"}}>Close</button></div>
      <div style={{padding:"14px 18px"}}>
        {tasksOn(sel).length===0&&events.filter(e=>e.date===sel).length===0&&<div style={{textAlign:"center",padding:20,color:C.mt}}>No events or due tasks</div>}
        {tasksOn(sel).length>0&&<>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:C.mt,marginBottom:6}}>Due Tasks</div>
          {tasksOn(sel).sort((a,b)=>(a.done?1:0)-(b.done?1:0)).map(t=>{const assignee=team.find(m=>m.id===t.assignee);const by=team.find(m=>m.id===t.assignedBy);return(<div key={t._fbKey} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid "+C.bgA,opacity:t.done?0.5:1}}>
            {isA&&<div onClick={()=>toggleTask(t)} style={{width:18,height:18,borderRadius:4,border:"1.5px solid "+(t.done?C.gn:C.rl),background:t.done?C.gn:"transparent",cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10}}>{t.done?"\u2713":""}</div>}
            <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13.5,textDecoration:t.done?"line-through":"none"}}>{t.text}</div>{t.notes&&<div style={{fontSize:12,color:C.sc,marginTop:2}}>{t.notes}</div>}<div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:5,alignItems:"center"}}><span style={{fontSize:10,color:C.mt}}>{assignee?.name||t.assignee}</span>{by&&<span style={{fontSize:10,color:C.mt}}>from {fn(by.name)}</span>}<Tag t={t.done?'done':t.priority}/></div></div>
            {isA&&<div style={{display:"flex",gap:6,flexShrink:0}}>
              <button onClick={()=>delTask(t)} style={{background:"none",border:"none",cursor:"pointer",color:C.rd,fontSize:13,fontFamily:"inherit",fontWeight:600}} title="Delete task">&#215;</button>
            </div>}
          </div>)})}
        </>}
        {events.filter(e=>e.date===sel).length>0&&<>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:C.mt,marginTop:tasksOn(sel).length?14:0,marginBottom:6}}>Events</div>
          {events.filter(e=>e.date===sel).map(e=><div key={e._fbKey} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.bgA}}>
            <div><div style={{fontWeight:700}}>{e.title}</div><div style={{fontSize:10,color:C.mt}}>{team.find(t=>t.id===e.assignee)?.name}</div></div>
            {isA&&<button onClick={()=>delEvent(e)} style={{background:"none",border:"none",cursor:"pointer",color:C.rd,fontSize:12,fontFamily:"inherit"}}>Remove</button>}</div>)}
        </>}
      </div></Card>}
    {modal&&<div style={{position:"fixed",inset:0,background:"rgba(9,26,38,0.45)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1100}} onClick={e=>e.target===e.currentTarget&&setModal(false)}>
      <div style={{background:C.cd,borderRadius:12,width:460,maxWidth:"92vw",border:"1px solid "+C.cb}}>
        <div style={{padding:"18px 24px",borderBottom:"1px solid "+C.rl}}><h2 style={{fontFamily:F.sf,fontSize:19,fontWeight:400}}>New Event</h2></div>
        <div style={{padding:"18px 24px"}}><div style={{marginBottom:10}}><Lbl>Title</Lbl><Inp value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/></div><div style={{marginBottom:10}}><Lbl>Date</Lbl><input type="date" style={{width:"100%",padding:"9px 12px",border:"1px solid "+C.rl,borderRadius:7,fontSize:13,fontFamily:"inherit"}} value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div><div style={{marginBottom:10}}><Lbl>For</Lbl><Sel value={form.assignee} onChange={e=>setForm({...form,assignee:e.target.value})}>{team.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}</Sel></div></div>
        <div style={{padding:"14px 24px",borderTop:"1px solid "+C.rl,display:"flex",justifyContent:"flex-end",gap:8}}><Btn onClick={()=>setModal(false)}>Cancel</Btn><Btn primary onClick={add}>Add</Btn></div></div></div>}
  </div>);
}

// === CONTACTS ===
function Contacts({db,team,me}){
  const isA=team.find(t=>t.id===me)?.admin;const[ed,setEd]=useState(null);const[form,setForm]=useState({});
  const startEdit=m=>{setEd(m.id);setForm({phone:m.phone||'',email:m.email||''})};
  const saveEdit=(id)=>{const idx=team.findIndex(t=>t.id===id);if(idx<0)return;db.ref('hub/team/'+idx+'/phone').set(form.phone||'');db.ref('hub/team/'+idx+'/email').set(form.email||'');setEd(null)};
  return(<div>
    <div><div style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",color:C.sc}}>04 &#8212; Contacts</div><h1 style={{fontFamily:F.sf,fontSize:28,fontWeight:400,marginTop:4}}>Team Directory</h1></div>
    <hr style={{border:"none",borderTop:"1px solid "+C.rl,margin:"12px 0 22px"}}/>
    <Card><div style={{padding:"14px 18px"}}>{team.map((m,idx)=><div key={m.id} style={{display:"flex",alignItems:"center",gap:14,padding:"14px 0",borderBottom:"1px solid "+C.bgA}}>
      <Av m={m}/><div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontWeight:700,fontSize:14}}>{m.name}</span>{m.admin&&<span style={{fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:3,background:C.tg,color:C.tl,fontFamily:"monospace"}}>ADMIN</span>}</div>
        <div style={{fontSize:10.5,color:C.mt,fontFamily:"monospace"}}>{m.role}</div>
        {ed===m.id?<div style={{marginTop:8,display:"flex",flexDirection:"column",gap:6,maxWidth:300}}>
          <Inp placeholder="Phone" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/>
          <Inp placeholder="Email" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/>
          <div style={{display:"flex",gap:6}}><Btn primary onClick={()=>saveEdit(m.id)}>Save</Btn><Btn onClick={()=>setEd(null)}>Cancel</Btn></div>
        </div>:<div style={{display:"flex",gap:14,marginTop:4,fontSize:12,color:C.sc}}>
          {m.phone&&<span>&#9742; {m.phone}</span>}{m.email&&<span>&#9993; {m.email}</span>}
          {!m.phone&&!m.email&&<span style={{color:C.mt,fontStyle:"italic"}}>No contact info</span>}</div>}
      </div>
      {(isA||m.id===me)&&ed!==m.id&&<button onClick={()=>startEdit(m)} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:C.sc,fontFamily:"inherit"}}>Edit</button>}
    </div>)}</div></Card>
  </div>);
}

// === SHEETS ===
function Sheets({db,hubData,team,me}){
  const sheets=fbToArr(hubData.sheets).map(normSheetEntry).sort((a,b)=>{
    const ac=!!(a.note||''),bc=!!(b.note||'');
    if(ac!==bc)return ac?1:-1;
    return(a.name||'').localeCompare(b.name||'');
  });
  const sheetData=hubData.sheetData||{};
  const[active,setActiveState]=useState(()=>_activeSheet||sheets[0]?._fbKey||'');
  const setActive=v=>{_activeSheet=v;setActiveState(v);setEditCell(null);scrollRef.current=0;if(tableRef.current)tableRef.current.scrollTop=0};
  const[gToken,setGTokenState]=useState(_gToken);
  const setGToken=v=>{_gToken=v;setGTokenState(v)};
  const[editCell,setEditCell]=useState(null);
  const[editVal,setEditVal]=useState('');
  const[saving,setSaving]=useState(false);
  const tableRef=useRef(null);
  const editRef=useRef(null);
  const scrollRef=useRef(0);

  // Focus edit input without scrolling
  useEffect(()=>{
    if(editRef.current)editRef.current.focus({preventScroll:true});
  },[editCell]);

  // Preserve scroll across re-renders
  useEffect(()=>{
    const el=tableRef.current;if(!el)return;
    el.scrollTop=scrollRef.current;
    const h=()=>{scrollRef.current=el.scrollTop};
    el.addEventListener('scroll',h,{passive:true});
    return()=>el.removeEventListener('scroll',h);
  });

  const[syncing,setSyncing]=useState(false);
  const[lastSync,setLastSync]=useState(null);

  const syncAllSheets=async(force)=>{
    setSyncing(true);
    for(const s of sheets){
      const sid=getSheetId(s.url);
      if(!sid)continue;
      if(!force){const cached=sheetData[s.id];if(cached&&Array.isArray(cached)&&cached.length>1)continue;}
      try{
        const csvUrl='https://docs.google.com/spreadsheets/d/'+sid+'/export?format=csv';
        const r=await fetch(csvUrl);
        if(!r.ok)continue;
        const text=await r.text();
        if(text.trim().startsWith('<!'))continue;
        const rows=parseCSV(text);
        db.ref('hub/sheetData/'+s.id).set(rows.length>0?rows:[]);
      }catch(e){console.log('Sync skip:',s.name,e)}
    }
    setSyncing(false);setLastSync(new Date());
  };

  // Fill empty sheets on mount (App-level sync handles periodic refresh)
  useEffect(()=>{syncAllSheets(false)},[]);

  const activeSheet=sheets.find(s=>(s._fbKey||s.id)===active)||sheets[0]||null;
  const activeVals=activeSheet?sheetData[activeSheet.id]:null;
  const allHeaders=Array.isArray(activeVals)&&activeVals.length?activeVals[0]:[];
  const allRows=Array.isArray(activeVals)&&activeVals.length>1?activeVals.slice(1):[];

  const priorityWords=['reached','status','done','complete','approved','accepted','respond','responded','reply','contacted','joined','added','attended','finished','pvsa'];
  const isPriCol=h=>{const l=(h||'').toLowerCase();return l.length<60&&priorityWords.some(w=>l.includes(w))};

  // Strip empty trailing columns
  const lastUsed=React.useMemo(()=>{
    for(let c=allHeaders.length-1;c>=0;c--){
      if((allHeaders[c]||'').trim()||allRows.some(r=>(r[c]||'').trim()))return c+1;
    }
    return allHeaders.length;
  },[allHeaders.join(','),allRows.length]);
  const cleanHeaders=allHeaders.slice(0,lastUsed);

  // Pick 7 visible columns: priority first, then rest
  const visibleCols=React.useMemo(()=>{
    if(!cleanHeaders.length)return[];
    const pri=[];const rest=[];
    cleanHeaders.forEach((_,i)=>{if(isPriCol(cleanHeaders[i]))pri.push(i);else rest.push(i)});
    return[...pri,...rest];
  },[cleanHeaders.join(',')]);

  // Re-sync a sheet using OAuth token so row indices match Google Sheets exactly
  const resyncWithToken=async(token)=>{
    for(const s of sheets){
      const sid=getSheetId(s.url);if(!sid)continue;
      try{
        const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/A1:ZZ5000',{
          headers:{'Authorization':'Bearer '+token}
        });
        if(!r.ok)continue;
        const j=await r.json();
        if(j.values)db.ref('hub/sheetData/'+s.id).set(j.values);
      }catch(e){console.error(e)}
    }
  };

  const connectGoogle=()=>{
    globalConnectGoogle(token=>{setGToken(token);resyncWithToken(token)});
  };

  const saveCell=async(rowIdx,realCol,value)=>{
    if(!activeSheet||!gToken)return;
    const sid=getSheetId(activeSheet.url);if(!sid)return;
    setSaving(true);
    const scrollPos=tableRef.current?.scrollTop||0;
    try{
      const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+colToLetter(realCol)+(rowIdx+2)+'?valueInputOption=USER_ENTERED',{
        method:'PUT',headers:{'Authorization':'Bearer '+gToken,'Content-Type':'application/json'},
        body:JSON.stringify({values:[[value]]})
      });
      if(!r.ok)throw new Error(r.status+' '+r.statusText);
      const cached=JSON.parse(JSON.stringify(activeVals||[]));
      if(cached[rowIdx+1])cached[rowIdx+1][realCol]=value;
      db.ref('hub/sheetData/'+activeSheet.id).set(cached);
      _lastSheetEdit[activeSheet.id]=Date.now();
      logEvent(db,'sheet_edit',{user:me,sheet:activeSheet.name,sheetId:activeSheet.id,cell:colToLetter(realCol)+(rowIdx+2),oldValue:(activeVals[rowIdx+1]||[])[realCol]||'',newValue:value});
      setEditCell(null);
      requestAnimationFrame(()=>{if(tableRef.current)tableRef.current.scrollTop=scrollPos});
    }catch(e){
      const msg=String(e);
      if(msg.includes('401')||msg.includes('403')){setGToken(null);alert('Session expired. Please reconnect Google to continue editing.')}
      else{alert('Save failed: '+msg.slice(0,80))}
    }
    setSaving(false);
  };
  const jumpTo=pct=>{if(tableRef.current)tableRef.current.scrollTop=tableRef.current.scrollHeight*pct};
  const fmtH=h=>(h||'').replace(/^\d+\.\s*/,'').replace(/[:\?]$/,'').trim();

  // Color for priority cells
  const priCellStyle=(val)=>{
    const v=(val||'').trim().toLowerCase();
    if(!v)return{background:"#FEE2E2",color:"#991B1B"};
    const yesWords=['yes','y','ye','si','ok','done','true','completed','approved','accepted','yas','ues','uyes'];
    const noWords=['n','no','nah','false','denied','rejected'];
    if(yesWords.some(w=>v.startsWith(w)))return{background:"#D1FAE5",color:"#065F46"};
    if(noWords.some(w=>v===w))return{background:"#FEE2E2",color:"#991B1B"};
    return{background:"#FEF3C7",color:"#92400E"};
  };

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <span style={{fontWeight:700,fontSize:15}}>{sheets.length} Sheets</span>
        <span style={{fontSize:11,color:C.mt}}>{(()=>{const lt=lastSync?.getTime()||0;const bt=_lastBgSync||0;const best=Math.max(lt,bt);return best?'Synced '+new Date(best).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'—'})()}</span>
        {saving&&<span style={{fontSize:11,color:C.tl,fontWeight:700}}>Saving...</span>}
        {syncing&&<div style={{width:14,height:14,border:"2px solid #D8E8EE",borderTopColor:"#1490B0",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <Btn onClick={()=>syncAllSheets(true)} disabled={syncing}>Refresh</Btn>
        {!gToken?<Btn onClick={connectGoogle} primary>Connect Google</Btn>:<span style={{fontSize:11,color:C.gn,fontWeight:600}}>&#9679; Connected</span>}
      </div>
    </div>
    {!gToken&&<div style={{padding:"8px 14px",borderRadius:8,background:"#FFF5F5",border:"1px solid #FECACA",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
      <span style={{color:"#E44258",fontSize:12,fontWeight:600}}>&#9888; View only</span>
      <span style={{color:"#676879",fontSize:12}}>Connect Google to edit cells.</span>
    </div>}
    <div style={{display:"flex",gap:4,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
      {sheets.map(s=>{
        const isAct=(s._fbKey||s.id)===active;
        const rc=Math.max(((sheetData[s.id]||[]).length||0)-1,0);
        const closed=!!(s.note||'');
        return<button key={s._fbKey} onClick={()=>{setActive(s._fbKey||s.id);setEditCell(null)}} style={{
          padding:"7px 14px",border:isAct?"2px solid #1490B0":"1px solid "+C.rl,
          borderRadius:8,background:isAct?"rgba(20,144,176,0.06)":"#fff",cursor:"pointer",fontFamily:"inherit",
          fontSize:12,fontWeight:isAct?700:500,color:isAct?"#323338":"#676879",
          display:"flex",alignItems:"center",gap:6,opacity:closed&&!isAct?0.5:1,whiteSpace:"nowrap",flexShrink:0
        }}>
          {s.name}
          {closed&&<span style={{padding:"1px 5px",borderRadius:3,fontSize:9,fontWeight:700,background:"#F3F4F6",color:"#9CA3AF"}}>CLOSED</span>}
          <span style={{fontSize:10,color:rc?C.gn:C.mt,fontFamily:"monospace"}}>{rc}</span>
        </button>
      })}
    </div>
    {activeSheet&&visibleCols.length>0?<Card style={{overflow:"hidden",maxWidth:"calc(100vw - 312px)"}}>
      <div style={{padding:"8px 14px",borderBottom:"1px solid "+C.rl,display:"flex",justifyContent:"space-between",alignItems:"center",background:"#F5F6F8"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontWeight:700,fontSize:13}}>{activeSheet.name}</span>
          {activeSheet.note&&<span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:"#F3F4F6",color:"#9CA3AF"}}>{activeSheet.note}</span>}
          <span style={{fontSize:11,color:C.sc}}>{allRows.length} rows</span>
          {gToken&&<span style={{fontSize:10,color:C.mt}}>double-click to edit &#183; &#9776; to view all</span>}
          {gToken&&(activeSheet.id==='stem_intern_responses'||activeSheet.id==='stem_final_responses')&&<span style={{fontSize:10,color:'#F59E0B',fontWeight:600}}>&#9888; STEM sheets require careforbrainsse@gmail.com</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {[['25%',.25],['50%',.5],['75%',.75],['End',1]].map(([l,p])=><button key={l} onClick={()=>jumpTo(p)} style={{padding:"3px 8px",border:"1px solid "+C.rl,borderRadius:5,background:"#fff",fontSize:10,fontWeight:600,color:C.sc,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>)}
          {activeSheet.url&&<a href={activeSheet.url} target="_blank" rel="noreferrer" style={{fontSize:11,color:C.tl,textDecoration:"none",fontWeight:600,marginLeft:6}}>Open &#8599;</a>}
          <button onClick={()=>syncAllSheets(true)} disabled={syncing} style={{padding:"3px 10px",border:"1px solid "+C.rl,borderRadius:5,background:syncing?"#F0F1F3":"#fff",fontSize:10,fontWeight:600,color:syncing?"#B0B8C4":C.tl,cursor:syncing?"wait":"pointer",fontFamily:"inherit",marginLeft:4}}>{syncing?'Syncing...':'Refresh All'}</button>
        </div>
      </div>
      <div ref={tableRef} style={{overflowY:"auto",overflowX:"auto",maxHeight:"72vh"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:Math.max(visibleCols.length*120,800)}}>
          <colgroup>{visibleCols.map((ci,i)=><col key={i} style={{width:isPriCol(cleanHeaders[ci])?"80px":(100/visibleCols.length)+"%"}}/>)}<col style={{width:"36px"}}/></colgroup>
          <thead><tr>{visibleCols.map((ci,i)=>{
            const h=cleanHeaders[ci]||'';const pri=isPriCol(h);
            return<th key={i} style={{padding:"9px 12px",textAlign:"left",borderBottom:"2px solid "+C.rl,fontSize:11,fontWeight:700,letterSpacing:"0.02em",color:pri?"#0C6B8E":"#323338",background:pri?"rgba(20,144,176,0.08)":"#F5F6F8",position:"sticky",top:0,zIndex:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fmtH(h)}</th>
          })}<th style={{width:36,padding:0,borderBottom:"2px solid "+C.rl,background:"#F5F6F8",position:"sticky",top:0,zIndex:2}}></th></tr></thead>
          <tbody>{allRows.map((row,i)=>{
            const isViewing=editCell&&editCell.view===i;
            return<React.Fragment key={i}><tr style={{background:isViewing?"rgba(20,144,176,0.06)":i%2===0?"#fff":"#FAFBFC"}}>
            {visibleCols.map((ci,j)=>{
              const isEditing=editCell&&editCell.r===i&&editCell.c===ci&&!editCell.view;
              const pri=isPriCol(cleanHeaders[ci]);
              const val=row[ci]||'';
              const pStyle=pri?priCellStyle(val):{};
              return<td key={j} onDoubleClick={()=>{if(gToken){setEditCell({r:i,c:ci});setEditVal(val)}}} style={{
                padding:isEditing?"2px":"4px 8px",borderBottom:"1px solid #F0F1F3",
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                fontSize:12,fontWeight:pri?700:"normal",textAlign:pri?"center":"left",
                cursor:gToken?"text":"default",
                background:isEditing?"#D0E8F2":(pStyle.background||"inherit"),
                color:isEditing?"#323338":(pStyle.color||"#323338")
              }}>
                {isEditing?<input ref={editRef} value={editVal} onChange={e=>setEditVal(e.target.value)}
                  onBlur={()=>saveCell(i,ci,editVal)}
                  onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();saveCell(i,ci,editVal)}if(e.key==='Escape')setEditCell(null)}}
                  style={{width:"100%",padding:"3px 6px",border:"2px solid #1490B0",borderRadius:4,fontSize:12,fontFamily:"inherit",outline:"none",background:"#fff"}}
                />:pri?(val||'—'):val}
              </td>
            })}
            <td style={{width:32,padding:"4px",borderBottom:"1px solid #F0F1F3",textAlign:"center"}}>
              <button onClick={()=>setEditCell(isViewing?null:{view:i})} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:isViewing?"#1490B0":"#C3C6D4",padding:2}} title="View all fields">&#9776;</button>
            </td>
            </tr>
            {isViewing&&<tr><td colSpan={visibleCols.length+1} style={{padding:0,background:"#F8FAFC",borderBottom:"2px solid #1490B0"}}>
              <div style={{padding:"12px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 20px"}}>
                {cleanHeaders.map((h,ci)=>{
                  const val=row[ci]||'';
                  const isFieldEdit=editCell&&editCell.r===i&&editCell.c===ci&&editCell.view===i;
                  return<div key={ci} style={{display:"flex",gap:6,alignItems:"baseline",padding:"3px 0",borderBottom:"1px solid #ECEDF5"}}>
                    <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"#676879",minWidth:100,flexShrink:0}}>{fmtH(h)}</span>
                    {isFieldEdit?<input ref={editRef} value={editVal} onChange={e=>setEditVal(e.target.value)}
                      onBlur={()=>saveCell(i,ci,editVal)}
                      onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();saveCell(i,ci,editVal)}if(e.key==='Escape')setEditCell({view:i})}}
                      style={{flex:1,padding:"3px 6px",border:"2px solid #1490B0",borderRadius:4,fontSize:12,fontFamily:"inherit",outline:"none",background:"#fff"}}
                    />:<span onDoubleClick={()=>{if(gToken){setEditCell({r:i,c:ci,view:i});setEditVal(val)}}} style={{
                      fontSize:12,color:val?"#323338":"#C3C6D4",cursor:gToken?"text":"default",wordBreak:"break-word"
                    }}>{val||'—'}</span>}
                  </div>
                })}
              </div>
            </td></tr>}
            </React.Fragment>})}</tbody>
        </table>
      </div>
    </Card>:activeSheet?<Card><div style={{padding:"40px 24px",textAlign:"center",color:C.mt}}>
      {sheetData[activeSheet.id]?<div style={{fontFamily:F.sf,fontSize:16}}>This sheet has no columns or is empty</div>:<div><div style={{fontFamily:F.sf,fontSize:18,fontStyle:"italic"}}>No data synced yet</div><div style={{fontSize:12,marginTop:6}}>Click Refresh or connect Google to load data</div></div>}
    </div></Card>:<div style={{padding:"40px",textAlign:"center",color:C.mt}}>No sheets linked</div>}
  </div>);
}

    if(typeof tmpl.body==='function')return tmpl.body(name);
    return tmpl.body||'';
  };

  const loadSheet=sid=>{setSelSheet(sid);setChecked({});setSent({});
    const vals=sheetData[sid];
    if(vals&&Array.isArray(vals)&&vals.length>0){
      setCols(vals[0]);setRows(vals.slice(1));
      const ei=vals[0].findIndex(h=>{const l=(h||'').toLowerCase();return l.includes('email')&&!l.includes('school')});
      let ni=vals[0].findIndex(h=>{const l=(h||'').toLowerCase();return l.includes('full name')||l==='name'||l.includes('name (first')||l.includes('name:')});
      if(ni<0)ni=vals[0].findIndex(h=>{const l=(h||'').toLowerCase();return l.includes('name')&&!l.includes('school')&&!l.includes('user')});
      setEmailCol(ei>=0?vals[0][ei]:'');setNameCol(ni>=0?vals[0][ni]:'');
    }else{setCols([]);setRows([])}
  };

  const eIdx=cols.indexOf(emailCol);const nIdx=cols.indexOf(nameCol);
  const fill=(t,row)=>{let s=t;const name=manualMode?manualName:(nIdx>=0?(row[nIdx]||''):'');s=s.replace(/\{\{name\}\}/g,name);cols.forEach((col,i)=>{s=s.replace(new RegExp('\\{\\{'+col.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\}\\}','g'),row[i]||'')});return s};

  const selectedRows=manualMode?[{i:0,row:[manualName,manualEmail]}]:Object.keys(checked).filter(k=>checked[k]).map(k=>({i:parseInt(k),row:rows[parseInt(k)]})).filter(r=>r.row);
  const validSelected=manualMode?[{i:0,row:[manualName,manualEmail],email:manualEmail.trim(),name:manualName.trim()}]:selectedRows.filter(r=>eIdx>=0&&okEmail((r.row[eIdx]||'').trim()));
  const allChecked=rows.length>0&&rows.every((_,i)=>checked[i]);

  const downloadCert=async(name,hours,program)=>{
    const svg=generateCertSVG(name,hours||'50',program||'Volunteer',new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}));
    let pdfB64;try{pdfB64=await svgToPdfBase64(svg)}catch(e){alert('Certificate generation failed. Try refreshing the page.');console.error(e);return}
    const byteChars=atob(pdfB64);const byteArr=new Uint8Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++)byteArr[i]=byteChars.charCodeAt(i);
    const blob=new Blob([byteArr],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`CareForBrains_Certificate_${name.replace(/\s+/g,'_')}.pdf`;a.click();URL.revokeObjectURL(url);
  };

  const sendEmails=async()=>{
    if(!_gToken){alert('Connect Google first');return}
    if(validSelected.length===0)return;
    setSending(true);setSendStats({done:0,total:validSelected.length});
    const ns={...sent};
    for(let i=0;i<validSelected.length;i++){
      const{row}=validSelected[i];
      const email=manualMode?manualEmail.trim():(row[eIdx]||'').trim();
      const name=manualMode?manualName.trim():(nIdx>=0?(row[nIdx]||'').trim():'');
      const emailSubject=fill(subj,row).replace('{{name}}',name);
      const emailBody=(()=>{
        if(template==='custom')return '<div style="font-family:Helvetica,Arial,sans-serif;font-size:14px;line-height:1.7;color:#333;white-space:pre-wrap">'+fill(customBody,row).replace(/{{name}}/g,name)+'</div>';
        if(template==='ecard_done'){
          const cc=parseInt(ecardCount)||0;
          const hrs=cc>0?String(cc%2===0?cc/2:cc*0.5):'0';
          return tmpl.body(name,String(cc),hrs);
        }
        return typeof tmpl.body==='function'?tmpl.body(name):'';
      })();
      try{
        let pdfAttachment=null;
        if(tmpl.hasCert){
          let certHours='50';let certProgram='Volunteer';
          if(template==='ecard_done'){
            certProgram='E-Card';
            const cc=parseInt(ecardCount)||0;
            certHours=cc>0?String(cc%2===0?cc/2:cc*0.5):'0';
          }
          if(template==='stem_done'){certProgram='STEM Exploration';certHours='40'}
          const svg=generateCertSVG(name,certHours,certProgram,new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}));
          let pdfB64;try{pdfB64=await svgToPdfBase64(svg)}catch(e){alert('Certificate generation failed for '+name+'. Skipping.');console.error(e);continue}
          pdfAttachment={name:'CareForBrains_Certificate_'+name.replace(/\s+/g,'_')+'.pdf',data:pdfB64};
        }
        const isStem=template==='stem_accept'||template==='stem_done';
        const senderName=isStem?'CareForBrains STEM Exploration':'CareForBrains';
        const senderEmail=isStem?'careforbrainsse@gmail.com':'careforbrains@gmail.com';
        await sendGmail(_gToken,email,emailSubject,emailBody,senderName,senderEmail,pdfAttachment);
        ns[validSelected[i].i]='sent';
        logEvent(db,'email_sent',{user:me,to:email,template:tmpl.name||'custom',subject:emailSubject});
      }catch(e){ns[validSelected[i].i]='failed';console.error(e)}
      setSent({...ns});setSendStats({done:i+1,total:validSelected.length});
      if(i<validSelected.length-1)await wait(500);
    }
    setSending(false);
    const anySuccess=Object.values(ns).some(v=>v==='sent');
    if(anySuccess)setSendDone(true);else{alert('All emails failed or were skipped. Check your connection and try again.')}
  };

  const previewRow=manualMode?[manualName,manualEmail]:(validSelected[Math.min(previewIdx,Math.max(validSelected.length-1,0))]?.row||[]);

  return(<div>
    <div><div style={{fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",color:C.sc}}>07 &#8212; Comms</div><h1 style={{fontFamily:F.sf,fontSize:28,fontWeight:400,marginTop:4}}>Email Center</h1></div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 18px"}}/>

    {!senderReady?<div style={{padding:"14px 16px",borderRadius:10,background:"#FFF5F5",border:"1px solid #FECACA",marginBottom:16,fontSize:12.5}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{color:"#E44258",fontWeight:700}}>&#9888; Not connected — sign in to send emails</span>
        <Btn primary onClick={()=>globalConnectGoogle(t=>{setGConnected(true);setTimeout(()=>setConnectedEmail(_gEmail||''),500)})} style={{flexShrink:0}}>Connect Google</Btn>
      </div>
      <div style={{fontSize:11,color:"#676879",lineHeight:1.6}}>
        <strong>Volunteer emails</strong> &#8594; sign in with <span style={{fontFamily:"monospace",background:"#F5F6F8",padding:"1px 6px",borderRadius:4}}>careforbrains@gmail.com</span><br/>
        <strong>STEM emails</strong> &#8594; sign in with <span style={{fontFamily:"monospace",background:"#F5F6F8",padding:"1px 6px",borderRadius:4}}>careforbrainsse@gmail.com</span>
      </div>
    </div>
    :<div style={{padding:"10px 16px",borderRadius:10,background:wrongAccount?"#FFFBEB":"#F0FDF4",border:"1px solid "+(wrongAccount?"#FDE68A":"#BBF7D0"),marginBottom:16,fontSize:12.5,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:8,height:8,borderRadius:4,background:wrongAccount?"#F59E0B":"#10B981"}}/>
        <span style={{fontWeight:600,color:"#1B2838"}}>Sending as:</span>
        <span style={{fontFamily:"monospace",fontSize:11,color:"#555"}}>{connectedEmail||'connected'}</span>
        {wrongAccount&&<span style={{color:"#92400E",fontWeight:600,marginLeft:4}}>&#9888; {wantsStemEmail?'STEM templates should send from careforbrainsse@gmail.com':'Volunteer templates should send from careforbrains@gmail.com'}</span>}
      </div>
      <button onClick={()=>{_gToken=null;_gEmail=null;_tokenClient=null;setGConnected(false);setConnectedEmail('');globalConnectGoogle(t=>{setGConnected(true);setTimeout(()=>setConnectedEmail(_gEmail||''),500)})}} style={{padding:"6px 14px",borderRadius:6,border:"1px solid "+(wrongAccount?"#F59E0B":"#D1D5DB"),background:wrongAccount?"#FEF3C7":"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:600,color:wrongAccount?"#92400E":"#555"}}>
        {wrongAccount?"Switch Account":"Switch Account"}
      </button>
    </div>}

    <div style={{display:"flex",gap:8,marginBottom:20}}>
      {[1,2,3].map(s=><div key={s} style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:28,height:28,borderRadius:"50%",background:step>=s?"#1490B0":"#E6E9EF",color:step>=s?"#fff":"#676879",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,transition:"all .3s var(--ease-spring)"}}>{s}</div>
        <span style={{fontSize:12,fontWeight:step===s?700:500,color:step===s?"#323338":"#676879"}}>{s===1?'Select Data':s===2?'Choose Template':'Review & Send'}</span>
        {s<3&&<div style={{width:40,height:1,background:"#E6E9EF"}}/>}
      </div>)}
    </div>

    {step===1&&<div>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        <button onClick={()=>{setManualMode(false)}} style={{flex:1,padding:"14px",border:!manualMode?"2px solid #1490B0":"1px solid "+C.rl,borderRadius:10,background:!manualMode?"#E6F7F9":"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:!manualMode?700:500,color:!manualMode?"#323338":"#676879",transition:"all .3s var(--ease-spring)"}}>From Sheet</button>
        <button onClick={()=>{setManualMode(true);setChecked({})}} style={{flex:1,padding:"14px",border:manualMode?"2px solid #1490B0":"1px solid "+C.rl,borderRadius:10,background:manualMode?"#E6F7F9":"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:manualMode?700:500,color:manualMode?"#323338":"#676879",transition:"all .3s var(--ease-spring)"}}>Manual Email</button>
      </div>
      {manualMode?<Card><CardH>Send to Anyone</CardH><div style={{padding:"16px 18px"}}>
        <div style={{marginBottom:10}}><Lbl>Recipient Name</Lbl><Inp value={manualName} onChange={e=>setManualName(e.target.value)} placeholder="Full name..."/></div>
        <div style={{marginBottom:10}}><Lbl>Recipient Email</Lbl><Inp value={manualEmail} onChange={e=>setManualEmail(e.target.value)} placeholder="email@example.com"/></div>
        <div style={{marginTop:12,display:"flex",justifyContent:"flex-end"}}><Btn primary onClick={()=>{if(okEmail(manualEmail.trim())&&manualName.trim())setStep(2)}} disabled={!okEmail(manualEmail.trim())||!manualName.trim()}>Next: Choose Template</Btn></div>
      </div></Card>:
      <Card><CardH>Data Source</CardH><div style={{padding:"16px 18px"}}>
        <div style={{marginBottom:12}}><Lbl>Google Sheet</Lbl>
          <Sel value={selSheet} onChange={e=>loadSheet(e.target.value)}><option value="">Choose a sheet...</option>{sheets.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</Sel>
        </div>
        {cols.length>0&&<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div><Lbl>Email Column</Lbl><Sel value={emailCol} onChange={e=>setEmailCol(e.target.value)}><option value="">Select...</option>{cols.map(c=><option key={c} value={c}>{c}</option>)}</Sel></div>
            <div><Lbl>Name Column</Lbl><Sel value={nameCol} onChange={e=>setNameCol(e.target.value)}><option value="">Select...</option>{cols.map(c=><option key={c} value={c}>{c}</option>)}</Sel></div>
          </div>
          <div style={{fontSize:12,color:C.gn,fontWeight:600,marginBottom:14}}>{rows.length} rows &middot; {rows.filter(r=>eIdx>=0&&okEmail((r[eIdx]||'').trim())).length} valid emails</div>
          <div style={{overflowY:"auto",maxHeight:300,border:"1px solid "+C.rl,borderRadius:8}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr>
                <th style={{padding:"6px 10px",borderBottom:"2px solid "+C.rl,background:"#F5F6F8",position:"sticky",top:0,width:36}}><input type="checkbox" checked={allChecked} onChange={()=>{if(allChecked)setChecked({});else{const n={};rows.forEach((_,i)=>n[i]=true);setChecked(n)}}}/></th>
                <th style={{padding:"6px 10px",borderBottom:"2px solid "+C.rl,background:"#F5F6F8",position:"sticky",top:0,textAlign:"left",fontSize:10,fontWeight:700,color:"#323338"}}>Name</th>
                <th style={{padding:"6px 10px",borderBottom:"2px solid "+C.rl,background:"#F5F6F8",position:"sticky",top:0,textAlign:"left",fontSize:10,fontWeight:700,color:"#323338"}}>Email</th>
                <th style={{padding:"6px 10px",borderBottom:"2px solid "+C.rl,background:"#F5F6F8",position:"sticky",top:0,textAlign:"center",fontSize:10,fontWeight:700,color:"#323338"}}>Status</th>
              </tr></thead>
              <tbody>{rows.map((row,i)=>{const email=eIdx>=0?(row[eIdx]||'').trim():'';const name=nIdx>=0?(row[nIdx]||'').trim():'';const valid=okEmail(email);
                const statusWords=['reached','respond','responded','contacted','reply','finished','pvsa'];
                let statusColIdx=-1;let statusMax=0;
                for(let ci=0;ci<cols.length;ci++){if(statusWords.some(w=>(cols[ci]||'').toLowerCase().includes(w))){const filled=rows.filter(r=>r&&r[ci]&&(r[ci]||'').trim()).length;if(filled>statusMax){statusMax=filled;statusColIdx=ci}}}
                const statusVal=statusColIdx>=0?(row[statusColIdx]||'').trim().toLowerCase():'';
                const yesWords=['yes','y','ye','si','ok','done','true','completed','approved','accepted','yas','ues','uyes'];
                const responded=!!statusVal&&yesWords.some(w=>statusVal.startsWith(w));
                const rowBg=checked[i]?"rgba(20,144,176,.06)":responded?"rgba(0,202,114,.06)":"transparent";
                return<tr key={i} style={{background:rowBg,opacity:valid?1:.5}}>
                <td style={{padding:"5px 10px",borderBottom:"1px solid #F0F1F3",textAlign:"center"}}><input type="checkbox" checked={!!checked[i]} disabled={!valid} onChange={e=>{const n={...checked};if(e.target.checked)n[i]=true;else delete n[i];setChecked(n)}}/></td>
                <td style={{padding:"5px 10px",borderBottom:"1px solid #F0F1F3"}}>{name||'\u2014'}</td>
                <td style={{padding:"5px 10px",borderBottom:"1px solid #F0F1F3",color:valid?"#323338":"#E44258"}}>{email||'No email'}</td>
                <td style={{padding:"5px 10px",borderBottom:"1px solid #F0F1F3",textAlign:"center"}}>
                  {statusColIdx>=0?<span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:responded?"#D1FAE5":"#FEE2E2",color:responded?"#065F46":"#991B1B"}}>{responded?'YES':'NO'}</span>:<span style={{color:C.mt}}>—</span>}
                </td>
              </tr>})}</tbody>
            </table>
          </div>
          <div style={{marginTop:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:C.sc}}>{validSelected.length} selected</span>
            <Btn primary onClick={()=>{if(validSelected.length>0)setStep(2)}} disabled={validSelected.length===0}>Next: Choose Template</Btn>
          </div>
        </>}
      </div></Card>}
    </div>}

    {step===2&&<div>
      <Btn onClick={()=>setStep(1)} style={{marginBottom:14,fontSize:12,color:C.tl,background:"transparent",border:"none",padding:0}}>&larr; Back to data</Btn>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:18}}>
        {Object.entries(EMAIL_TEMPLATES).map(([k,t])=><div key={k} onClick={()=>setTemplate(k)} style={{
          padding:"18px",border:template===k?"2px solid #1490B0":"1px solid "+C.rl,borderRadius:12,cursor:"pointer",
          background:template===k?"#E6F7F9":"#fff",transition:"all .3s var(--ease-spring)"
        }}>
          <div style={{fontSize:22,marginBottom:6}}>{t.icon}</div>
          <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{t.name}</div>
          {t.hasCert&&<span style={{padding:"2px 6px",borderRadius:4,fontSize:9,fontWeight:700,background:"#E8FFF3",color:"#00CA72"}}>+ CERTIFICATE</span>}
        </div>)}
      </div>

      {template==='ecard_done'&&<Card style={{marginBottom:14}}><CardH>E-Card Details</CardH><div style={{padding:"16px 18px"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{flex:1}}><Lbl>Number of E-Cards</Lbl><Inp type="number" min="1" value={ecardCount} onChange={e=>setEcardCount(e.target.value)} placeholder="e.g. 20"/></div>
          <div style={{flex:1,padding:"12px 16px",background:"#F0FDF4",borderRadius:8,textAlign:"center"}}>
            <div style={{fontSize:10,fontWeight:700,color:"#059669",letterSpacing:"1.5px",marginBottom:4}}>HOURS EARNED</div>
            <div style={{fontSize:28,fontWeight:700,color:"#1B2838",fontFamily:"'Playfair Display',serif"}}>{ecardCount?((parseInt(ecardCount||0)||0)*0.5):0}</div>
            <div style={{fontSize:10,color:"#5A6B7E"}}>({ecardCount||0} cards &times; 30 min each)</div>
          </div>
        </div>
      </div></Card>}

      {template==='custom'&&<Card style={{marginBottom:14}}><div style={{padding:"16px 18px"}}>
        <div style={{marginBottom:10}}><Lbl>Subject</Lbl><Inp value={customSubj} onChange={e=>setCustomSubj(e.target.value)} placeholder="Email subject..."/></div>
        <Lbl>Body</Lbl><textarea style={{width:"100%",padding:"9px 12px",background:"#fff",border:"1px solid "+C.rl,borderRadius:8,color:C.fg,fontSize:13,fontFamily:"inherit",outline:"none",minHeight:140,resize:"vertical"}} value={customBody} onChange={e=>setCustomBody(e.target.value)} placeholder="Use {{name}} or any {{column_name}} for personalization..."/>
      </div></Card>}

      {template!=='custom'&&<Card style={{marginBottom:14}}><CardH right={tmpl.hasCert&&<span style={{fontSize:11,color:C.gn,fontWeight:600}}>Certificate will be generated</span>}>Preview: {tmpl.name}</CardH>
        <div style={{padding:"16px 18px"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#323338",marginBottom:6}}>Subject: {subj}</div>
          <div style={{background:"#F5F6F8",borderRadius:8,padding:14,fontSize:13,lineHeight:1.7,color:"#676879",maxHeight:200,overflow:"auto"}}>{typeof tmpl.body==='function'?<div dangerouslySetInnerHTML={{__html:tmpl.body('Preview Name')}}/>:<div style={{whiteSpace:"pre-wrap"}}>{tmpl.body}</div>}</div>
        </div>
      </Card>}

      {tmpl.hasCert&&<Card style={{marginBottom:14}}><CardH>Certificate Preview</CardH>
        <div style={{padding:"16px 18px",textAlign:"center"}}>
          <div dangerouslySetInnerHTML={{__html:(()=>{
            let h='50',p='Volunteer';
            if(template==='ecard_done'){p='E-Card';const cc=parseInt(ecardCount)||0;h=cc>0?String(cc%2===0?cc/2:cc*0.5):'0'}
            if(template==='stem_done'){p='STEM Exploration';h='40'}
            return generateCertSVG(manualMode?manualName.trim()||'Your Name':validSelected[0]?.row?.[nIdx]||'Your Name',h,p,new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}))
          })()}} style={{width:"100%",maxWidth:700,margin:"0 auto"}}/>
          <div style={{marginTop:10,fontSize:11,color:C.mt}}>Certificate auto-fills with each recipient's name and hours</div>
        </div>
      </Card>}

      <div style={{display:"flex",justifyContent:"space-between"}}>
        <span style={{fontSize:12,color:C.sc}}>{validSelected.length} recipients selected</span>
        <Btn primary onClick={()=>setStep(3)}>Next: Review & Send</Btn>
      </div>
    </div>}

    {step===3&&<div>
      <Btn onClick={()=>setStep(2)} style={{marginBottom:14,fontSize:12,color:C.tl,background:"transparent",border:"none",padding:0}}>&larr; Back to template</Btn>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
        <Card><CardH>Summary</CardH><div style={{padding:"16px 18px"}}>
          <div style={{display:"grid",gap:10}}>
            <div><span style={{fontSize:11,color:C.mt}}>Template</span><div style={{fontWeight:700,fontSize:14}}>{tmpl.icon} {tmpl.name}</div></div>
            <div><span style={{fontSize:11,color:C.mt}}>Recipients</span><div style={{fontWeight:700,fontSize:14}}>{validSelected.length} people</div></div>
            <div><span style={{fontSize:11,color:C.mt}}>Subject</span><div style={{fontSize:13,color:"#323338"}}>{subj}</div></div>
            {tmpl.hasCert&&<div><span style={{fontSize:11,color:C.mt}}>Attachment</span><div style={{fontWeight:600,fontSize:13,color:C.gn}}>Certificate of Achievement</div></div>}
            <div><span style={{fontSize:11,color:C.mt}}>From</span><div style={{fontSize:13}}>{sender.fromName||'CareForBrains'} &middot; {sender.replyTo||''}</div></div>
          </div>
        </div></Card>

        <Card><CardH right={<div style={{display:"flex",gap:6}}>
          <button onClick={()=>setPreviewIdx(Math.max(0,previewIdx-1))} disabled={previewIdx===0} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.sc}}>&larr;</button>
          <span style={{fontSize:11,color:C.mt}}>{previewIdx+1}/{validSelected.length}</span>
          <button onClick={()=>setPreviewIdx(Math.min(validSelected.length-1,previewIdx+1))} disabled={previewIdx>=validSelected.length-1} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.sc}}>&rarr;</button>
        </div>}>Live Preview</CardH><div style={{padding:"16px 18px"}}>
          <div style={{fontSize:11,color:C.mt,marginBottom:3}}>To: <strong style={{color:"#323338"}}>{manualMode?manualEmail:(eIdx>=0?(previewRow[eIdx]||''):'')}</strong></div>
          <div style={{fontSize:11,color:C.mt,marginBottom:8}}>Subject: <strong style={{color:"#323338"}}>{fill(subj,previewRow)}</strong></div>
          <div style={{background:"#F5F6F8",borderRadius:8,padding:12,fontSize:12,lineHeight:1.6,whiteSpace:"pre-wrap",color:"#676879",maxHeight:180,overflow:"auto"}}>{template==="custom"?fill(customBody,previewRow):getBody(manualMode?manualName:(nIdx>=0?(previewRow[nIdx]||""):""))}</div>
        </div></Card>
      </div>

      {tmpl.hasCert&&<div style={{marginBottom:14,display:"flex",gap:8,flexWrap:"wrap"}}>
        {validSelected.slice(0,5).map(({row},i)=>{
          const name=nIdx>=0?(row[nIdx]||''):'';
          return<Btn key={i} onClick={()=>{
            let h='50',p='Volunteer';
            if(template==='ecard_done'){p='E-Card';const cc=parseInt(ecardCount)||0;h=cc>0?String(cc%2===0?cc/2:cc*0.5):'0'}
            if(template==='stem_done'){p='STEM Exploration';h='40'}
            downloadCert(name,h,p)
          }} style={{fontSize:11}}>Download cert: {name}</Btn>
        })}
        {validSelected.length>5&&<span style={{fontSize:11,color:C.mt,alignSelf:"center"}}>+{validSelected.length-5} more</span>}
      </div>}

      {sendDone?<div className="send-success" style={{textAlign:"center",padding:"48px 24px"}}>
        <div style={{width:64,height:64,borderRadius:"50%",background:"#D1FAE5",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#059669" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <div style={{fontSize:22,fontWeight:700,color:"#1B2838",marginBottom:6}}>Emails Sent!</div>
        <div style={{fontSize:14,color:"#5A6B7E",marginBottom:4}}>{Object.values(sent).filter(v=>v==='sent').length} delivered successfully</div>
        {Object.values(sent).filter(v=>v==='failed').length>0&&<div style={{fontSize:13,color:"#E44258",fontWeight:600}}>{Object.values(sent).filter(v=>v==='failed').length} failed</div>}
        <div style={{marginTop:20,display:"flex",gap:10,justifyContent:"center"}}>
          <Btn onClick={()=>{setSendDone(false);setStep(1);setChecked({});setSent({});setSendStats({done:0,total:0})}}>Send More</Btn>
          <Btn primary onClick={()=>{setSendDone(false);setStep(1);setChecked({});setSent({});setSendStats({done:0,total:0});setSelSheet('');setManualMode(false);setManualName('');setManualEmail('')}}>Done</Btn>
        </div>
      </div>:
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          {sending&&<div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:20,height:20,border:"3px solid #E6E9EF",borderTopColor:"#1490B0",borderRadius:"50%",animation:"spin .8s linear infinite"}}></div>
            <span style={{fontSize:13,color:C.tl,fontWeight:600}}>Sending {sendStats.done}/{sendStats.total}...</span>
          </div>}
        </div>
        <Btn primary onClick={sendEmails} disabled={sending||validSelected.length===0||!senderReady}>
          {sending?'Sending...':'Send to '+validSelected.length+' people'}
        </Btn>
      </div>}
    </div>}
  </div>);
}
