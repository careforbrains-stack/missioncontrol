<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100%;background:#fff}
body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;color:#1A1D21;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
button,input,select,textarea{font-family:inherit;transition:border-color .15s,background .15s,box-shadow .15s}
button{cursor:pointer}
button:disabled{opacity:.4;cursor:not-allowed}
::selection{background:#D0E8F2}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:8px}

.sidebar-shell{background:#292F4C;color:#fff}
.sidebar-brand{border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-profile{border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-label{color:rgba(255,255,255,.35)}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:13px;font-weight:500;color:rgba(255,255,255,.6);background:transparent;border:none;border-left:3px solid transparent;width:100%;text-align:left;font-family:inherit;transition:all .15s}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-btn.active{color:#fff;background:rgba(255,255,255,.1);border-left-color:#579BFC;font-weight:700}

.login-panel{background:#fff;border:1px solid #E6E9EF;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
.mission-card{background:#fff;border:1px solid #E6E9EF;border-radius:10px;transition:border-color .15s}
.mission-card:hover{border-color:#C3CAD9}
.mission-btn{border-radius:8px;font-weight:600;border:none;padding:7px 16px;font-size:12px}
.mission-btn:not(.mission-btn-primary){background:#F5F6F8;color:#323338;border:1px solid #E6E9EF}
.mission-btn:not(.mission-btn-primary):hover{background:#ECEDF5}
.mission-btn-primary{background:#579BFC;color:#fff;border:1px solid #579BFC}
.mission-btn-primary:hover{background:#4B8AE8}
.mission-field{border:1px solid #E6E9EF;border-radius:8px;padding:9px 12px;font-size:13px;outline:none;background:#fff;color:#323338}
.mission-field:focus{border-color:#579BFC;box-shadow:0 0 0 2px rgba(87,155,252,.15)}

.topbar-shell{background:#fff;border-bottom:1px solid #E6E9EF}
.topbar-title{font-weight:600;color:#323338}
.live-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:#E8FFF3;border:1px solid #C3F0D8}
.live-pill-dot{width:7px;height:7px;border-radius:50%;background:#00CA72;animation:pulse 2s infinite}
.stat-card{padding:20px;border-radius:10px;background:#fff;border:1px solid #E6E9EF}
.team-tile{border-radius:10px;background:#fff;border:1px solid #E6E9EF;transition:border-color .15s,box-shadow .15s}
.team-tile:hover{border-color:#579BFC;box-shadow:0 4px 12px rgba(87,155,252,.1)}

.page-enter{animation:slideUp .25s ease both}
.section-shell{position:relative}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:900px){.sidebar-shell{display:none!important}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

const FIREBASE_CONFIG={apiKey:"AIzaSyCnddOaA0dV6HnHeaHWlYa9hlEGb6uF1N0",authDomain:"careforbrains-hub.firebaseapp.com",databaseURL:"https://careforbrains-hub-default-rtdb.firebaseio.com",projectId:"careforbrains-hub",storageBucket:"careforbrains-hub.firebasestorage.app",messagingSenderId:"174180979425",appId:"1:174180979425:web:12d81181b955ae5d705da0"};
const GOOGLE_CLIENT_ID="397561140806-e8pj4l1m6jpdcrm8d8jtb76qk11oq37p.apps.googleusercontent.com";
const LK="cfb_mc_login";
const gL=()=>{try{return JSON.parse(localStorage.getItem(LK))}catch{return null}};
const sL=d=>localStorage.setItem(LK,JSON.stringify(d));
const fn=n=>n?.split(' ')[0]||'';
const EMAIL_ADMINS=["tanmay","ezra"];
const canUseEmails=id=>true;
const wait=ms=>new Promise(r=>setTimeout(r,ms));

const getSheetId=url=>(url||'').match(/\/d\/([a-zA-Z0-9-_]+)/)?.[1]||'';
async function fetchSheetValues(url,key){
  const sid=getSheetId(url);
  if(!sid||!key)return null;
  const ctrl=new AbortController();
  const timeout=setTimeout(()=>ctrl.abort(),15000);
  try{
    const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/A1:ZZ5000?key=${key}`,{signal:ctrl.signal});
    const j=await r.json();
    if(!r.ok)throw new Error(j?.error?.message||'Google Sheets request failed');
    return j.values||null;
  }catch(e){
    if(e?.name==='AbortError')throw new Error('Google Sheets request timed out');
    throw e;
  }finally{
    clearTimeout(timeout);
  }
}

const C={bg:"#fff",bgA:"#F5F6F8",dk:"#292F4C",fg:"#323338",sc:"#676879",mt:"#C3C6D4",tl:"#579BFC",td:"#0073EA",tg:"rgba(87,155,252,0.08)",rl:"#E6E9EF",cd:"#FFF",cb:"#E6E9EF",rd:"#E44258",gn:"#00CA72"};
const F={sf:"'Playfair Display',Georgia,serif",sn:"'Plus Jakarta Sans',-apple-system,sans-serif"};
const SHEET_SOURCES={general:{id:"general",label:"CareForBrains",tag:"GENERAL"},stem:{id:"stem",label:"STEM",tag:"STEM"}};
const SHEET_AUTO_SYNC_MS=1000*60*15;
const normSheetEntry=s=>({...s,source:s?.source||"general",autoSync:s?.autoSync!==false});
const fmtSyncTime=ts=>{
  if(!ts)return'Never synced';
  const diff=Date.now()-ts;
  if(diff<60000)return'Just now';
  if(diff<3600000)return`${Math.round(diff/60000)}m ago`;
  if(diff<86400000)return`${Math.round(diff/3600000)}h ago`;
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
};

let _gToken=null;
const colToLetter=c=>{let s='';while(c>=0){s=String.fromCharCode(65+(c%26))+s;c=Math.floor(c/26)-1}return s};

function Av({m,s=38}){const[e,setE]=useState(false);if(m?.img&&!e)return React.createElement('img',{src:m.img,alt:'',style:{width:s,height:s,borderRadius:8,objectFit:'cover',flexShrink:0,background:m.color},onError:()=>setE(true)});return<div style={{width:s,height:s,borderRadius:8,background:m?.color||C.tl,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:s*.38,flexShrink:0}}>{m?.name?.[0]||"?"}</div>}

function Btn({primary,children,onClick,style:sx,className='',...p}){return<button className={`mission-btn ${primary?'mission-btn-primary':''} ${className}`.trim()} onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"7px 16px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",...sx}} {...p}>{children}</button>}
function Inp({className='',...p}){return<input className={`mission-field ${className}`.trim()} style={{width:"100%",padding:"9px 12px",background:C.cd,border:"1px solid "+C.rl,borderRadius:10,color:C.fg,fontSize:13,fontFamily:"inherit",outline:"none",...(p.style||{})}} {...p}/>}
function Sel({style:sx,className='',...p}){return<select className={`mission-field ${className}`.trim()} style={{width:"100%",padding:"9px 12px",background:C.cd,border:"1px solid "+C.rl,borderRadius:10,color:C.fg,fontSize:13,fontFamily:"inherit",...(sx||{})}} {...p}/>}
function Lbl({children}){return<label style={{display:"block",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt,marginBottom:5}}>{children}</label>}
function Card({children,style:sx,className=''}){return<div className={`mission-card ${className}`.trim()} style={{background:C.cd,border:"1px solid "+C.cb,borderRadius:16,overflow:"hidden",marginBottom:14,...(sx||{})}}>{children}</div>}
function CardH({children,right}){return<div style={{padding:"12px 18px",borderBottom:"1px solid "+C.bgA,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:10.5,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:C.sc}}>{children}</span>{right}</div>}

// === FIREBASE HELPERS ===
// Convert Firebase objects (with keys) to arrays, filtering _seed markers
function fbToArr(obj){if(!obj)return[];return Object.keys(obj).filter(k=>k!=='_seed').map(k=>({...obj[k],_fbKey:k}))}

// === LOGIN ===
function Login({onLogin,passwords,team}){
  const[sel,setSel]=useState(null);const[pass,setPass]=useState('');const[err,setErr]=useState('');
  const go=()=>{if(passwords?.[sel]&&pass!==passwords[sel]){setErr('Wrong password');setTimeout(()=>setErr(''),2e3);return}sL({id:sel});onLogin(sel)};
  return(<div className="login-shell" style={{minHeight:"100vh",background:"#F5F6F8",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F.sn,padding:"32px 20px"}}>
    <div style={{width:440,maxWidth:"90vw"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <img src={LOGO} alt="" style={{width:48,height:48,borderRadius:12,marginBottom:10}}/>

        <div style={{marginTop:8,display:"inline-flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:20,background:"#E8FFF3",fontSize:11,fontWeight:600,color:"#00CA72"}}><span style={{width:6,height:6,borderRadius:3,background:"#00CA72",display:"inline-block"}}></span> Synced in real time</div>
      </div>
      <div className="login-panel page-enter" style={{padding:28}}>
        {!sel?<div>
          <div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.12em",color:C.mt,marginBottom:14}}>Sign in as</div>
          {team.map(m=><button key={m.id} onClick={()=>setSel(m.id)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"12px 14px",border:"1px solid "+C.rl,borderRadius:12,background:"rgba(255,255,255,.88)",cursor:"pointer",marginBottom:8,fontFamily:"inherit",textAlign:"left",boxShadow:"0 12px 24px rgba(9,26,38,.04)"}}>
            <Av m={m} s={36}/><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{m.name}</div><div style={{fontSize:10.5,color:C.mt}}>{m.role}</div></div>
            {m.admin&&<span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:C.tg,color:C.tl,fontFamily:"monospace"}}>ADMIN</span>}
          </button>)}
        </div>:<div>
          <button onClick={()=>{setSel(null);setPass('');setErr('')}} style={{fontSize:12,color:C.tl,background:"none",border:"none",cursor:"pointer",marginBottom:16,fontFamily:"inherit",fontWeight:600}}>&#8592; Back</button>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}><Av m={team.find(t=>t.id===sel)} s={44}/><div style={{fontWeight:700,fontSize:16}}>{team.find(t=>t.id===sel)?.name}</div></div>
          <div style={{marginBottom:14}}><Lbl>Password</Lbl><input type="password" style={{width:"100%",padding:"11px 14px",background:C.cd,border:"1px solid "+C.rl,borderRadius:8,color:C.fg,fontSize:14,fontFamily:"inherit",outline:"none"}} value={pass} onChange={e=>setPass(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} autoFocus/></div>
          {err&&<div style={{color:C.rd,fontSize:12,fontWeight:600,marginBottom:10}}>{err}</div>}
          <button onClick={go} style={{width:"100%",padding:"12px",borderRadius:8,background:"#579BFC",color:"#fff",fontWeight:700,fontSize:13,border:"none",cursor:"pointer",fontFamily:"inherit"}}>Sign In</button>
        </div>}
      </div>
    </div>
  </div>);
}

// === SIDEBAR ===

// === MY WORK ===
function MyWork({db,tasks,events,team,me}){
  const meD=team.find(t=>t.id===me);const my=tasks.filter(t=>t.assignee===me);
  const pending=my.filter(t=>!t.done).sort((a,b)=>{const p={high:0,medium:1,low:2};return(p[a.priority]||1)-(p[b.priority]||1)});
  const done=my.filter(t=>t.done);const myEv=events.filter(e=>e.assignee===me&&new Date(e.date)>=new Date());
  const toggle=t=>{db.ref('hub/tasks/'+t._fbKey+'/done').set(!t.done);if(!t.done)db.ref('hub/tasks/'+t._fbKey+'/doneDate').set(new Date().toISOString().split('T')[0])};
  const hr=new Date().getHours();
  return(<div>
    <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>01 &#8212; My Work</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Good {hr<12?"morning":hr<18?"afternoon":"evening"}, {fn(meD?.name)}</h1></div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 22px"}}/>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:22}}>
      {[[pending.length,"Open Tasks"],[done.length,"Completed"],[myEv.length,"Upcoming"]].map(([n,l],i)=><div key={i} className="stat-card" style={{border:"1px solid "+C.cb}}><div style={{fontFamily:F.sf,fontSize:34,fontWeight:400,lineHeight:1}}>{n}</div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt,marginTop:6}}>{l}</div></div>)}
    </div>
    <Card>
      <CardH right={<span style={{fontFamily:"monospace",fontSize:11,color:C.mt}}>{pending.length} open</span>}>Your Assignments</CardH>
      <div style={{padding:"14px 18px"}}>
        {pending.length===0&&done.length===0&&<div style={{textAlign:"center",padding:36,color:C.mt,fontFamily:F.sf,fontStyle:"italic"}}>No assignments yet</div>}
        {pending.map(t=>{const by=team.find(m=>m.id===t.assignedBy);return(
          <div key={t._fbKey} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 0",borderBottom:"1px solid "+C.bgA}}>
            <div onClick={()=>toggle(t)} style={{width:18,height:18,borderRadius:4,border:"1.5px solid "+C.rl,cursor:"pointer",flexShrink:0,marginTop:2}}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14}}>{t.text}</div>
              {t.notes&&<div style={{fontSize:12.5,color:C.sc,marginTop:3}}>{t.notes}</div>}
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6,flexWrap:"wrap"}}>
                <Tag t={t.priority}/>{t.due&&<span style={{fontSize:10,fontFamily:"monospace",color:new Date(t.due)<new Date()?C.rd:C.mt}}>Due {t.due}</span>}{by&&<span style={{fontSize:10,color:C.mt}}>from {fn(by.name)}</span>}
              </div></div></div>)})}
        {done.length>0&&<><div style={{fontFamily:"monospace",fontSize:10,color:C.mt,marginTop:14,marginBottom:6}}>COMPLETED ({done.length})</div>
          {done.slice(0,5).map(t=><div key={t._fbKey} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 0",opacity:0.4}}>
            <div onClick={()=>toggle(t)} style={{width:18,height:18,borderRadius:4,background:C.gn,border:"1.5px solid "+C.gn,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10}}>&#10003;</div>
            <span style={{flex:1,textDecoration:"line-through",color:C.mt,fontSize:13}}>{t.text}</span></div>)}</>}
      </div>
    </Card>
  </div>);
}

// === TEAM BOARD ===
function TeamBoard({db,tasks,team,me}){

// === SHEETS ===
function Sheets({db,hubData,team,me}){
  const sheets=fbToArr(hubData.sheets).map(normSheetEntry).sort((a,b)=>{
    const ac=!!(a.note||''),bc=!!(b.note||'');
    if(ac!==bc)return ac?1:-1;
    return(a.name||'').localeCompare(b.name||'');
  });
  const sheetData=hubData.sheetData||{};
  const[active,setActive]=useState(sheets[0]?._fbKey||'');
  const[gToken,setGTokenState]=useState(_gToken);
  const setGToken=v=>{_gToken=v;setGTokenState(v)};
  const[editCell,setEditCell]=useState(null);
  const[editVal,setEditVal]=useState('');
  const[saving,setSaving]=useState(false);
  const tableRef=useRef(null);
  const tokenClientRef=useRef(null);
  const scrollRef=useRef(0);
  useEffect(()=>{
    const el=tableRef.current;
    if(!el)return;
    el.scrollTop=scrollRef.current;
    const onScroll=()=>{scrollRef.current=el.scrollTop};
    el.addEventListener('scroll',onScroll,{passive:true});
    return()=>el.removeEventListener('scroll',onScroll);
  });

  const activeSheet=sheets.find(s=>(s._fbKey||s.id)===active)||sheets[0]||null;
  const activeVals=activeSheet?sheetData[activeSheet.id]:null;
  const allHeaders=Array.isArray(activeVals)&&activeVals.length?activeVals[0]:[];
  const allRows=Array.isArray(activeVals)&&activeVals.length>1?activeVals.slice(1):[];

  const priorityWords=['reached','status','done','complete','approved','accepted','respond','reply','contacted','joined','added','attended','insta','disc'];
  const isPriCol=h=>priorityWords.some(w=>(h||'').toLowerCase().includes(w));

  // Strip empty trailing columns
  const lastUsed=React.useMemo(()=>{
    for(let c=allHeaders.length-1;c>=0;c--){
      if((allHeaders[c]||'').trim()||allRows.some(r=>(r[c]||'').trim()))return c+1;
    }
    return allHeaders.length;
  },[allHeaders.join(','),allRows.length]);
  const cleanHeaders=allHeaders.slice(0,lastUsed);

  // Pick 7 visible columns: priority first, then rest
  const visibleCols=React.useMemo(()=>{
    if(!cleanHeaders.length)return[];
    const pri=[];const rest=[];
    cleanHeaders.forEach((_,i)=>{if(isPriCol(cleanHeaders[i]))pri.push(i);else rest.push(i)});
    return[...pri,...rest].slice(0,7);
  },[cleanHeaders.join(',')]);

  const connectGoogle=()=>{
    if(!window.google?.accounts?.oauth2)return;
    if(!tokenClientRef.current){
      tokenClientRef.current=window.google.accounts.oauth2.initTokenClient({
        client_id:GOOGLE_CLIENT_ID,scope:'https://www.googleapis.com/auth/spreadsheets',
        callback:resp=>{if(resp.access_token)setGToken(resp.access_token)}
      });
    }
    tokenClientRef.current.requestAccessToken();
  };

  const saveCell=async(rowIdx,realCol,value)=>{
    if(!activeSheet||!gToken)return;
    const sid=getSheetId(activeSheet.url);if(!sid)return;
    setSaving(true);
    const scrollPos=tableRef.current?.scrollTop||0;
    try{
      const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+sid+'/values/'+colToLetter(realCol)+(rowIdx+2)+'?valueInputOption=USER_ENTERED',{
        method:'PUT',headers:{'Authorization':'Bearer '+gToken,'Content-Type':'application/json'},
        body:JSON.stringify({values:[[value]]})
      });
      if(!r.ok)throw new Error('fail');
      const cached=JSON.parse(JSON.stringify(activeVals||[]));
      if(cached[rowIdx+1])cached[rowIdx+1][realCol]=value;
      db.ref('hub/sheetData/'+activeSheet.id).set(cached);
      setEditCell(null);
      requestAnimationFrame(()=>{if(tableRef.current)tableRef.current.scrollTop=scrollPos});
    }catch(e){
      const msg=String(e);
      if(msg.includes('401')||msg.includes('403'))setGToken(null);
    }
    setSaving(false);
  };
  const jumpTo=pct=>{if(tableRef.current)tableRef.current.scrollTop=tableRef.current.scrollHeight*pct};
  const fmtH=h=>(h||'').replace(/^\d+\.\s*/,'').replace(/[:\?]$/,'').trim();

  // Color for priority cells
  const priCellStyle=(val)=>{
    const v=(val||'').trim().toLowerCase();
    if(!v)return{background:"#FEE2E2",color:"#991B1B"}; // empty = red
    if(v==='y'||v==='yes'||v==='done'||v==='true')return{background:"#D1FAE5",color:"#065F46"}; // yes = green
    if(v==='n'||v==='no'||v==='nah'||v==='false')return{background:"#FEE2E2",color:"#991B1B"}; // no = red
    return{background:"#FEF3C7",color:"#92400E"}; // other = amber
  };

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>05 &#8212; Sheets</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Data Room</h1></div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {saving&&<span style={{fontSize:11,color:C.tl}}>Saving...</span>}
        {!gToken?<Btn onClick={connectGoogle} primary>Connect Google</Btn>:<span style={{fontSize:11,fontWeight:600,color:C.gn}}>&#9679; Connected</span>}
      </div>
    </div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 18px"}}/>
    {!gToken&&<div style={{padding:"8px 14px",borderRadius:8,background:"#FFF5F5",border:"1px solid #FECACA",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
      <span style={{color:"#E44258",fontSize:12,fontWeight:600}}>&#9888; View only</span>
      <span style={{color:"#676879",fontSize:12}}>Connect Google to edit cells.</span>
    </div>}
    <div style={{display:"flex",gap:4,marginBottom:14,flexWrap:"wrap"}}>
      {sheets.map(s=>{
        const isAct=(s._fbKey||s.id)===active;
        const rc=Math.max(((sheetData[s.id]||[]).length||0)-1,0);
        const closed=!!(s.note||'');
        return<button key={s._fbKey} onClick={()=>{setActive(s._fbKey||s.id);setEditCell(null)}} style={{
          padding:"7px 14px",border:isAct?"2px solid #579BFC":"1px solid "+C.rl,
          borderRadius:8,background:isAct?"#EBF5FF":"#fff",cursor:"pointer",fontFamily:"inherit",
          fontSize:12,fontWeight:isAct?700:500,color:isAct?"#323338":"#676879",
          display:"flex",alignItems:"center",gap:6,opacity:closed&&!isAct?0.5:1
        }}>
          {s.name}
          {closed&&<span style={{padding:"1px 5px",borderRadius:3,fontSize:9,fontWeight:700,background:"#F3F4F6",color:"#9CA3AF"}}>CLOSED</span>}
          <span style={{fontSize:10,color:rc?C.gn:C.mt,fontFamily:"monospace"}}>{rc}</span>
        </button>
      })}
    </div>
    {activeSheet&&visibleCols.length>0?<Card style={{overflow:"hidden"}}>
      <div style={{padding:"8px 14px",borderBottom:"1px solid "+C.rl,display:"flex",justifyContent:"space-between",alignItems:"center",background:"#F5F6F8"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontWeight:700,fontSize:13}}>{activeSheet.name}</span>
          {activeSheet.note&&<span style={{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:"#F3F4F6",color:"#9CA3AF"}}>{activeSheet.note}</span>}
          <span style={{fontSize:11,color:C.sc}}>{allRows.length} rows</span>
          {gToken&&<span style={{fontSize:10,color:C.mt}}>double-click to edit &#183; &#9776; to view all</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {[['25%',.25],['50%',.5],['75%',.75],['End',1]].map(([l,p])=><button key={l} onClick={()=>jumpTo(p)} style={{padding:"3px 8px",border:"1px solid "+C.rl,borderRadius:5,background:"#fff",fontSize:10,fontWeight:600,color:C.sc,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>)}
          {activeSheet.url&&<a href={activeSheet.url} target="_blank" rel="noreferrer" style={{fontSize:11,color:C.tl,textDecoration:"none",fontWeight:600,marginLeft:6}}>Open &#8599;</a>}
        </div>
      </div>
      <div ref={tableRef} style={{overflowY:"auto",overflowX:"hidden",maxHeight:"72vh"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,tableLayout:"fixed"}}>
          <colgroup>{visibleCols.map((ci,i)=><col key={i} style={{width:isPriCol(cleanHeaders[ci])?"80px":(100/visibleCols.length)+"%"}}/>)}<col style={{width:"36px"}}/></colgroup>
          <thead><tr>{visibleCols.map((ci,i)=>{
            const h=cleanHeaders[ci]||'';const pri=isPriCol(h);
            return<th key={i} style={{padding:"7px 10px",textAlign:"left",borderBottom:"2px solid "+C.rl,fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.04em",color:pri?"#0073EA":"#323338",background:pri?"#E8F0FE":"#F5F6F8",position:"sticky",top:0,zIndex:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fmtH(h)}</th>
          })}<th style={{width:36,padding:0,borderBottom:"2px solid "+C.rl,background:"#F5F6F8",position:"sticky",top:0,zIndex:2}}></th></tr></thead>
          <tbody>{allRows.map((row,i)=>{
            const isViewing=editCell&&editCell.view===i;
            return<React.Fragment key={i}><tr style={{background:isViewing?"#EBF5FF":i%2===0?"#fff":"#FAFBFC"}}>
            {visibleCols.map((ci,j)=>{
              const isEditing=editCell&&editCell.r===i&&editCell.c===ci&&!editCell.view;
              const pri=isPriCol(cleanHeaders[ci]);
              const val=row[ci]||'';
              const pStyle=pri?priCellStyle(val):{};
              return<td key={j} onDoubleClick={()=>{if(gToken){setEditCell({r:i,c:ci});setEditVal(val)}}} style={{
                padding:isEditing?"2px":"4px 8px",borderBottom:"1px solid #F0F1F3",
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                fontSize:12,fontWeight:pri?700:"normal",textAlign:pri?"center":"left",
                cursor:gToken?"text":"default",
                background:isEditing?"#D0E8F2":(pStyle.background||"inherit"),
                color:isEditing?"#323338":(pStyle.color||"#323338")
              }}>
                {isEditing?<input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)}
                  onBlur={()=>saveCell(i,ci,editVal)}
                  onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();saveCell(i,ci,editVal)}if(e.key==='Escape')setEditCell(null)}}
                  style={{width:"100%",padding:"3px 6px",border:"2px solid #579BFC",borderRadius:4,fontSize:12,fontFamily:"inherit",outline:"none",background:"#fff"}}
                />:pri?(val||'—'):val}
              </td>
            })}
            <td style={{width:32,padding:"4px",borderBottom:"1px solid #F0F1F3",textAlign:"center"}}>
              <button onClick={()=>setEditCell(isViewing?null:{view:i})} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:isViewing?"#579BFC":"#C3C6D4",padding:2}} title="View all fields">&#9776;</button>
            </td>
            </tr>
            {isViewing&&<tr><td colSpan={visibleCols.length+1} style={{padding:0,background:"#F8FAFC",borderBottom:"2px solid #579BFC"}}>
              <div style={{padding:"12px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"6px 20px"}}>
                {cleanHeaders.map((h,ci)=>{
                  const val=row[ci]||'';
                  const isFieldEdit=editCell&&editCell.r===i&&editCell.c===ci&&editCell.view===i;
                  return<div key={ci} style={{display:"flex",gap:6,alignItems:"baseline",padding:"3px 0",borderBottom:"1px solid #ECEDF5"}}>
                    <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",color:"#676879",minWidth:100,flexShrink:0}}>{fmtH(h)}</span>
                    {isFieldEdit?<input autoFocus value={editVal} onChange={e=>setEditVal(e.target.value)}
                      onBlur={()=>saveCell(i,ci,editVal)}
                      onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();saveCell(i,ci,editVal)}if(e.key==='Escape')setEditCell({view:i})}}
                      style={{flex:1,padding:"3px 6px",border:"2px solid #579BFC",borderRadius:4,fontSize:12,fontFamily:"inherit",outline:"none",background:"#fff"}}
                    />:<span onDoubleClick={()=>{if(gToken){setEditCell({r:i,c:ci,view:i});setEditVal(val)}}} style={{
                      fontSize:12,color:val?"#323338":"#C3C6D4",cursor:gToken?"text":"default",wordBreak:"break-word"
                    }}>{val||'—'}</span>}
                  </div>
                })}
              </div>
            </td></tr>}
            </React.Fragment>})}</tbody>
        </table>
      </div>
    </Card>:activeSheet?<Card><div style={{padding:"40px 24px",textAlign:"center",color:C.mt}}>
      <div style={{fontFamily:F.sf,fontSize:18,fontStyle:"italic"}}>No data synced yet</div>
    </div></Card>:<div style={{padding:"40px",textAlign:"center",color:C.mt}}>No sheets linked</div>}
  </div>);
}

// === EMAILS ===
function Emails({db,hubData,team,me}){
  const canEmail=canUseEmails(me);
  const[selSheet,setSelSheet]=useState('');
  const[rows,setRows]=useState([]);const[cols,setCols]=useState([]);
  const[emailCol,setEmailCol]=useState('');const[nameCol,setNameCol]=useState('');
  const[checked,setChecked]=useState({});const[template,setTemplate]=useState('stem_accept');
  const[sending,setSending]=useState(false);const[sent,setSent]=useState({});
  const[customSubj,setCustomSubj]=useState('');const[customBody,setCustomBody]=useState('');
  const[showPrev,setShowPrev]=useState(false);const[prevIdx,setPrevIdx]=useState(0);
  const[loading,setLoading]=useState(false);
  const[editCfg,setEditCfg]=useState(false);
  const emailCfg=normEmailCfg(hubData.emailjs);
  const[cfgForm,setCfgForm]=useState(()=>normEmailCfg(hubData.emailjs));
  const[senderId,setSenderId]=useState(emailCfg.defaultProfile||'general');
  const[search,setSearch]=useState('');
  const[sendStats,setSendStats]=useState({done:0,total:0});
  const sheets=hubData.sheets?Object.keys(hubData.sheets).filter(k=>k!=='_seed').map(k=>normSheetEntry(hubData.sheets[k])):[];
  const sheetData=hubData.sheetData||{};
  const campaigns=fbToArr(hubData.emailCampaigns).sort((a,b)=>(b.createdTs||0)-(a.createdTs||0));
  const TMPLS={
    stem_accept:{name:'STEM Internship - Accepted',subj:'Welcome to the CareForBrains STEM Exploration Program!',body:'Hi {{name}},\n\nCongratulations! We are excited to welcome you to the CareForBrains STEM Exploration Program.\n\nHere are your next steps:\n1. Join our Discord server: [DISCORD_LINK]\n2. Fill out the onboarding form: [ONBOARDING_LINK]\n3. Attend orientation on [DATE]\n\nIf you have any questions, reply to this email.\n\nBest,\nThe CareForBrains STEM Team'},
    stem_reject:{name:'STEM Internship - Not Selected',subj:'CareForBrains STEM Program Update',body:'Hi {{name}},\n\nThank you for your interest in the CareForBrains STEM Exploration Program. After careful review, we are unable to offer you a position at this time.\n\nWe encourage you to apply again and check out our other opportunities at careforbrains.org.\n\nBest,\nThe CareForBrains Team'},
    volunteer_welcome:{name:'General Volunteer Welcome',subj:'Welcome to CareForBrains!',body:'Hi {{name}},\n\nWelcome to CareForBrains! We are thrilled to have you join our mission.\n\nGet started:\n1. Join our volunteer Discord: [DISCORD_LINK]\n2. Complete onboarding: [ONBOARDING_LINK]\n3. Check your chapter assignment\n\nThank you!\n\nBest,\nThe CareForBrains Team'},
    chapter_response:{name:'Chapter Application Response',subj:'Your CareForBrains Chapter Application',body:'Hi {{name}},\n\nThank you for applying to start a CareForBrains chapter! We would love to move forward.\n\n1. Schedule a call: [CALENDLY_LINK]\n2. Review the Chapter Handbook: [HANDBOOK_LINK]\n\nBest,\nThe CareForBrains Team'},
    custom:{name:'Custom Email',subj:'',body:''}
  };
  useEffect(()=>{if(!emailCfg.profiles[senderId])setSenderId(emailCfg.defaultProfile||'general')},[hubData.emailjs,senderId]);
  const applySheetData=vals=>{if(vals&&Array.isArray(vals)&&vals.length>0){const headers=vals[0]||[];setCols(headers);setRows(vals.slice(1));const ei=headers.findIndex(h=>h.toLowerCase().includes('email'));const ni=headers.findIndex(h=>h.toLowerCase().includes('name')&&!h.toLowerCase().includes('last'));setEmailCol(ei>=0?headers[ei]:'');setNameCol(ni>=0?headers[ni]:'')}else{setCols([]);setRows([]);setEmailCol('');setNameCol('')}};
  useEffect(()=>{if(selSheet)applySheetData(sheetData[selSheet])},[hubData.sheetData,selSheet]);
  const loadSheet=sid=>{setSelSheet(sid);setChecked({});setSent({});setShowPrev(false);setPrevIdx(0);setSearch('');applySheetData(sheetData[sid]);const s=sheets.find(v=>v.id===sid);if((!sheetData[sid]||!sheetData[sid]?.length)&&s?.url&&hubData.sheetsApiKey)syncSheet(s)};
  const syncSheet=async s=>{const key=hubData.sheetsApiKey;if(!getSheetId(s.url)||!key)return;setLoading(true);try{const vals=await fetchSheetValues(s.url,key);if(vals){db.ref('hub/sheetData/'+s.id).set(vals);applySheetData(vals)}}catch(e){console.error(e);alert('Could not pull that sheet. Check the API key and sharing settings.')}setLoading(false)};
  const eIdx=cols.indexOf(emailCol);const nIdx=cols.indexOf(nameCol);
  const fill=(tmpl,row)=>{let t=tmpl;const name=nIdx>=0?(row[nIdx]||''):'';t=t.replace(/\{\{name\}\}/g,name);cols.forEach((col,i)=>{t=t.replace(new RegExp('\\{\\{'+col.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\}\\}','g'),row[i]||'')});return t};
  const cur=TMPLS[template]||TMPLS.custom;
  const subj=template==='custom'?customSubj:cur.subj;
  const body=template==='custom'?customBody:cur.body;
  const rowMeta=rows.map((row,i)=>{const email=eIdx>=0?(row[eIdx]||'').trim():'';const name=nIdx>=0?(row[nIdx]||'').trim():'';return{i,row,email,name,emailValid:okEmail(email),search:row.map(v=>(v||'').toString().toLowerCase()).join(' ')}});
  const filteredRows=rowMeta.filter(m=>!search.trim()||m.search.includes(search.trim().toLowerCase()));
  const filteredValidRows=filteredRows.filter(m=>m.emailValid);
  const selectedRows=rowMeta.filter(m=>checked[m.i]);
  const sendableRows=selectedRows.filter(m=>m.emailValid);
  const sender=emailCfg.profiles[senderId]||emailCfg.profiles[emailCfg.defaultProfile]||EMAIL_PROFILE_DEFAULTS.general;
  const senderReady=!!(sender.publicKey&&sender.serviceId&&sender.templateId);
  const activeSheet=sheets.find(s=>s.id===selSheet);
  const allVisibleValidChecked=filteredValidRows.length>0&&filteredValidRows.every(m=>checked[m.i]);
  const previewRows=selectedRows;
  const safePrevIdx=Math.min(prevIdx,Math.max(previewRows.length-1,0));
  const toggleAll=()=>{const n={...checked};if(allVisibleValidChecked)filteredValidRows.forEach(m=>delete n[m.i]);else filteredValidRows.forEach(m=>{n[m.i]=true});setChecked(n)};
  const openCfg=()=>{setCfgForm(normEmailCfg(hubData.emailjs));setEditCfg(true)};
  const setCfgValue=(pid,key,val)=>setCfgForm(cur=>({...cur,profiles:{...cur.profiles,[pid]:{...cur.profiles[pid],[key]:val}}}));
  const saveCfg=()=>{const next=normEmailCfg(cfgForm);db.ref('hub/emailjs').set(next);setCfgForm(next);setEditCfg(false);setSenderId(next.defaultProfile)};
  const sendEmails=async()=>{
    if(!senderReady){alert('Finish sender setup first');return}
    if(eIdx<0){alert('Select the email column first');return}
    if(!subj.trim()){alert('Add a subject first');return}
    if(!body.trim()){alert('Add a message body first');return}
    if(sendableRows.length===0){alert('Select recipients with valid email addresses');return}
    setSending(true);setSendStats({done:0,total:sendableRows.length});
    const ns={...sent};let sentCount=0;let failedCount=0;
    for(let i=0;i<sendableRows.length;i++){
      const meta=sendableRows[i];
      try{
        await emailjs.send(sender.serviceId,sender.templateId,{to_email:meta.email,to_name:meta.name,subject:fill(subj,meta.row),message:fill(body,meta.row),from_name:sender.fromName||sender.label||'CareForBrains',reply_to:sender.replyTo||'',sender_label:sender.label||''},{publicKey:sender.publicKey});
        ns[meta.i]='sent';sentCount++;
      }catch(e){
        console.error(e);ns[meta.i]='failed';failedCount++;
      }
      setSent({...ns});
      setSendStats({done:i+1,total:sendableRows.length});
      if(i<sendableRows.length-1)await wait(1100);
    }
    const ref=db.ref('hub/emailCampaigns').push();
    ref.set({id:ref.key,sheetId:selSheet,sheetName:activeSheet?.name||'',profile:senderId,profileLabel:sender.label||senderId,template,templateName:cur.name,subject,recipientCount:sendableRows.length,sentCount,failedCount,createdBy:me,createdAt:new Date().toISOString(),createdTs:Date.now()});
    setSending(false);
  };

  if(!canEmail)return(<div className="page-enter" style={{padding:"10px 0"}}>
    <Card style={{border:"1px solid rgba(239,68,68,.2)"}}>
      <div style={{padding:"18px 22px"}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.12em",color:C.rd,marginBottom:8}}>Restricted</div>
        <h2 style={{fontFamily:F.sf,fontSize:24,fontWeight:400,marginBottom:6}}>Communications access is limited</h2>
        <div style={{fontSize:13,color:C.sc,lineHeight:1.7}}>Only Tanmay and Ezra can open the email operations workspace and send outbound campaigns.</div>
      </div>
    </Card>
  </div>);

  return(<div>
    <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>07 &#8212; Emails</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Send Emails</h1></div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 22px"}}/>
    <Card style={{marginBottom:18}}><CardH right={!editCfg&&canEmail&&<button onClick={openCfg} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:C.sc,fontFamily:"inherit"}}>{Object.values(emailCfg.profiles).some(p=>p.publicKey)?'Edit':'Set up'}</button>}>Sender Profiles</CardH>
      <div style={{padding:"14px 18px"}}>{editCfg?<div>
        <div style={{background:C.bgA,borderRadius:8,padding:12,marginBottom:14,fontSize:12,color:C.sc,lineHeight:1.7}}>Use one EmailJS service and template per mailbox if you want a real send-from choice between your general and STEM inboxes. This flow is paced at 1 email per second to stay inside EmailJS browser limits.</div>
        {Object.keys(cfgForm.profiles).map(pid=>{const p=cfgForm.profiles[pid];const ready=p.publicKey&&p.serviceId&&p.templateId;return(<div key={pid} style={{border:"1px solid "+C.cb,borderRadius:10,padding:14,marginBottom:12,background:C.cd}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div><div style={{fontWeight:700,fontSize:14}}>{p.label||pid}</div><div style={{fontSize:10,color:ready?C.gn:C.mt,fontFamily:"monospace"}}>{ready?'CONNECTED':'NOT CONFIGURED'}</div></div><label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.sc,cursor:"pointer"}}><input type="radio" checked={cfgForm.defaultProfile===pid} onChange={()=>setCfgForm(cur=>({...cur,defaultProfile:pid}))}/> Default sender</label></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div><Lbl>Label</Lbl><Inp value={p.label||''} onChange={e=>setCfgValue(pid,'label',e.target.value)}/></div>
            <div><Lbl>From Name</Lbl><Inp value={p.fromName||''} onChange={e=>setCfgValue(pid,'fromName',e.target.value)}/></div>
            <div><Lbl>Reply-To</Lbl><Inp value={p.replyTo||''} onChange={e=>setCfgValue(pid,'replyTo',e.target.value)} placeholder="name@example.org"/></div>
            <div><Lbl>Public Key</Lbl><Inp value={p.publicKey||''} onChange={e=>setCfgValue(pid,'publicKey',e.target.value)}/></div>
            <div><Lbl>Service ID</Lbl><Inp value={p.serviceId||''} onChange={e=>setCfgValue(pid,'serviceId',e.target.value)}/></div>
            <div><Lbl>Template ID</Lbl><Inp value={p.templateId||''} onChange={e=>setCfgValue(pid,'templateId',e.target.value)}/></div>
          </div>
        </div>)})}
        <div style={{display:"flex",gap:8}}><Btn primary onClick={saveCfg}>Save</Btn><Btn onClick={()=>setEditCfg(false)}>Cancel</Btn></div>
      </div>:<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{Object.values(emailCfg.profiles).map(p=>{const ready=p.publicKey&&p.serviceId&&p.templateId;return(<div key={p.id} style={{border:"1px solid "+C.cb,borderRadius:10,padding:12,background:p.id===emailCfg.defaultProfile?C.tg:C.cd}}>
        <div style={{display:"flex",justifyContent:"space-between",gap:10,marginBottom:4}}><span style={{fontWeight:700,fontSize:13}}>{p.label||p.id}</span><span style={{fontSize:10,fontFamily:"monospace",color:ready?C.gn:C.mt}}>{ready?'READY':'SET UP NEEDED'}</span></div>
        <div style={{fontSize:11,color:C.sc}}>{p.fromName||'No sender name yet'}</div>
        <div style={{fontSize:10,color:C.mt,marginTop:4}}>{p.replyTo||'Reply-to not set yet'}</div>
      </div>)})}</div>}</div>
    </Card>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:18}}>
      <Card><CardH>1. Data Source</CardH><div style={{padding:"14px 18px"}}>
        <Lbl>Google Sheet</Lbl><div style={{display:"flex",gap:8}}><Sel value={selSheet} onChange={e=>loadSheet(e.target.value)}><option value="">Choose...</option>{sheets.map(s=><option key={s.id} value={s.id}>{(SHEET_SOURCES[s.source]||SHEET_SOURCES.general).tag} - {s.name}</option>)}</Sel>
        {selSheet&&sheets.find(s=>s.id===selSheet)?.url&&<Btn onClick={()=>syncSheet(sheets.find(s=>s.id===selSheet))} primary>{loading?'...':'Sync'}</Btn>}</div>
        {cols.length>0&&<div style={{marginTop:14}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><Lbl>Email Column</Lbl><Sel value={emailCol} onChange={e=>setEmailCol(e.target.value)}><option value="">Select...</option>{cols.map(c=><option key={c} value={c}>{c}</option>)}</Sel></div>
          <div><Lbl>Name Column</Lbl><Sel value={nameCol} onChange={e=>setNameCol(e.target.value)}><option value="">Select...</option>{cols.map(c=><option key={c} value={c}>{c}</option>)}</Sel></div>
        </div><div style={{marginTop:8,fontSize:11,color:C.gn,fontWeight:600}}>{cols.length} columns &#183; {rows.length} rows &#183; {rowMeta.filter(m=>m.emailValid).length} valid emails</div></div>}
      </div></Card>
      <Card><CardH>2. Campaign</CardH><div style={{padding:"14px 18px"}}>
        <div style={{marginBottom:12}}><Lbl>Send From</Lbl><Sel value={senderId} onChange={e=>setSenderId(e.target.value)}>{Object.values(emailCfg.profiles).map(p=>{const ready=p.publicKey&&p.serviceId&&p.templateId;return<option key={p.id} value={p.id}>{p.label||p.id}{ready?'':' (set up needed)'}</option>})}</Sel>
          <div style={{marginTop:6,fontSize:11,color:senderReady?C.gn:C.rd,fontWeight:600}}>{senderReady?(sender.replyTo?`Replies go to ${sender.replyTo}`:'Sender ready'):'Finish this sender profile in Sender Profiles before sending.'}</div>
        </div>
        <Lbl>Email Template</Lbl><Sel value={template} onChange={e=>setTemplate(e.target.value)}>{Object.entries(TMPLS).map(([k,v])=><option key={k} value={k}>{v.name}</option>)}</Sel>
        {template==='custom'&&<div style={{marginTop:10}}><div style={{marginBottom:8}}><Lbl>Subject</Lbl><Inp value={customSubj} onChange={e=>setCustomSubj(e.target.value)}/></div><Lbl>Body</Lbl><textarea style={{width:"100%",padding:"9px 12px",background:C.cd,border:"1px solid "+C.rl,borderRadius:7,color:C.fg,fontSize:13,fontFamily:"inherit",outline:"none",minHeight:120,resize:"vertical"}} value={customBody} onChange={e=>setCustomBody(e.target.value)} placeholder="Use {{name}} for personalization..."/></div>}
        {template!=='custom'&&<div style={{marginTop:10,background:C.bgA,borderRadius:8,padding:12}}><div style={{fontWeight:700,fontSize:12,marginBottom:4}}>Subject: {cur.subj}</div><div style={{fontSize:12,color:C.sc,whiteSpace:"pre-wrap",lineHeight:1.5,maxHeight:120,overflow:"auto"}}>{cur.body}</div></div>}
        <div style={{marginTop:8,fontSize:10.5,color:C.mt}}>{'{{name}}'} and {'{{column_name}}'} auto-fill from sheet headers.</div>
        {cols.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:10}}>{['{{name}}',...cols.slice(0,6).map(c=>`{{${c}}}`)].map(tok=><span key={tok} style={{padding:"3px 7px",borderRadius:999,border:"1px solid "+C.rl,fontSize:10,fontFamily:"monospace",color:C.sc}}>{tok}</span>)}</div>}
      </div></Card>
    </div>
    {cols.length>0&&rows.length>0&&<Card><CardH right={<div style={{display:"flex",alignItems:"center",gap:12}}>
      <span style={{fontSize:12,color:C.sc}}>{selectedRows.length} selected &#183; {sendableRows.length} ready</span>
      {selectedRows.length>0&&<button onClick={()=>{setShowPrev(!showPrev);setPrevIdx(0)}} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:12,color:C.tl,fontWeight:600,fontFamily:"inherit"}}>{showPrev?'Hide':'Preview'}</button>}
      <Btn primary onClick={sendEmails} disabled={sending||sendableRows.length===0}>{sending?`Sending ${sendStats.done}/${sendStats.total}`:'Send to '+sendableRows.length}</Btn>
    </div>}>3. Select Recipients</CardH>
      <div style={{padding:"12px 18px 0"}}><Inp value={search} onChange={e=>setSearch(e.target.value)} placeholder="Filter rows by any text, name, or email"/><div style={{marginTop:8,fontSize:10.5,color:C.mt}}>Only rows with valid email addresses can be bulk-selected and sent.</div></div>
      <div style={{padding:0,overflowX:"auto",maxHeight:500}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
        <thead><tr><th style={{padding:"8px 12px",textAlign:"center",borderBottom:"2px solid "+C.rl,background:C.bgA,position:"sticky",top:0,width:40}}><input type="checkbox" onChange={toggleAll} checked={allVisibleValidChecked}/></th><th style={{padding:"8px 12px",textAlign:"center",borderBottom:"2px solid "+C.rl,background:C.bgA,position:"sticky",top:0,width:88,fontSize:10,fontWeight:700,color:C.sc}}>Status</th>
          {cols.map((h,i)=><th key={i} style={{padding:"8px 12px",textAlign:"left",borderBottom:"2px solid "+C.rl,fontSize:10,fontWeight:700,textTransform:"uppercase",color:C.sc,position:"sticky",top:0,background:C.bgA,whiteSpace:"nowrap"}}>{h}{h===emailCol&&' \u2709'}{h===nameCol&&' \u263A'}</th>)}</tr></thead>
        <tbody>{filteredRows.map(meta=><tr key={meta.i} style={{background:checked[meta.i]?C.tg:"transparent",opacity:meta.emailValid?1:0.72}}>
          <td style={{padding:"7px 12px",borderBottom:"1px solid "+C.bgA,textAlign:"center"}}><input type="checkbox" checked={!!checked[meta.i]} disabled={!meta.emailValid} onChange={e=>{const n={...checked};if(e.target.checked)n[meta.i]=true;else delete n[meta.i];setChecked(n)}}/></td>
          <td style={{padding:"7px 12px",borderBottom:"1px solid "+C.bgA,textAlign:"center",fontSize:10.5,fontWeight:700,color:sent[meta.i]==='sent'?C.gn:sent[meta.i]==='failed'?C.rd:!meta.email?C.mt:meta.emailValid?C.sc:C.rd}}>
            {sent[meta.i]==='sent'?'SENT':sent[meta.i]==='failed'?'FAILED':!meta.email?'NO EMAIL':meta.emailValid?'READY':'INVALID'}
          </td>
          {cols.map((_,j)=><td key={j} style={{padding:"7px 12px",borderBottom:"1px solid "+C.bgA,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{meta.row[j]||''}</td>)}</tr>)}</tbody>
      </table></div>
    </Card>}
    {showPrev&&previewRows.length>0&&<Card style={{border:"2px solid "+C.tl,marginTop:14}}><CardH right={<div style={{display:"flex",gap:8}}>
      <button onClick={()=>setPrevIdx(Math.max(0,safePrevIdx-1))} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:14,color:C.sc}}>&#8592;</button>
      <span style={{fontSize:12,color:C.mt}}>{safePrevIdx+1}/{previewRows.length}</span>
      <button onClick={()=>setPrevIdx(Math.min(previewRows.length-1,safePrevIdx+1))} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:14,color:C.sc}}>&#8594;</button>
    </div>}>Preview</CardH><div style={{padding:"14px 18px"}}>{previewRows[safePrevIdx]&&<div>
      <div style={{fontSize:11,color:C.mt,marginBottom:4}}>To: <strong style={{color:C.fg}}>{previewRows[safePrevIdx].email||'-'}</strong></div>
      <div style={{fontSize:11,color:C.mt,marginBottom:4}}>From: <strong style={{color:C.fg}}>{sender.fromName||sender.label||'CareForBrains'}</strong>{sender.replyTo&&<span style={{color:C.mt}}> &#183; reply-to {sender.replyTo}</span>}</div>
      <div style={{fontSize:11,color:C.mt,marginBottom:8}}>Subject: <strong style={{color:C.fg}}>{fill(subj,previewRows[safePrevIdx].row)}</strong></div>
      {!previewRows[safePrevIdx].emailValid&&<div style={{marginBottom:10,fontSize:11,color:C.rd,fontWeight:700}}>This row will not be sent because the email is missing or invalid.</div>}
      <div style={{background:C.bgA,borderRadius:8,padding:14,fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap",color:C.sc}}>{fill(body,previewRows[safePrevIdx].row)}</div>
    </div>}</div></Card>}
    {campaigns.length>0&&<Card style={{marginTop:14}}><CardH>Recent Campaigns</CardH><div style={{padding:"14px 18px"}}>{campaigns.slice(0,5).map(c=><div key={c._fbKey} style={{display:"flex",justifyContent:"space-between",gap:12,padding:"10px 0",borderBottom:"1px solid "+C.bgA}}>
      <div><div style={{fontWeight:700,fontSize:13}}>{c.templateName||c.template||'Email Campaign'}</div><div style={{fontSize:11,color:C.sc}}>{c.profileLabel||c.profile||'Sender'} &#183; {c.sheetName||'Manual sheet'}</div><div style={{fontSize:10,color:C.mt,fontFamily:"monospace"}}>{c.createdAt?new Date(c.createdAt).toLocaleString():''}</div></div>
      <div style={{textAlign:"right",fontSize:11,color:C.sc}}><div><strong style={{color:C.fg}}>{c.sentCount||0}</strong> sent</div><div>{c.failedCount||0} failed</div></div>
    </div>)}</div></Card>}
    {!selSheet&&<div style={{textAlign:"center",padding:"60px 20px",color:C.mt}}><div style={{fontFamily:F.sf,fontSize:20,fontStyle:"italic",marginBottom:8}}>Select a sheet to get started</div><div style={{fontSize:13}}>Link sheets in the Sheets tab first, then select one here.</div></div>}
  </div>);
}

// === ANNOUNCEMENTS ===
function Board({db,announcements,team,me}){
  const isA=team.find(t=>t.id===me)?.admin;const meD=team.find(t=>t.id===me);const[text,setText]=useState('');
  const post=()=>{if(!text.trim())return;const ref=db.ref('hub/announcements').push();ref.set({id:ref.key,author:fn(meD?.name),date:new Date().toISOString().split('T')[0],text:text.trim(),ts:Date.now()});setText('')};
  const del=a=>db.ref('hub/announcements/'+a._fbKey).remove();
  const sorted=[...announcements].sort((a,b)=>(b.ts||0)-(a.ts||0));
  return(<div>
    <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>06 &#8212; Announcements</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Board</h1></div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 22px"}}/>
    <Card style={{marginBottom:18}}><div style={{padding:"14px 18px",display:"flex",gap:8}}>
      <textarea style={{width:"100%",padding:"9px 12px",background:C.cd,border:"1px solid "+C.rl,borderRadius:7,color:C.fg,fontSize:13,fontFamily:"inherit",outline:"none",minHeight:44,resize:"vertical"}} placeholder="Post an update..." value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();post()}}}/>
      <Btn primary onClick={post} style={{alignSelf:"flex-end"}}>Post</Btn></div></Card>
    <Card><div style={{padding:"14px 18px"}}>{sorted.length===0?<div style={{textAlign:"center",padding:36,color:C.mt,fontFamily:F.sf,fontStyle:"italic"}}>No announcements</div>:sorted.map(a=><div key={a._fbKey} style={{padding:"12px 0",borderBottom:"1px solid "+C.bgA,position:"relative"}}>
      <div style={{fontFamily:"monospace",fontSize:10,color:C.mt}}>{a.date}</div><div style={{fontWeight:700,fontSize:13}}>{a.author}</div><div style={{fontSize:14,lineHeight:1.6,marginTop:3,color:C.sc}}>{a.text}</div>
      {isA&&<button onClick={()=>del(a)} style={{position:"absolute",top:12,right:0,background:"none",border:"none",cursor:"pointer",color:C.mt,fontSize:14}}>&#215;</button>}
    </div>)}</div></Card>
  </div>);
}

// === SETTINGS ===
function Settings({db,passwords,team}){
  const[pu,setPu]=useState('tanmay');const[np,setNp]=useState('');
  const chPw=()=>{if(!np)return;db.ref('hub/passwords/'+pu).set(np);setNp('');alert('Updated')};
  const resetFb=()=>{if(!confirm('Sign out everywhere on this device?'))return;localStorage.removeItem(LK);window.location.reload()};
  return(<div>
    <div><div style={{fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:C.mt}}>Settings</div><h1 style={{fontFamily:F.sf,fontSize:26,fontWeight:400,marginTop:3}}>Configuration</h1></div>
    <hr style={{border:"none",borderTop:"2px solid "+C.fg,margin:"12px 0 22px"}}/>
    <Card><CardH>Passwords</CardH><div style={{padding:"14px 18px"}}><div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
      <div><Lbl>Member</Lbl><Sel style={{width:160}} value={pu} onChange={e=>setPu(e.target.value)}>{team.map(m=><option key={m.id} value={m.id}>{fn(m.name)}</option>)}</Sel></div>
      <div style={{flex:1}}><Lbl>New Password</Lbl><Inp type="password" value={np} onChange={e=>setNp(e.target.value)}/></div>
      <Btn primary onClick={chPw}>Update</Btn></div></div></Card>
    <Card><div style={{padding:"14px 18px"}}>
      <div style={{fontWeight:700,fontSize:14,marginBottom:3,color:C.rd}}>Reset Device</div>
      <div style={{fontSize:12,color:C.mt,marginBottom:8}}>Signs out on this device.</div>
      <Btn onClick={resetFb} style={{borderColor:C.rd,color:C.rd}}>Reset</Btn>
    </div></Card>
  </div>);
}

// === MAIN APP ===
function App(){
  const fbCfg=FIREBASE_CONFIG;
  const[hubData,setHubData]=useState(null);
  const[user,setUser]=useState(()=>gL());
  const[tab,setTab]=useState('my');
  const dbRef=useRef(null);
  const[time,setTime]=useState(new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}));

  useEffect(()=>{
    if(!fbCfg)return;
    try{
      if(!firebase.apps.length)firebase.initializeApp(fbCfg);
      const db=firebase.database();
      dbRef.current=db;
      db.ref('hub').on('value',snap=>{
        const val=snap.val();
        if(val)setHubData(val);
        else{db.ref('hub').set(SEED);setHubData(SEED)}
      });
    }catch(e){console.error(e);localStorage.removeItem(LK);window.location.reload()}
    return()=>{if(dbRef.current)dbRef.current.ref('hub').off()};
  },[fbCfg]);

  const logout=()=>{localStorage.removeItem(LK);setUser(null);setTab('my')};

  
  if(!hubData)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F.sn}}><div style={{textAlign:"center"}}><img src={LOGO} alt="" style={{width:40,height:40,borderRadius:10,marginBottom:10,opacity:0.5}}/><div style={{fontSize:13,color:C.mt}}>Connecting...</div></div></div>);

  const team=hubData.team||TEAM;
  const tasks=fbToArr(hubData.tasks);
  const events=fbToArr(hubData.events);
  const announcements=fbToArr(hubData.announcements);
  const passwords=hubData.passwords||{};
  const db=dbRef.current;

  if(!user)return<Login onLogin={id=>setUser({id})} passwords={passwords} team={team}/>;

  const me=user.id;const isA=team.find(t=>t.id===me)?.admin;const canEmail=canUseEmails(me);
  const safeTab=(tab==='assign'&&!isA)||(tab==='settings'&&!isA)||(tab==='emails'&&!canEmail)?'my':tab;
  const titles={my:'My Work',emails:'Comms',team:'Team Board',assign:'Assign Work',calendar:'Calendar',contacts:'Contacts',sheets:'Sheets',board:'Announcements',settings:'Settings'};
  const V=()=>{switch(safeTab){
    case 'my':return<MyWork db={db} tasks={tasks} events={events} team={team} me={me}/>;
    case 'team':return<TeamBoard db={db} tasks={tasks} team={team} me={me}/>;
    case 'assign':return isA?<Assign db={db} tasks={tasks} team={team} me={me}/>:<MyWork db={db} tasks={tasks} events={events} team={team} me={me}/>;
    case 'calendar':return<Cal db={db} events={events} tasks={tasks} team={team} me={me}/>;
    case 'contacts':return<Contacts db={db} team={team} me={me}/>;
    case 'sheets':return<Sheets db={db} hubData={hubData} team={team} me={me}/>;
    case 'emails':return canEmail?<Emails db={db} hubData={hubData} team={team} me={me}/>:<MyWork db={db} tasks={tasks} events={events} team={team} me={me}/>;
    case 'board':return<Board db={db} announcements={announcements} team={team} me={me}/>;
    case 'settings':return isA?<Settings db={db} passwords={passwords} team={team}/>:<MyWork db={db} tasks={tasks} events={events} team={team} me={me}/>;
    default:return<MyWork db={db} tasks={tasks} events={events} team={team} me={me}/>}};

  return(<div style={{display:"flex",minHeight:"100vh",fontFamily:F.sn,color:C.fg,background:"#F5F6F8"}}>    <Sidebar tab={safeTab} setTab={setTab} me={me} team={team} logout={logout}/>
    <div style={{marginLeft:240,flex:1,minHeight:"100vh"}}>
      <div className="topbar-shell" style={{position:"sticky",top:0,padding:"12px 36px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:50}}>
        <span className="topbar-title" style={{fontFamily:F.sf,fontSize:19,fontWeight:400}}>{titles[safeTab]}</span>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span className="live-pill" style={{fontSize:10,color:"#00CA72",fontWeight:700}}><span className="live-pill-dot"></span>LIVE</span>
          <span style={{fontSize:11,color:C.mt,fontFamily:"monospace"}}>{time}</span></div></div>
      <div style={{padding:"28px 36px 40px",width:"100%",maxWidth:"none"}}><div key={safeTab} className="page-enter section-shell"><V/></div></div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
